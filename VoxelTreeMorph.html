<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VoxelTreeMorph</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      color-scheme: dark;
      --film-w: 552;
      --film-h: 720;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #050403;
      font-family: system-ui, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
    }

    #stage {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(circle at 50% 48%, rgba(116, 73, 43, 0.32), rgba(34, 20, 11, 0.38) 39%, rgba(6, 4, 2, 0.98) 78%),
        #050403;
      cursor: crosshair;
    }

    #stage::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 45%, transparent 0 43%, rgba(0, 0, 0, 0.05) 68%, rgba(0, 0, 0, 0.34) 100%),
        linear-gradient(90deg, rgba(0, 0, 0, 0.12), transparent 21%, transparent 79%, rgba(0, 0, 0, 0.16));
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .grain {
      position: absolute;
      inset: -3%;
      z-index: 5;
      pointer-events: none;
      opacity: 0.075;
      background-image:
        radial-gradient(circle at 10% 20%, #fff 0 0.5px, transparent 0.8px),
        radial-gradient(circle at 70% 40%, #fff 0 0.45px, transparent 0.75px),
        radial-gradient(circle at 50% 90%, #fff 0 0.35px, transparent 0.7px);
      background-size: 52px 57px, 71px 63px, 43px 49px;
      animation: grainDrift 1.7s steps(2, end) infinite;
    }

    .fallback {
      position: absolute;
      inset: 0;
      z-index: 9;
      display: grid;
      place-items: center;
      padding: 32px;
      background: #050403;
      color: #d7c1a2;
      text-align: center;
      line-height: 1.45;
      visibility: hidden;
    }

    .no-webgl .fallback {
      visibility: visible;
    }

    @keyframes grainDrift {
      from { transform: translate3d(0, 0, 0); }
      to { transform: translate3d(-2%, 2%, 0); }
    }

    #picker {
      position: fixed;
      bottom: 22px;
      right: 22px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 14px;
      border-radius: 6px;
      background: rgba(12, 8, 5, 0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(220, 180, 130, 0.18);
      box-shadow: 0 6px 30px rgba(0, 0, 0, 0.4);
      font-size: 13px;
      letter-spacing: 0.04em;
      min-width: 140px;
      max-height: calc(100vh - 44px);
      overflow-y: auto;
    }

    #picker button {
      appearance: none;
      border: 1px solid rgba(220, 180, 130, 0.22);
      background: rgba(40, 26, 16, 0.55);
      color: #e8d2b0;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font: inherit;
      text-align: left;
      transition: background 160ms ease, color 160ms ease, border-color 160ms ease, transform 120ms ease;
    }

    #picker button:hover {
      background: rgba(80, 50, 28, 0.7);
      border-color: rgba(255, 200, 140, 0.45);
    }

    #picker button:active {
      transform: translateY(1px);
    }

    #picker button.active {
      background: linear-gradient(180deg, #ffb766, #d97a30);
      color: #1a0f06;
      border-color: rgba(255, 220, 170, 0.6);
      box-shadow: 0 0 12px rgba(255, 140, 60, 0.45);
    }

    #repo-link {
      position: fixed;
      bottom: 22px;
      left: 22px;
      z-index: 10;
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 0 16px;
      border-radius: 6px;
      border: 1px solid rgba(220, 180, 130, 0.22);
      background: rgba(12, 8, 5, 0.6);
      color: #e8d2b0;
      text-decoration: none;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 6px 30px rgba(0, 0, 0, 0.4);
      font-size: 13px;
      letter-spacing: 0.04em;
      transition: background 160ms ease, color 160ms ease, border-color 160ms ease, transform 120ms ease;
    }

    #repo-link:hover {
      background: rgba(80, 50, 28, 0.7);
      border-color: rgba(255, 200, 140, 0.45);
    }

    #repo-link:active {
      transform: translateY(1px);
    }

    #repo-link:focus-visible {
      outline: 2px solid #ffb766;
      outline-offset: 3px;
    }

    #settings {
      position: fixed;
      top: 22px;
      left: 22px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 14px 16px;
      border-radius: 6px;
      background: rgba(12, 8, 5, 0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(220, 180, 130, 0.18);
      box-shadow: 0 6px 30px rgba(0, 0, 0, 0.4);
      font-size: 12px;
      letter-spacing: 0.04em;
      width: 220px;
      max-height: calc(100vh - 44px);
      overflow-y: auto;
      color: #e8d2b0;
    }

    #settings h3 {
      margin: 0 0 2px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #d4a874;
      opacity: 0.85;
    }

    #settings label {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 11px;
    }

    #settings .row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
    }

    #settings .row span:last-child {
      color: #ffb766;
      font-variant-numeric: tabular-nums;
      font-size: 11px;
    }

    #settings input[type="range"] {
      appearance: none;
      width: 100%;
      height: 4px;
      background: rgba(220, 180, 130, 0.22);
      border-radius: 2px;
      outline: none;
      margin: 0;
    }

    #settings input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: linear-gradient(180deg, #ffb766, #d97a30);
      border: 1px solid rgba(255, 220, 170, 0.7);
      cursor: pointer;
      box-shadow: 0 0 6px rgba(255, 140, 60, 0.45);
    }

    #settings input[type="range"]::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: linear-gradient(180deg, #ffb766, #d97a30);
      border: 1px solid rgba(255, 220, 170, 0.7);
      cursor: pointer;
      box-shadow: 0 0 6px rgba(255, 140, 60, 0.45);
    }

    #settings .toggle {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      cursor: pointer;
    }

    #settings .toggle input {
      appearance: none;
      width: 28px;
      height: 16px;
      border-radius: 8px;
      background: rgba(220, 180, 130, 0.22);
      position: relative;
      cursor: pointer;
      transition: background 160ms ease;
    }

    #settings .toggle input::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #e8d2b0;
      transition: left 160ms ease, background 160ms ease;
    }

    #settings .toggle input:checked {
      background: linear-gradient(180deg, #ffb766, #d97a30);
    }

    #settings .toggle input:checked::after {
      left: 14px;
      background: #1a0f06;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <main id="stage" aria-label="interactive voxel tree morph animation">
    <div class="fallback">This browser needs WebGL to render the voxel tree.</div>
    <div class="grain" aria-hidden="true"></div>
  </main>

  <a
    id="repo-link"
    href="https://github.com/azidancorp/VoxelTreeMorph"
    target="_blank"
    rel="noopener noreferrer"
    aria-label="Open VoxelTreeMorph repository on GitHub"
  >GitHub Repo</a>

  <section id="settings" aria-label="scene controls">
    <h3>Controls</h3>
    <label>
      <div class="row"><span>Particle density</span><span data-out="dustCount">3176</span></div>
      <input type="range" min="0" max="6000" step="50" value="3176" data-setting="dustCount">
    </label>
    <label>
      <div class="row"><span>Falling leaves</span><span data-out="leafCount">42</span></div>
      <input type="range" min="0" max="200" step="2" value="42" data-setting="leafCount">
    </label>
    <label>
      <div class="row"><span>Cycle time (s)</span><span data-out="cycleMs">5.0</span></div>
      <input type="range" min="1500" max="20000" step="100" value="5000" data-setting="cycleMs">
    </label>
    <label>
      <div class="row"><span>Morph speed (s)</span><span data-out="morphMs">1.9</span></div>
      <input type="range" min="400" max="6000" step="100" value="1900" data-setting="morphMs">
    </label>
    <label>
      <div class="row"><span>Explode radius</span><span data-out="hoverRadius">7.2</span></div>
      <input type="range" min="1" max="20" step="0.1" value="7.2" data-setting="hoverRadius">
    </label>
    <label>
      <div class="row"><span>Explode force</span><span data-out="hoverForce">8.6</span></div>
      <input type="range" min="0" max="30" step="0.1" value="8.6" data-setting="hoverForce">
    </label>
    <label>
      <div class="row"><span>Rotate speed</span><span data-out="rotateSpeed">0.38</span></div>
      <input type="range" min="0" max="3" step="0.02" value="0.38" data-setting="rotateSpeed">
    </label>
    <label class="toggle">
      <span>Auto rotate</span>
      <input type="checkbox" checked data-setting="autoRotate">
    </label>
    <label class="toggle">
      <span>Auto morph</span>
      <input type="checkbox" checked data-setting="autoMorph">
    </label>
  </section>

  <nav id="picker" aria-label="tree variation picker">
    <button type="button" data-variation="0">Maple</button>
    <button type="button" data-variation="1">Winter</button>
    <button type="button" data-variation="2">Sakura</button>
    <button type="button" data-variation="3">Bonsai</button>
    <button type="button" data-variation="4">Oak</button>
    <button type="button" data-variation="5">Fruit</button>
    <button type="button" data-variation="6">Baobab</button>
    <button type="button" data-variation="7">Mangrove</button>
    <button type="button" data-variation="8">Jacaranda</button>
    <button type="button" data-variation="9">Banyan</button>
    <button type="button" data-variation="10">Banana</button>
    <button type="button" data-variation="11">Date Palm</button>
    <button type="button" data-variation="12">Weeping Willow</button>
  </nav>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";

    const settings = {
      dustCount: 3176,
      leafCount: 42,
      cycleMs: 5000,
      morphMs: 1900,
      hoverRadius: 7.2,
      hoverForce: 8.6,
      rotateSpeed: 0.38,
      autoRotate: true,
      autoMorph: true
    };

    const stage = document.querySelector("#stage");
    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      alpha: false,
      powerPreference: "high-performance"
    });

    if (!renderer.capabilities.isWebGL2 && !renderer.capabilities.isWebGL) {
      document.body.classList.add("no-webgl");
    }

    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.5));
    renderer.setSize(stage.clientWidth, stage.clientHeight, false);
    renderer.setClearColor(0x050403, 1);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.25;
    renderer.shadowMap.enabled = false;
    stage.prepend(renderer.domElement);

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x100906, 0.019);

    const camera = new THREE.PerspectiveCamera(40, 1, 1, 90);
    camera.position.set(14, 13, 30);
    camera.lookAt(0, 3.3, 0);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.055;
    controls.enablePan = false;
    controls.autoRotate = settings.autoRotate;
    controls.autoRotateSpeed = settings.rotateSpeed;
    controls.minDistance = 13;
    controls.maxDistance = 36;
    controls.target.set(0, 3.2, 0);

    scene.add(new THREE.HemisphereLight(0xffd8a8, 0x1b0f08, 1.05));
    scene.add(new THREE.AmbientLight(0xffc090, 0.48));

    const key = new THREE.DirectionalLight(0xffd0a0, 4.2);
    key.position.set(5.6, 14, 5.4);
    key.castShadow = false;
    scene.add(key);

    const fill = new THREE.DirectionalLight(0x6d9a58, 1.0);
    fill.position.set(-5, 8, -3);
    scene.add(fill);

    const rim = new THREE.PointLight(0xff6f35, 4.2, 28, 1.6);
    rim.position.set(-4, 9, -5);
    scene.add(rim);

    const accent = new THREE.PointLight(0xff9c5a, 3.3, 22, 1.6);
    accent.position.set(4, 8, 4);
    scene.add(accent);

    const root = new THREE.Group();
    root.position.set(0.1, -0.6, 0);
    root.rotation.y = -0.32;
    root.scale.setScalar(0.55);
    scene.add(root);

    const rng = mulberry32(0xB05A1);
    const tempObj = new THREE.Object3D();
    const tempColor = new THREE.Color();
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2(9999, 9999);
    pointer.lastMove = -Infinity;
    const hoverPlane = new THREE.Plane();
    const hoverPoint = new THREE.Vector3(9999, 9999, 9999);
    const localHoverPoint = new THREE.Vector3(9999, 9999, 9999);
    const worldTreeCenter = new THREE.Vector3();
    const treeCenter = new THREE.Vector3(0, 8.3, 0);
    const cameraDir = new THREE.Vector3();
    const box = new THREE.Box3();

    const roles = {
      underside: [],
      grass: [],
      rock: [],
      trunk: [],
      leaf: [],
      flower: [],
      grassTuft: [],
      mushroom: []
    };

    const voxels = [];
    const variations = [];
    const offsets = [];
    const randDirs = [];
    let activeVariation = 0;
    let targetVariation = 0;
    let morphing = false;
    let morphStarted = 0;
    let morphFromPositions = null;
    let morphFromColors = null;
    let lastMorphAt = performance.now();
    let suppressAutoUntil = 0;
    let hoverActive = false;

    buildBaseVoxels();

    for (const voxel of voxels) {
      box.expandByPoint(voxel.base);
      offsets.push(new THREE.Vector3());
      randDirs.push(randomUnitVector());
    }

    box.getCenter(treeCenter);
    treeCenter.y += 2.3;
    variations[0] = makeAutumnMap();
    variations[1] = makeWinterMap();
    variations[2] = makeBlossomMap();
    variations[3] = makeAncientMap();
    variations[4] = makeOakMap();
    variations[5] = makeFruitMap();
    variations[6] = makeBaobabMap();
    variations[7] = makeMangroveMap();
    variations[8] = makeJacarandaMap();
    variations[9] = makeBanyanMap();
    variations[10] = makeBananaMap();
    variations[11] = makeDatePalmMap();
    variations[12] = makeWeepingWillowMap();

    const cube = new THREE.BoxGeometry(1, 1, 1);
    const material = new THREE.MeshStandardMaterial({
      color: 0xffffff,
      roughness: 0.82,
      metalness: 0.0
    });
    const mesh = new THREE.InstancedMesh(cube, material, voxels.length);
    mesh.castShadow = false;
    mesh.receiveShadow = false;
    mesh.frustumCulled = false;
    mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    root.add(mesh);

    applyVariation(activeVariation, true);
    buildParticles();

    const pickerButtons = Array.from(document.querySelectorAll("#picker button"));
    function syncPicker() {
      for (const btn of pickerButtons) {
        const i = Number(btn.dataset.variation);
        btn.classList.toggle("active", i === (morphing ? targetVariation : activeVariation));
      }
    }
    for (const btn of pickerButtons) {
      btn.addEventListener("click", () => {
        const i = Number(btn.dataset.variation);
        pauseAfterInteraction();
        startMorph(i);
        syncPicker();
      });
    }
    syncPicker();

    const settingFormatters = {
      cycleMs: (v) => (v / 1000).toFixed(1),
      morphMs: (v) => (v / 1000).toFixed(1),
      hoverRadius: (v) => Number(v).toFixed(1),
      hoverForce: (v) => Number(v).toFixed(1),
      rotateSpeed: (v) => Number(v).toFixed(2),
      dustCount: (v) => String(Math.round(v)),
      leafCount: (v) => String(Math.round(v))
    };

    function syncSettingOutput(key, value) {
      const out = document.querySelector(`#settings [data-out="${key}"]`);
      if (out) out.textContent = (settingFormatters[key] || ((v) => String(v)))(value);
    }

    for (const input of document.querySelectorAll("#settings [data-setting]")) {
      const key = input.dataset.setting;
      if (input.type === "checkbox") {
        input.checked = Boolean(settings[key]);
        input.addEventListener("change", () => {
          settings[key] = input.checked;
          if (key === "autoRotate") controls.autoRotate = input.checked;
        });
      } else {
        input.value = settings[key];
        syncSettingOutput(key, settings[key]);
        input.addEventListener("input", () => {
          const value = Number(input.value);
          settings[key] = value;
          syncSettingOutput(key, value);
          if (key === "rotateSpeed") controls.autoRotateSpeed = value;
        });
      }
    }

    renderer.domElement.addEventListener("pointermove", onPointerMove, { passive: true });
    renderer.domElement.addEventListener("pointerleave", onPointerLeave, { passive: true });
    renderer.domElement.addEventListener("pointerdown", pauseAfterInteraction, { passive: true });
    renderer.domElement.addEventListener("wheel", pauseAfterInteraction, { passive: true });
    window.addEventListener("resize", resize, { passive: true });
    resize();

    window.__voxelTreeMorph = {
      source: "inspired by the cool Hugging Face bonsai-image-webgpu voxel mechanics",
      voxels: voxels.length,
      variations: variations.length,
      cycleMs: 5000,
      morphSeconds: 1.9,
      hoverRadius: 7.2,
      hoverForce: 8.6,
      go: (index) => startMorph((index + variations.length) % variations.length),
      next: () => {
        const order = [3, 0, 1, 2, 8, 4, 5, 10, 11, 12, 6, 7, 9];
        const next = order[(order.indexOf(activeVariation) + 1) % order.length];
        startMorph(next);
      },
      state: () => ({ activeVariation, targetVariation, morphing, hoverActive }),
      colorStats: () => {
        const sum = new THREE.Color(0, 0, 0);
        let brightest = 0;
        for (const voxel of voxels) {
          const color = voxel.currentColor || voxel.color;
          sum.r += color.r;
          sum.g += color.g;
          sum.b += color.b;
          brightest = Math.max(brightest, color.r, color.g, color.b);
        }
        return {
          average: [sum.r / voxels.length, sum.g / voxels.length, sum.b / voxels.length],
          brightest,
          first: voxels[0].currentColor?.toArray()
        };
      }
    };

    let last = performance.now();
    renderer.setAnimationLoop((now) => {
      const dt = Math.min((now - last) / 1000, 0.05);
      last = now;

      controls.update();
      updateAutoCycle(now);
      updateMorph(now);
      updateHover(dt, now);
      updateParticles(dt, now);
      updateLights(now);

      renderer.render(scene, camera);
    });

    function buildBaseVoxels() {
      const occupied = new Set();
      const add = (role, x, y, z, color, scale = 1) => {
        const key = `${x.toFixed(3)},${y.toFixed(3)},${z.toFixed(3)}`;
        if (occupied.has(key)) return;
        occupied.add(key);
        const seed = rng();
        const voxel = {
          role,
          base: new THREE.Vector3(x, y, z),
          color: new THREE.Color(color),
          scale,
          seed,
          jitter: new THREE.Vector3(
            (rng() - 0.5) * 0.04,
            (rng() - 0.5) * 0.04,
            (rng() - 0.5) * 0.04
          )
        };
        roles[role].push(voxel);
        voxels.push(voxel);
      };

      const grassColors = ["#4a8c3f", "#3d7a34", "#5a9e4a", "#2d6b24", "#68ad58", "#3f8535", "#55a048"];
      const rockColors = ["#a0978a", "#8c8478", "#b5ad9e", "#9a9184", "#7d756a", "#938b7f"];
      const undersideColors = ["#8b6914", "#7a5c12", "#6b4e10", "#9c7a1e", "#5c4010", "#706860"];
      const trunkColors = ["#4a3728", "#3d2e20", "#5c4535", "#2e2218", "#6b5444"];
      const leafColors = ["#e63c2e", "#d4452f", "#f05a3a", "#c93525", "#ff6b45", "#e8502a", "#ff7f50"];
      const flowerColors = ["#e63c2e", "#f05a3a", "#ff6b45", "#f5a623", "#ff8c42"];

      for (let x = -8; x <= 8; x++) {
        for (let z = -6; z <= 6; z++) {
          const d = Math.sqrt(x * x * 0.48 + z * z * 0.58);
          const noise = terrainNoise(x, z);
          if (d < 7.6 + noise * 1.45) add("grass", x, 0, z, pick(grassColors));
          if (d < 8.7 + noise * 1.1 && rng() > 0.18) add("underside", x, -1, z, pick(undersideColors));
          if (d < 6.2 + noise * 1.0 && rng() > 0.24) add("grass", x, 1, z, pick(grassColors));
          if (d < 4.9 + noise * 0.85 && rng() > 0.2) add("grass", x, 2, z, pick(grassColors));
          if (d < 3.7 + noise * 0.65 && rng() > 0.24) add("grass", x, 3, z, pick(grassColors));
        }
      }

      for (let y = -2; y >= -11; y--) {
        const depth = Math.abs(y + 1);
        const radius = Math.max(0.8, 8.0 - depth * 0.58 + Math.sin(depth * 0.8) * 0.7);
        for (let x = -10; x <= 10; x++) {
          for (let z = -8; z <= 8; z++) {
            const nx = x - Math.sin(depth * 0.7) * 0.35;
            const nz = z - Math.cos(depth * 0.9) * 0.25;
            const d = Math.sqrt(nx * nx * 0.45 + nz * nz * 0.55);
            if (d < radius + terrainNoise(x + depth * 0.3, z - depth * 0.2) * (1 + depth * 0.08) && rng() > 0.1) {
              add("underside", x, y, z, depth < 4 ? pick(undersideColors) : pick(rockColors));
            }
          }
        }
      }

      const rootStones = [
        [0, -12, 0, 1.1], [-3, -12, -1, 0.85], [2, -12, 2, 0.8], [-1, -12, -3, 0.7],
        [3, -12, -2, 0.62], [-4, -11, 1, 0.7], [1, -13, -4, 0.52], [-2, -13, 3, 0.75]
      ];
      for (const [cx, cy, cz, r] of rootStones) {
        for (let y = cy; y >= cy - 2; y--) {
          const layer = Math.abs(y - cy);
          const rr = Math.max(0.35, r - layer * 0.28);
          for (let x = Math.floor(cx - rr - 1); x <= Math.ceil(cx + rr + 1); x++) {
            for (let z = Math.floor(cz - rr - 1); z <= Math.ceil(cz + rr + 1); z++) {
              if (Math.sqrt((x - cx) ** 2 + (z - cz) ** 2) < rr + terrainNoise(x + layer, z - layer) * 0.28) {
                add("underside", x, y, z, pick(rockColors));
              }
            }
          }
        }
      }

      const trunk = [
        [0, 5, 0], [-1, 5, 0], [0, 5, -1], [-1, 5, -1],
        [0, 6, 0], [-1, 6, 0], [0, 6, -1], [-1, 6, -1],
        [0, 7, 0], [-1, 7, 0], [0, 7, -1],
        [0, 8, 0], [-1, 8, 0], [0, 8, -1],
        [0, 9, 0], [-1, 9, 0], [0, 10, 0], [-1, 10, 0],
        [0, 11, 0], [-1, 11, 0], [0, 12, 0], [0, 13, 0],
        [-2, 11, 0], [-3, 11, 0], [-3, 12, 0], [-4, 12, 0], [-5, 13, 0],
        [1, 10, 0], [2, 10, 0], [2, 11, 0], [3, 11, 0], [4, 12, 0], [5, 13, -1],
        [0, 11, 1], [0, 12, 2], [1, 12, 2], [1, 13, 3],
        [0, 10, -1], [0, 11, -2], [-1, 12, -2], [-1, 13, -3],
        [1, 8, 0], [-2, 8, 0], [0, 8, 1], [-1, 8, -1]
      ];
      for (const p of trunk) add("trunk", p[0], p[1], p[2], pick(trunkColors));

      const canopy = [];
      const addLeaf = (x, y, z) => {
        const key = `${x},${y},${z}`;
        if (!canopy.includes(key)) canopy.push(key);
      };
      const mainRadius = 6.3;
      const yScale = mainRadius / 4.5;
      for (let x = -8; x <= 8; x++) {
        for (let y = 12; y <= 23; y++) {
          for (let z = -7; z <= 7; z++) {
            const yy = (y - 17) * yScale;
            const rough = Math.sin(x * 1.8 + z * 1.4) * 0.7 + Math.cos(y * 1.1 + x * 0.7) * 0.6 + Math.sin(z * 2.3 - y * 0.5) * 0.4;
            if (Math.sqrt(x * x + yy * yy + z * z) < mainRadius + rough && rng() > 0.18) addLeaf(x, y, z);
          }
        }
      }

      const lobes = [
        [-5, 14, 0, 3.5], [-5, 14, 1, 2.8], [5, 14, -1, 3.5], [4, 15, 0, 3],
        [1, 14, 3, 3.2], [1, 14, -3, 3], [-1, 14, -3, 2.8], [0, 21, 0, 3],
        [-2, 20, 1, 2.5], [2, 20, -1, 2.5], [1, 21, 1, 2], [-1, 21, -1, 2],
        [-7, 15, 0, 2], [6, 15, 0, 2], [0, 15, 5, 2.2], [0, 15, -5, 2.2],
        [-3, 12, 2, 2.5], [3, 12, -2, 2.5], [-2, 12, -3, 2], [2, 12, 3, 2]
      ];
      for (const [cx, cy, cz, r] of lobes) {
        for (let x = Math.floor(cx - r - 1); x <= Math.ceil(cx + r + 1); x++) {
          for (let y = Math.floor(cy - r); y <= Math.ceil(cy + r + 1); y++) {
            for (let z = Math.floor(cz - r - 1); z <= Math.ceil(cz + r + 1); z++) {
              const dx = x - cx;
              const dy = (y - cy) * 1.15;
              const dz = z - cz;
              if (Math.sqrt(dx * dx + dy * dy + dz * dz) < r && rng() > 0.2) addLeaf(x, y, z);
            }
          }
        }
      }

      for (const key of canopy) {
        const [x, y, z] = key.split(",").map(Number);
        add("leaf", x, y, z, pick(leafColors));
      }

      const stones = [
        [-2, 5, -1], [-1, 5, -1], [0, 5, -1], [1, 5, -1], [-2, 5, 0], [-1, 5, 0], [0, 5, 0], [1, 5, 0],
        [-1, 5, 1], [0, 5, 1], [1, 5, 1], [-2, 5, 1], [3, 2, 2], [3, 3, 2], [4, 1, -1], [4, 2, -1],
        [-4, 1, -2], [-4, 2, -2], [-3, 2, 2], [-3, 3, 2], [5, 1, 1], [5, 1, 0], [-5, 1, 0], [2, 3, -2],
        [-3, 3, -1], [6, 1, -2], [-6, 0, 2], [1, 4, 2], [-2, 4, -2], [3, 1, -3], [-2, 1, 3]
      ];
      for (const p of stones) add("rock", p[0], p[1], p[2], pick(rockColors));

      const topByXZ = new Map();
      for (const voxel of roles.grass) {
        const key = `${Math.round(voxel.base.x)},${Math.round(voxel.base.z)}`;
        if (!topByXZ.has(key) || voxel.base.y > topByXZ.get(key).y) topByXZ.set(key, voxel.base);
      }

      for (const pos of topByXZ.values()) {
        const underTree = Math.abs(pos.x) < 2 && Math.abs(pos.z) < 2;
        if (!underTree && rng() < 0.34) {
          add("grassTuft", pos.x + (rng() - 0.5) * 0.5, pos.y + 0.72, pos.z + (rng() - 0.5) * 0.5, pick(grassColors), 0.48);
        }
        if (!underTree && rng() < 0.15 && pos.x < -2) {
          add("mushroom", pos.x + (rng() - 0.5) * 0.35, pos.y + 0.55, pos.z + (rng() - 0.5) * 0.35, "#e8d5b0", 0.45);
        }
        if (!underTree && rng() < 0.32) {
          add("flower", pos.x + (rng() - 0.5) * 0.45, pos.y + 0.45, pos.z + (rng() - 0.5) * 0.45, pick(flowerColors), 0.36);
        }
      }
    }

    function makeWinterMap() {
      const white = ["#e8f0e8", "#d0e0d0", "#c8dcc8", "#f0f5f0", "#dceadc"];
      const pine = ["#1a4a2a", "#224e30", "#183e24", "#2a5a38", "#1e4828", "#164020"];
      const bark = ["#3a2818", "#2e2010", "#4a3420", "#342818"];
      const rock = ["#d0d0d0", "#c0c0c0", "#e0e0e0", "#b8b8b8", "#cccccc"];
      return makeMap((voxel) => {
        const p = voxel.base.clone();
        let color = voxel.color.clone();
        if (voxel.role === "leaf") {
          const h = (p.y - 12) / 11;
          const angle = Math.atan2(p.z, p.x);
          const radius = Math.sqrt(p.x * p.x + p.z * p.z);
          const tier = Math.floor(h * 5);
          const cap = Math.max(2.6, (5.5 - tier) * (1 - (h * 5 - tier) * 0.3));
          const squeezed = Math.min(radius, cap) * (cap / Math.max(3, radius + 1));
          p.x = Math.cos(angle) * squeezed * 1.1 + (rng() - 0.5) * 0.28;
          p.z = Math.sin(angle) * squeezed * 1.1 + (rng() - 0.5) * 0.28;
          p.y += h * 2 + (rng() - 0.5) * 0.25;
          color = new THREE.Color(pick((h * 5 - tier) > 0.6 || h > 0.8 ? white : pine));
          if ((h * 5 - tier) > 0.6 || h > 0.8) color.multiplyScalar(0.74);
        } else if (voxel.role === "trunk") {
          p.x = p.x * 0.7 + (rng() - 0.5) * 0.15;
          p.z = p.z * 0.7 + (rng() - 0.5) * 0.15;
          color = new THREE.Color(pick(bark));
        } else if (voxel.role === "grass" || voxel.role === "grassTuft") {
          p.x *= 0.72;
          p.z *= 0.72;
          p.y += Math.max(0, 4 - Math.abs(p.x) - Math.abs(p.z) * 0.5) * 0.18;
          color = new THREE.Color(pick(white)).multiplyScalar(0.82);
        } else if (voxel.role === "rock" || voxel.role === "underside") {
          p.x *= 0.94;
          p.z *= 0.94;
          color = new THREE.Color(pick(rock)).multiplyScalar(voxel.role === "rock" ? 0.9 : 0.72);
        }
        return [p, color];
      });
    }

    function makeAncientMap() {
      const soil = ["#3a322c", "#4a4038", "#52473e", "#2e2620", "#403631"];
      const underside = ["#1c1410", "#241a12", "#2a1f17", "#1a120e"];
      const bark = ["#3a2a1c", "#4a3828", "#2e2218", "#5c4530", "#3e2c1e", "#4f3a28"];
      const woodLight = ["#6a4f35", "#75583c", "#5e4530"];
      const greens = ["#2d4a28", "#1f3a1c", "#244222", "#2a4625", "#456f3a", "#5a8845"];
      const yellow = ["#8fb058", "#a3c267", "#7ea84a", "#9bc05e"];
      const red = ["#9a5226", "#8a4520", "#b04030", "#933420"];

      const trunkPath = [
        [1, -0.6, 0], [1, 3, 0], [1.4, 4.5, 0.1], [3.6, 5.4, 0.2],
        [3.8, 7, 0.1], [3.2, 9.5, 0], [2, 11.5, 0.1], [1.4, 13, 0.3]
      ].map(([x, y, z]) => [x * 1.8, y * 1.8, z * 1.8]);

      const canopy = [
        { cx: -9.9, cy: 10.8, cz: 0.36, rx: 7.2, ry: 1.35, rz: 4.68 },
        { cx: 8.1, cy: 15.84, cz: -1.08, rx: 5.4, ry: 1.26, rz: 3.96 },
        { cx: 0.54, cy: 22.5, cz: 0.54, rx: 8.28, ry: 1.71, rz: 5.4 }
      ];

      return makeMap((voxel) => {
        const p = voxel.base.clone();
        let color = voxel.color.clone();
        if (voxel.role === "trunk") {
          const t = clamp((p.y - 5) / 13);
          const curve = samplePath(trunkPath, t);
          const ring = Math.atan2(p.z, Math.abs(p.x) > 0.01 ? p.x : 0.01);
          const thick = 1.55 * Math.exp(-2 * t) + 0.85;
          p.x = curve.x + Math.cos(ring) * thick + (rng() - 0.5) * 0.18;
          p.y = curve.y + (rng() - 0.5) * 0.22;
          p.z = curve.z + Math.sin(ring) * thick + (rng() - 0.5) * 0.18;
          color = new THREE.Color(pick(Math.cos(ring) + Math.sin(ring) > 0.3 ? woodLight : bark));
        } else if (voxel.role === "leaf") {
          const i = p.y >= 20 ? 2 : p.y < 15 ? 0 : 1;
          const target = canopy[i];
          const polar = Math.atan2(p.z, p.x);
          const rad = Math.min(1, Math.sqrt(p.x * p.x + p.z * p.z) / 7);
          p.x = target.cx + Math.cos(polar) * rad * target.rx + (rng() - 0.5) * 0.55;
          p.z = target.cz + Math.sin(polar) * rad * target.rz + (rng() - 0.5) * 0.55;
          p.y = target.cy + (rng() - 0.5) * 2 * target.ry;
          const r = rng();
          color = new THREE.Color(pick(r < 0.08 ? red : r < 0.2 ? yellow : greens));
        } else if (voxel.role === "grass" || voxel.role === "grassTuft") {
          p.x *= 1.08;
          p.z *= 0.92;
          p.y = -0.2 + Math.max(0, p.y) * 0.25;
          color = new THREE.Color(pick(greens));
        } else if (voxel.role === "underside") {
          p.x *= 0.92;
          p.z *= 0.9;
          p.y = -0.5 + p.y * 0.42;
          color = new THREE.Color(pick(underside));
        } else if (voxel.role === "rock") {
          p.x *= 0.9;
          p.z *= 0.9;
          p.y = Math.min(p.y, 0.4);
          color = new THREE.Color(pick(soil));
        } else if (voxel.role === "flower" || voxel.role === "mushroom") {
          const i = Math.floor(rng() * canopy.length);
          const target = canopy[i];
          const a = rng() * Math.PI * 2;
          const r = Math.sqrt(rng());
          p.x = target.cx + Math.cos(a) * r * target.rx;
          p.z = target.cz + Math.sin(a) * r * target.rz;
          p.y = target.cy + (rng() - 0.5) * 2 * target.ry;
          color = new THREE.Color(pick(greens));
        }
        return [p, color];
      });
    }

    function makeOakMap() {
      const leafDeep = ["#1e5224", "#245a2a", "#1a4820", "#2a6230", "#1f5025"];
      const leafMid = ["#2f7a36", "#388540", "#3a8242", "#2c7032", "#327838"];
      const leafLight = ["#54a04a", "#62b058", "#7ec06a", "#4a9842", "#6cb55e"];
      const leafSun = ["#a8d068", "#b8d870", "#98c860", "#90c258"];
      const bark = ["#5a463a", "#6b5544", "#4a3a30", "#7a6354", "#3e3128", "#8a7060"];
      const barkLight = ["#9a8068", "#a89078", "#b09a82"];
      const grass = ["#3d8a35", "#4a9c3f", "#5aae4a", "#358032", "#68b858", "#42953a"];
      const soil = ["#5c4028", "#6e4f32", "#4a341e", "#7a5a3c"];

      const canopyCenter = { x: 0, y: 17, z: 0 };
      const canopyRx = 8.4;
      const canopyRy = 6.2;
      const canopyRz = 8.4;

      return makeMap((voxel) => {
        const p = voxel.base.clone();
        let color = voxel.color.clone();
        if (voxel.role === "leaf") {
          const dx = p.x;
          const dy = p.y - 14;
          const dz = p.z;
          const radius = Math.sqrt(dx * dx + dy * dy + dz * dz) || 1;
          const inv = 1 / radius;
          const targetR = 6.8 + (rng() - 0.5) * 1.4;
          const nx = dx * inv;
          const ny = dy * inv;
          const nz = dz * inv;
          p.x = canopyCenter.x + nx * targetR * (canopyRx / 7) + (rng() - 0.5) * 0.6;
          p.y = canopyCenter.y + ny * targetR * (canopyRy / 7) + (rng() - 0.5) * 0.6;
          p.z = canopyCenter.z + nz * targetR * (canopyRz / 7) + (rng() - 0.5) * 0.6;
          const heightRatio = (p.y - (canopyCenter.y - canopyRy)) / (canopyRy * 2);
          const topLit = ny > 0.35;
          const r = rng();
          let palette;
          if (topLit && r < 0.55) palette = leafSun;
          else if (heightRatio > 0.6) palette = leafLight;
          else if (heightRatio > 0.3) palette = leafMid;
          else palette = r < 0.4 ? leafMid : leafDeep;
          color = new THREE.Color(pick(palette));
        } else if (voxel.role === "trunk") {
          const t = clamp((p.y - 5) / 9);
          const thick = 1.7 - t * 0.6;
          const ring = Math.atan2(p.z, Math.abs(p.x) > 0.01 ? p.x : 0.01);
          p.x = Math.cos(ring) * thick + (rng() - 0.5) * 0.2;
          p.z = Math.sin(ring) * thick + (rng() - 0.5) * 0.2;
          p.y = 4 + t * 10 + (rng() - 0.5) * 0.25;
          const lit = Math.cos(ring) > 0.25;
          color = new THREE.Color(pick(lit && rng() < 0.35 ? barkLight : bark));
        } else if (voxel.role === "grass" || voxel.role === "grassTuft") {
          p.x *= 1.18;
          p.z *= 1.18;
          p.y = Math.max(0, p.y) * 0.55;
          color = new THREE.Color(pick(grass));
        } else if (voxel.role === "underside") {
          p.x *= 1.05;
          p.z *= 1.05;
          p.y *= 0.7;
          color = new THREE.Color(pick(soil));
        } else if (voxel.role === "rock") {
          color = new THREE.Color(pick(soil)).multiplyScalar(0.85);
        } else if (voxel.role === "flower" || voxel.role === "mushroom") {
          color = new THREE.Color(pick(leafLight));
        }
        return [p, color];
      });
    }

          p.x = canopyCenter.x + nx * targetR * (canopyRx / 7) + (rng() - 0.5) * 0.55;
          p.y = canopyCenter.y + ny * targetR * (canopyRy / 7) + (rng() - 0.5) * 0.55;
          p.z = canopyCenter.z + nz * targetR * (canopyRz / 7) + (rng() - 0.5) * 0.55;
          const outward = ny < -0.1 ? 0 : Math.max(0, (nx * nx + nz * nz) - 0.3);
          const fruitChance = 0.11 + outward * 0.18;
          const r = rng();
          if (r < fruitChance) {
            const f = rng();
            const palette = f < 0.45 ? fruitRed : f < 0.78 ? fruitOrange : fruitYellow;
            color = new THREE.Color(pick(palette));

            color = new THREE.Color(pick(leafShade));
          } else if (r < 0.4) {
            color = new THREE.Color(pick(leafMid));
          } else {
            color = new THREE.Color(pick(leafDeep));

        } else if (voxel.role === "trunk") {
          const t = clamp((p.y - 5) / 9);
          const thick = 1.5 - t * 0.55;
          const ring = Math.atan2(p.z, Math.abs(p.x) > 0.01 ? p.x : 0.01);
          p.x = Math.cos(ring) * thick + (rng() - 0.5) * 0.2;
          p.z = Math.sin(ring) * thick + (rng() - 0.5) * 0.2;
          p.y = 4 + t * 10 + (rng() - 0.5) * 0.22;
          color = new THREE.Color(pick(bark));
        } else if (voxel.role === "grass" || voxel.role === "grassTuft") {
          p.x *= 1.12;
          p.z *= 1.12;
          p.y = Math.max(0, p.y) * 0.5;

        } else if (voxel.role === "underside") {

          p.z *= 1.02;
          p.y *= 0.7;

        } else if (voxel.role === "rock") {
          color = new THREE.Color(pick(soil)).multiplyScalar(0.85);

    function makeBaobabMap() {
      const bark = ["#a87858", "#9a6a48", "#b88868", "#8a5a3a", "#a06848", "#b07050", "#967050"];
      const barkShade = ["#5a3a25", "#6a4530", "#724935", "#7a503c", "#5a3528"];
      const barkLight = ["#c89878", "#d4a888", "#b88a68", "#c08868"];
      const leaves = ["#6a8a55", "#7a9a65", "#5a7848", "#88a572", "#6e9460", "#4f6e3e"];
      const savanna = ["#c8a050", "#b89048", "#a8853c", "#d0a858", "#a88040", "#b88c40", "#9c7836"];
      const soil = ["#6a3a1a", "#5a2e15", "#7a4520", "#4a2812", "#6c3a1c", "#854c22"];
      const sun = ["#ff9050", "#e87830", "#ff7530", "#f08a40"];

      const trunkBaseY = -1;
      const trunkTopY = 15.5;
      const trunkH = trunkTopY - trunkBaseY;

      const trunkRadius = (yt) => {
        const t = clamp((yt - trunkBaseY) / trunkH);
        return 4.6 - 1.05 * t + Math.sin(t * Math.PI) * 0.45;
      };

      const branchCount = 11;
      const branches = [];
      for (let i = 0; i < branchCount; i++) {
        const a = (i / branchCount) * Math.PI * 2 + 0.27;
        branches.push({
          cosA: Math.cos(a),
          sinA: Math.sin(a),
          length: 5.4 + (i % 4) * 0.8,
          lift: 1.6 + ((i * 37) % 5) * 0.35
        });
      }
      const branchStartR = trunkRadius(trunkTopY) - 0.5;
      const clumpCount = 14;
      const clumps = [];
      for (let i = 0; i < clumpCount; i++) {
        const b = branches[i % branchCount];
        const radial = branchStartR + b.length + ((i * 0.37) % 1) * 0.9;
        const off = ((i * 17) % branchCount) / branchCount * 0.35;
        const ca = b.cosA + (((i * 13) % 7) - 3) * 0.04;
        const sa = b.sinA + (((i * 19) % 7) - 3) * 0.04;
        clumps.push({
          x: ca * radial + off,
          y: trunkTopY + b.lift + 0.5 + ((i * 0.29) % 1) * 1.1,
          z: sa * radial - off
        });
      }

      return makeMap((voxel) => {
        const p = voxel.base.clone();
        let color = voxel.color.clone();
        if (voxel.role === "leaf") {
          const s = voxel.seed;
          if (s < 0.62) {
            const ringT = s / 0.62;
            const yt = trunkBaseY + ringT * trunkH;
            const angle = Math.atan2(voxel.base.z, voxel.base.x || 0.001) + s * Math.PI * 5.5;
            const radius = trunkRadius(yt) + (rng() - 0.5) * 0.5;
            p.x = Math.cos(angle) * radius + (rng() - 0.5) * 0.28;
            p.z = Math.sin(angle) * radius + (rng() - 0.5) * 0.28;
            p.y = yt + (rng() - 0.5) * 0.55;
            const lit = Math.cos(angle) > 0.1;
            color = new THREE.Color(pick(lit ? (rng() < 0.45 ? barkLight : bark) : (rng() < 0.55 ? barkShade : bark)));
          } else if (s < 0.93) {
            const bi = Math.floor(((s - 0.62) / 0.31) * branchCount) % branchCount;
            const b = branches[bi];
            const along = ((s * 173.3 + voxel.base.y * 0.11) % 1);
            const r0 = branchStartR + along * b.length;
            const taper = 0.55 * (1 - along) + 0.18;
            p.x = b.cosA * r0 + (rng() - 0.5) * taper * 1.6;
            p.z = b.sinA * r0 + (rng() - 0.5) * taper * 1.6;
            p.y = trunkTopY + along * b.lift + Math.sin(along * Math.PI) * 0.7 + (rng() - 0.5) * taper;
            color = new THREE.Color(pick(rng() < 0.4 ? barkShade : bark));
          } else {
            const ci = Math.floor(rng() * clumpCount);
            const c = clumps[ci];
            p.x = c.x + (rng() - 0.5) * 1.7;
            p.z = c.z + (rng() - 0.5) * 1.7;
            p.y = c.y + (rng() - 0.5) * 1.2;
            color = new THREE.Color(pick(leaves));
          }
        } else if (voxel.role === "trunk") {
          const t = clamp((p.y - 5) / 13);
          const yt = trunkBaseY + t * trunkH;
          const ring = Math.atan2(p.z, Math.abs(p.x) > 0.01 ? p.x : 0.01);
          const radius = trunkRadius(yt);
          p.x = Math.cos(ring) * radius + (rng() - 0.5) * 0.25;
          p.z = Math.sin(ring) * radius + (rng() - 0.5) * 0.25;
          p.y = yt + (rng() - 0.5) * 0.3;
          const lit = Math.cos(ring) > 0.1;
          color = new THREE.Color(pick(lit ? barkLight : bark));
        } else if (voxel.role === "grass" || voxel.role === "grassTuft") {
          p.x *= 1.35;
          p.z *= 1.35;
          p.y = Math.max(0, p.y) * 0.4;
          color = new THREE.Color(pick(savanna));
        } else if (voxel.role === "underside") {
          p.x *= 1.06;
          p.z *= 1.06;
          p.y *= 0.78;
          color = new THREE.Color(pick(soil));
        } else if (voxel.role === "rock") {
          color = new THREE.Color(pick(soil)).multiplyScalar(0.88);
        } else if (voxel.role === "flower" || voxel.role === "mushroom") {
          color = new THREE.Color(pick(rng() < 0.5 ? savanna : sun));
        }
        return [p, color];
      });
    }

    function makeMangroveMap() {
      const leafDeep = ["#1a3e22", "#1f4a26", "#163a1e", "#225228", "#1d4622", "#194020"];
      const leafMid = ["#2e6e34", "#358040", "#3a7a3c", "#447e40", "#3e7438", "#326e36"];

      const bark = ["#3a2a1c", "#4a3828", "#2e2018", "#5a4232", "#3e2c1e", "#523c2c"];
      const barkLight = ["#6a543e", "#7a6048", "#5e4838", "#806a52"];
      const rootBark = ["#3e2c1e", "#4a3624", "#5a4030", "#352618", "#4e3a28", "#634a36"];
      const waterShallow = ["#3b88a8", "#4a9ec0", "#5db0d0", "#62b8d8", "#4090b8", "#56a8c8"];
      const waterMid = ["#246a8a", "#1d5e7e", "#2d7898", "#1a5274", "#286c8e"];

      const foam = ["#b8e0ef", "#c8e8f2", "#a0d4e4", "#d4eef5"];

      const waterLevel = -3.2;
      const archCount = 12;
      const arches = [];
      for (let i = 0; i < archCount; i++) {
        const a = (i / archCount) * Math.PI * 2 + 0.27;
        arches.push({
          cosA: Math.cos(a),
          sinA: Math.sin(a),
          startY: 4.8 + ((i * 13) % 7) * 0.65,
          length: 4.8 + ((i * 7) % 5) * 0.55
        });
      }

      const rootRoles = new Set(["rock", "flower", "mushroom", "grassTuft"]);

      return makeMap((voxel) => {
        const p = voxel.base.clone();
        let color = voxel.color.clone();
        if (voxel.role === "leaf") {
          const dx = p.x;
          const dy = p.y - 17;
          const dz = p.z;
          const radius = Math.sqrt(dx * dx + dy * dy * 1.15 + dz * dz) || 1;
          const inv = 1 / radius;
          const targetR = 5.7 + (rng() - 0.5) * 1.3;
          const nx = dx * inv;
          const ny = dy * inv;
          const nz = dz * inv;
          p.x = nx * targetR + (rng() - 0.5) * 0.5;
          p.y = 17 + ny * targetR * 0.85 + (rng() - 0.5) * 0.5;
          p.z = nz * targetR + (rng() - 0.5) * 0.5;
          const topLit = ny > 0.25;
          const r = rng();
          let palette;
          if (topLit && r < 0.5) palette = leafLight;
          else if (ny < -0.2 && r < 0.55) palette = leafDeep;
          else palette = r < 0.55 ? leafMid : leafDeep;
          color = new THREE.Color(pick(palette));
        } else if (voxel.role === "trunk") {
          const t = clamp((p.y - 5) / 9);
          const thick = 1.15 + (1 - t) * 0.5;
          const ring = Math.atan2(p.z, Math.abs(p.x) > 0.01 ? p.x : 0.01);
          p.x = Math.cos(ring) * thick + Math.sin(p.y * 0.3) * 0.3 + (rng() - 0.5) * 0.18;
          p.z = Math.sin(ring) * thick + (rng() - 0.5) * 0.18;
          p.y = 4.5 + t * 11 + (rng() - 0.5) * 0.25;
          const lit = Math.cos(ring) > 0.2;
          color = new THREE.Color(pick(lit && rng() < 0.45 ? barkLight : bark));
        } else if (rootRoles.has(voxel.role)) {
          const idx = Math.floor(voxel.seed * archCount * 1.7) % archCount;
          const arch = arches[idx];
          const along = (voxel.seed * 31.7 + Math.abs(p.x) * 0.11 + Math.abs(p.z) * 0.09) % 1;
          const radial = along * arch.length;
          const archLift = Math.sin(along * Math.PI) * 1.2;
          const taper = 0.55 * (1 - along) + 0.22;
          p.x = arch.cosA * radial + (rng() - 0.5) * taper * 1.4;
          p.z = arch.sinA * radial + (rng() - 0.5) * taper * 1.4;
          const apex = arch.startY * (1 - along) + archLift;
          const dip = Math.max(0, along - 0.78) * (arch.startY + 5);
          p.y = apex - dip + (rng() - 0.5) * 0.22;
          color = new THREE.Color(pick(rootBark));
        } else if (voxel.role === "grass") {
          const radial = Math.sqrt(p.x * p.x + p.z * p.z);
          p.x *= 1.32;
          p.z *= 1.32;
          p.y = waterLevel + (rng() - 0.5) * 0.22;
          const r = rng();
          const palette = radial > 4.5 && r < 0.2 ? foam : waterShallow;
          color = new THREE.Color(pick(palette));
        } else if (voxel.role === "underside") {
          const depth = Math.abs(p.y);
          p.x *= 1.08;
          p.z *= 1.08;
          p.y = waterLevel - 0.5 - (depth - 1) * 0.55;
          let palette;
          if (depth < 2.5) palette = waterMid;
          else if (depth < 5) palette = waterDeep;
          else if (depth < 8) palette = waterDeep;
          else palette = mud;
          color = new THREE.Color(pick(palette));
        }
        return [p, color];
      });
    }

    function makeJacarandaMap() {
      const bloomDeep = ["#5c2c91", "#6733a5", "#7240b8", "#4f267f", "#7b4ac2"];
      const bloomMid = ["#8d5ce0", "#9867ea", "#a879f0", "#9060d8", "#b184f4", "#7f52cc"];
      const bloomPale = ["#c7a6ff", "#d2b8ff", "#bfa0f3", "#e0ccff", "#b994ee"];
      const leafGreen = ["#2f6b3c", "#357a43", "#286034", "#40804a", "#4c8d55"];
      const bark = ["#4a392e", "#5a4638", "#3e3028", "#6a5444", "#564235", "#332820"];
      const barkLight = ["#806858", "#907565", "#715c4e", "#9a8070"];
      const grass = ["#2e7a3b", "#3c8a45", "#4a984e", "#236a34", "#5aa65a"];
      const soil = ["#3a2a1d", "#4c3422", "#2d2118", "#5a3d28", "#463020"];
      const lavender = ["#9a6be8", "#b08af5", "#7b4cc4", "#c3a5ff"];

      const trunkPath = [
        [0, 4.2, 0],
        [-0.4, 7.2, 0.1],
        [0.2, 10.0, -0.1],
        [0.9, 12.8, 0.2],
        [0.4, 15.2, 0]
      ];

      const branches = [
        { angle: -2.8, start: 0.34, length: 7.0, lift: 1.9 },
        { angle: -2.05, start: 0.45, length: 5.8, lift: 2.8 },
        { angle: -1.18, start: 0.58, length: 6.6, lift: 2.3 },
        { angle: -0.38, start: 0.42, length: 7.7, lift: 1.6 },
        { angle: 0.55, start: 0.52, length: 6.4, lift: 2.4 },
        { angle: 1.38, start: 0.37, length: 7.2, lift: 1.8 },
        { angle: 2.28, start: 0.62, length: 5.6, lift: 2.5 }
      ];

      const blossomClusters = branches.flatMap((branch, i) => {
        const base = samplePath(trunkPath, branch.start);
        return [0.72, 0.93].map((along, j) => {
          const sway = Math.sin(i * 1.7 + j) * 0.85;
          return {
            x: base.x + Math.cos(branch.angle) * branch.length * along + Math.cos(branch.angle + Math.PI / 2) * sway,
            y: base.y + branch.lift * along + Math.sin(along * Math.PI) * 1.2 + j * 0.45,
            z: base.z + Math.sin(branch.angle) * branch.length * along + Math.sin(branch.angle + Math.PI / 2) * sway,
            rx: 1.6 + (i % 3) * 0.35,
            ry: 1.0 + j * 0.25,
            rz: 1.45 + ((i + j) % 3) * 0.32
          };
        });
      });
      blossomClusters.push({ x: 0.2, y: 17.7, z: -0.3, rx: 2.0, ry: 1.15, rz: 1.9 });

      return makeMap((voxel) => {
        const p = voxel.base.clone();
        let color = voxel.color.clone();
        if (voxel.role === "leaf") {
          const s = voxel.seed;
          if (s < 0.24) {
            const branch = branches[Math.floor(s * branches.length * 4.17) % branches.length];
            const along = (s * 29.7 + p.y * 0.037 + Math.abs(p.x) * 0.021) % 1;
            const base = samplePath(trunkPath, branch.start);
            const taper = 0.42 * (1 - along) + 0.12;
            const side = Math.sin(s * 80.0) * taper;
            p.x = base.x + Math.cos(branch.angle) * branch.length * along + Math.cos(branch.angle + Math.PI / 2) * side + (rng() - 0.5) * taper;
            p.z = base.z + Math.sin(branch.angle) * branch.length * along + Math.sin(branch.angle + Math.PI / 2) * side + (rng() - 0.5) * taper;
            p.y = base.y + branch.lift * along + Math.sin(along * Math.PI) * 1.4 + (rng() - 0.5) * taper;
            color = new THREE.Color(pick(rng() < 0.24 ? barkLight : bark));
          } else {
            const cluster = blossomClusters[Math.floor((s * 97.0 + p.x * 0.19 + p.z * 0.13) % blossomClusters.length)];
            const a = s * Math.PI * 17.0 + p.x * 0.31;
            const r = Math.sqrt((s * 13.7 + Math.abs(p.z) * 0.07) % 1);
            const vertical = Math.sin(s * Math.PI * 23.0 + p.y) * 0.8;
            p.x = cluster.x + Math.cos(a) * r * cluster.rx + (rng() - 0.5) * 0.38;
            p.z = cluster.z + Math.sin(a) * r * cluster.rz + (rng() - 0.5) * 0.38;
            p.y = cluster.y + vertical * cluster.ry + (rng() - 0.5) * 0.32;
            if (s > 0.86 && rng() < 0.7) {
              p.x += (rng() - 0.5) * 1.8;
              p.z += (rng() - 0.5) * 1.8;
              color = new THREE.Color(pick(leafGreen));
            } else {
              const palette = s > 0.68 ? bloomPale : s > 0.42 ? bloomMid : bloomDeep;
              color = new THREE.Color(pick(palette));
            }
          }
        } else if (voxel.role === "trunk") {
          const t = clamp((p.y - 5) / 9);
          const curve = samplePath(trunkPath, t);
          const ring = Math.atan2(p.z, Math.abs(p.x) > 0.01 ? p.x : 0.01);
          const thick = 1.18 - t * 0.38;
          p.x = curve.x + Math.cos(ring) * thick + (rng() - 0.5) * 0.15;
          p.z = curve.z + Math.sin(ring) * thick + (rng() - 0.5) * 0.15;
          p.y = curve.y + (rng() - 0.5) * 0.22;
          color = new THREE.Color(pick(Math.cos(ring) > 0.18 ? barkLight : bark));
        } else if (voxel.role === "grass" || voxel.role === "grassTuft") {
          p.x *= 1.08;
          p.z *= 1.08;
          p.y = Math.max(0, p.y) * 0.48;
          color = new THREE.Color(pick(grass));
        } else if (voxel.role === "underside") {
          p.x *= 1.02;
          p.z *= 1.02;
          p.y *= 0.62;
          color = new THREE.Color(pick(soil));
        } else if (voxel.role === "rock") {
          color = new THREE.Color(pick(soil)).multiplyScalar(0.88);
        } else if (voxel.role === "flower" || voxel.role === "mushroom") {
          const cluster = blossomClusters[Math.floor(voxel.seed * blossomClusters.length) % blossomClusters.length];
          const a = rng() * Math.PI * 2;
          const r = Math.sqrt(rng());
          p.x = cluster.x + Math.cos(a) * r * cluster.rx * 0.8;
          p.z = cluster.z + Math.sin(a) * r * cluster.rz * 0.8;
          p.y = cluster.y + (rng() - 0.5) * cluster.ry * 1.5;
          color = new THREE.Color(pick(lavender));
        }
        return [p, color];
      });
    }

    function makeBanyanMap() {

      const soil = ["#4a2f1c", "#5c3a22", "#3a2618", "#6a452a", "#2e2015"];

      const trunkPath = [
        [0, 3.7, 0],
        [-0.3, 6.2, 0.2],

        { angle: -3.0, start: 0.36, length: 16.6, lift: 1.2, sag: 1.1, thick: 0.95 },
        { angle: -2.52, start: 0.42, length: 14.8, lift: 2.1, sag: 0.85, thick: 0.78 },

          const z = base.z + Math.sin(limb.angle) * limb.length * along + Math.sin(limb.angle + Math.PI / 2) * side;
          return {
            x,
            z,
            y: base.y + limb.lift * along + Math.sin(along * Math.PI) * 1.3 - limb.sag * along * along + 3.0 + j * 0.45,
            rx: 3.6 + (i % 3) * 0.65 + j * 0.3,
            ry: 1.8 + (j % 2) * 0.35,
            rz: 3.1 + ((i + j) % 3) * 0.7
          };
        });
      });
      canopies.push({ x: 0.4, y: 16.7, z: 0.2, rx: 5.0, ry: 2.3, rz: 4.5 });

      const aerialRoots = limbs.map((limb, i) => {
        const base = samplePath(trunkPath, limb.start);
        const along = 0.42 + (i % 4) * 0.15;
        const side = Math.sin(i * 2.1) * 0.7;
        const anchorX = base.x + Math.cos(limb.angle) * limb.length * along + Math.cos(limb.angle + Math.PI / 2) * side;
        const anchorZ = base.z + Math.sin(limb.angle) * limb.length * along + Math.sin(limb.angle + Math.PI / 2) * side;
        const anchorY = base.y + limb.lift * along + Math.sin(along * Math.PI) * 1.3 - limb.sag * along * along;
        return {
          x: anchorX,
          y: anchorY,
          z: anchorZ,
          sway: 0.18 + (i % 3) * 0.07,
          reach: Math.max(5.8, anchorY - 0.2)
        };
      });

      const buttressRoots = Array.from({ length: 16 }, (_, i) => {
        const angle = (i / 16) * Math.PI * 2 + 0.18 + Math.sin(i * 1.7) * 0.08;
        return {
          angle,
          length: 5.0 + (i % 5) * 0.7,
          width: 0.65 + (i % 4) * 0.15
        };
      });

      return makeMap((voxel) => {
        const p = voxel.base.clone();
        let color = voxel.color.clone();
        if (voxel.role === "leaf") {
          const s = voxel.seed;
          if (s < 0.16) {
            const root = buttressRoots[Math.floor(s * buttressRoots.length * 13.0) % buttressRoots.length];
            const along = (s * 61.0 + Math.abs(p.x) * 0.043 + p.y * 0.017) % 1;
            const width = root.width * (1 - along * 0.62) + 0.18;
            const side = Math.sin(s * 103.0 + p.z) * width;
            p.x = Math.cos(root.angle) * root.length * along + Math.cos(root.angle + Math.PI / 2) * side + (rng() - 0.5) * width * 0.5;
            p.z = Math.sin(root.angle) * root.length * along + Math.sin(root.angle + Math.PI / 2) * side + (rng() - 0.5) * width * 0.5;
            p.y = 3.15 - along * 2.45 + Math.sin(along * Math.PI) * 0.55 + (rng() - 0.5) * 0.18;
            color = new THREE.Color(pick(along < 0.18 ? barkLight : rootBark));
          } else if (s < 0.44) {
            const limb = limbs[Math.floor(s * limbs.length * 5.2) % limbs.length];
            const along = (s * 37.0 + p.y * 0.045 + Math.abs(p.z) * 0.018) % 1;
            const base = samplePath(trunkPath, limb.start);
            const taper = limb.thick * (1 - along * 0.68) + 0.22;
            const side = Math.sin(s * 92.0 + p.x) * taper;
            const vertical = Math.cos(s * 61.0 + p.z) * taper * 0.58;
            p.x = base.x + Math.cos(limb.angle) * limb.length * along + Math.cos(limb.angle + Math.PI / 2) * side + (rng() - 0.5) * taper * 0.5;
            p.z = base.z + Math.sin(limb.angle) * limb.length * along + Math.sin(limb.angle + Math.PI / 2) * side + (rng() - 0.5) * taper * 0.5;
            p.y = base.y + limb.lift * along + Math.sin(along * Math.PI) * 1.3 - limb.sag * along * along + vertical + (rng() - 0.5) * 0.16;
            color = new THREE.Color(pick(along < 0.22 || Math.cos(limb.angle) > 0.25 ? barkLight : bark));
          } else if (s < 0.58) {
            const root = aerialRoots[Math.floor(s * aerialRoots.length * 7.0) % aerialRoots.length];
            const drop = (s * 43.0 + p.y * 0.031 + Math.abs(p.x) * 0.017) % 1;
            p.x = root.x + Math.sin(drop * Math.PI * 4 + s * 30.0) * root.sway + (rng() - 0.5) * 0.14;
            p.z = root.z + Math.cos(drop * Math.PI * 3 + s * 25.0) * root.sway + (rng() - 0.5) * 0.14;
            p.y = root.y - drop * root.reach + (rng() - 0.5) * 0.2;
            color = new THREE.Color(pick(drop > 0.76 ? rootBark : barkDark));
          } else {
            const cluster = canopies[Math.floor((s * 131.0 + p.x * 0.11 + p.z * 0.17) % canopies.length)];
            const a = s * Math.PI * 29.0 + p.z * 0.2;
            const r = Math.sqrt((s * 19.3 + Math.abs(p.x) * 0.043) % 1);
            const height = Math.sin(s * Math.PI * 23.0 + p.y * 0.4);
            p.x = cluster.x + Math.cos(a) * r * cluster.rx + (rng() - 0.5) * 0.5;
            p.z = cluster.z + Math.sin(a) * r * cluster.rz + (rng() - 0.5) * 0.5;
            p.y = cluster.y + height * cluster.ry + (rng() - 0.5) * 0.38;
            const palette = height > 0.45 ? leafLight : r > 0.72 ? leafMid : leafDeep;
            color = new THREE.Color(pick(palette));
          }
        } else if (voxel.role === "trunk") {
          const t = clamp((p.y - 5) / 9);
          const curve = samplePath(trunkPath, t);
          const ring = Math.atan2(p.z, Math.abs(p.x) > 0.01 ? p.x : 0.01);
          const baseBias = (1 - t) * (1 - t);
          const lobe = 1 + Math.sin(ring * 6 + t * 2.4) * 0.16 * (1 - t);
          const flare = (3.65 - t * 1.35 + Math.sin(t * Math.PI) * 0.42 + baseBias * 0.75) * lobe;
          p.x = curve.x + Math.cos(ring) * flare + (rng() - 0.5) * 0.22;
          p.z = curve.z + Math.sin(ring) * flare * 0.96 + (rng() - 0.5) * 0.22;
          p.y = curve.y - baseBias * 0.42 + (rng() - 0.5) * 0.24;
          color = new THREE.Color(pick(Math.cos(ring) > -0.05 ? barkLight : bark));
        } else if (voxel.role === "flower" || voxel.role === "mushroom" || voxel.role === "grassTuft") {
          const root = aerialRoots[Math.floor(voxel.seed * aerialRoots.length * 3.0) % aerialRoots.length];
          const drop = (voxel.seed * 17.0 + Math.abs(p.z) * 0.11) % 1;
          p.x = root.x + Math.sin(drop * Math.PI * 5 + voxel.seed * 20.0) * (root.sway + 0.08) + (rng() - 0.5) * 0.12;
          p.z = root.z + Math.cos(drop * Math.PI * 4 + voxel.seed * 19.0) * (root.sway + 0.08) + (rng() - 0.5) * 0.12;
          p.y = root.y - drop * root.reach + (rng() - 0.5) * 0.16;
          color = new THREE.Color(pick(rootBark));
        } else if (voxel.role === "grass") {
          p.x *= 1.35;
          p.z *= 1.35;
          p.y = Math.max(0, p.y) * 0.4;
          color = new THREE.Color(pick(grass));
        } else if (voxel.role === "underside") {
          p.x *= 1.12;
          p.z *= 1.12;
          p.y *= 0.68;
          color = new THREE.Color(pick(soil));
        } else if (voxel.role === "rock") {
          const root = buttressRoots[Math.floor(voxel.seed * buttressRoots.length * 2.0) % buttressRoots.length];
          const along = 0.32 + ((voxel.seed * 29.0 + Math.abs(p.x) * 0.08) % 0.68);
          const width = root.width * (1 - along * 0.5) + 0.22;
          const side = Math.sin(voxel.seed * 72.0 + p.z) * width;
          p.x = Math.cos(root.angle) * root.length * along + Math.cos(root.angle + Math.PI / 2) * side + (rng() - 0.5) * width * 0.45;
          p.z = Math.sin(root.angle) * root.length * along + Math.sin(root.angle + Math.PI / 2) * side + (rng() - 0.5) * width * 0.45;
          p.y = 2.7 - along * 2.25 + Math.sin(along * Math.PI) * 0.34 + (rng() - 0.5) * 0.16;
          color = new THREE.Color(pick(rootBark)).multiplyScalar(0.9);
        }
        return [p, color];
      });
    }

    function makeBananaMap() {
      const leafDeep = ["#1f5a24", "#246629", "#1b4f20", "#2c6e2f", "#19481d"];

      const rib = ["#d1d66a", "#bfd05a", "#e0e685", "#a9c34c"];
      const sheath = ["#7b5a32", "#8a673d", "#6a4828", "#9a7446", "#5a3a22"];
      const sheathGreen = ["#486d2e", "#557c38", "#3f6328", "#6c8e45"];
      const banana = ["#f5d529", "#ffd83d", "#eac41f", "#ffe45a", "#d9b51c"];
      const bananaTip = ["#7a6530", "#6a5528", "#5a4720", "#4a3818"];

      const bunchAnchor = { x: -1.65, y: 13.25, z: 1.08 };
      const leaves = [
        { angle: -2.88, length: 8.1, width: 1.32, rise: 2.0, lift: 1.1, droop: 3.8 },
        { angle: -2.28, length: 9.4, width: 1.64, rise: 3.0, lift: 1.8, droop: 2.8 },
        { angle: -1.55, length: 8.4, width: 1.52, rise: 4.2, lift: 3.0, droop: 0.9 },
        { angle: -0.78, length: 9.6, width: 1.75, rise: 3.3, lift: 1.9, droop: 2.4 },
        { angle: -0.08, length: 8.5, width: 1.42, rise: 2.1, lift: 0.7, droop: 4.4 },
        { angle: 0.58, length: 9.0, width: 1.58, rise: 3.8, lift: 2.5, droop: 1.4 },
        { angle: 1.35, length: 7.9, width: 1.34, rise: 4.4, lift: 3.4, droop: 0.8 },
        { angle: 2.18, length: 9.2, width: 1.68, rise: 2.6, lift: 1.4, droop: 3.1 },
        { angle: 2.86, length: 7.4, width: 1.23, rise: 1.6, lift: 0.8, droop: 3.9 }

      const placeBanana = (voxel, p) => {
        const s = voxel.seed;
        const row = Math.floor(s * 38) % 5;
        const col = Math.floor(s * 127) % 7;
        const u = (s * 29.7 + Math.abs(p.x) * 0.093 + Math.abs(p.z) * 0.071 + p.y * 0.019) % 1;
        const fan = (col - 3) * 0.24 + Math.sin(row * 1.7) * 0.06;
        const arc = (u - 0.5) * 1.35;
        const curl = Math.sin(u * Math.PI);
        p.x = bunchAnchor.x + fan + arc * 0.35 + curl * 0.12 + (rng() - 0.5) * 0.08;
        p.z = bunchAnchor.z + row * 0.16 - col * 0.035 + (rng() - 0.5) * 0.1;
        p.y = bunchAnchor.y - row * 0.48 - u * 1.25 + curl * 0.42 + (rng() - 0.5) * 0.09;
        if (u < 0.11 || u > 0.9) return new THREE.Color(pick(bananaTip));
        return new THREE.Color(pick(banana));
      };

      const placeLeafBlade = (voxel, p) => {
        const s = voxel.seed;
        if (s < 0.17) {
          const t = (s * 7.3 + p.y * 0.033 + Math.abs(p.x) * 0.021) % 1;
          const side = ((s * 41.0 + p.z * 0.13) % 1 - 0.5) * 1.25 * Math.sin(t * Math.PI);
          p.x = side + Math.sin(t * Math.PI * 1.2) * 0.28 + (rng() - 0.5) * 0.08;
          p.z = 0.1 + Math.cos(t * Math.PI) * 0.18 + (rng() - 0.5) * 0.16;
          p.y = crown.y + t * 9.7 + Math.sin(t * Math.PI) * 0.75;
          return new THREE.Color(pick(t < 0.18 || Math.abs(side) < 0.14 ? rib : leafLight));
        }

        const shifted = (s - 0.17) / 0.83;
        const blade = leaves[Math.floor(shifted * leaves.length) % leaves.length];
        const u = (shifted * 19.0 + Math.abs(p.y) * 0.037 + Math.abs(p.x) * 0.019) % 1;
        const edgeSeed = (s * 83.0 + p.z * 0.17 + p.x * 0.09) % 1;
        const bladeWidth = blade.width * Math.sin(Math.PI * u) * (0.72 + 0.18 * Math.sin(u * Math.PI * 3));
        const side = (edgeSeed - 0.5) * 2 * bladeWidth;
        const ragged = Math.abs(side) > bladeWidth * 0.72 && rng() < 0.42;
        const split = Math.abs(side) < bladeWidth * 0.09;
        const dirX = Math.cos(blade.angle);
        const dirZ = Math.sin(blade.angle);
        const sideX = Math.cos(blade.angle + Math.PI / 2);
        const sideZ = Math.sin(blade.angle + Math.PI / 2);
        const ripple = Math.sin(u * Math.PI * 7 + s * 23.0) * 0.14;
        const tear = ragged ? (rng() - 0.5) * 0.55 : 0;
        p.x = crown.x + dirX * blade.length * u + sideX * (side + tear) + (rng() - 0.5) * 0.12;
        p.z = crown.z + dirZ * blade.length * u + sideZ * (side + tear) + (rng() - 0.5) * 0.12;
        p.y = crown.y + blade.rise * Math.sin(u * Math.PI * 0.72) + blade.lift * u - blade.droop * u * u + ripple + (split ? 0.15 : 0);
        if (split) return new THREE.Color(pick(rib));
        if (ragged) return new THREE.Color(pick(rng() < 0.4 ? leafDeep : leafMid)).multiplyScalar(0.9);
        return new THREE.Color(pick(u < 0.2 || edgeSeed > 0.78 ? leafLight : leafMid));
      };

      return makeMap((voxel) => {
        const p = voxel.base.clone();
        let color = voxel.color.clone();
        if (voxel.role === "leaf") {
          if (voxel.seed < 0.14) {
            const t = (voxel.seed * 8.0 + p.y * 0.042 + Math.abs(p.x) * 0.017) % 1;
            const angle = voxel.seed * Math.PI * 16 + p.z * 0.22;
            const radius = 0.72 + 0.55 * (1 - t) + Math.sin(t * Math.PI * 5) * 0.08;
            p.x = Math.cos(angle) * radius + Math.sin(t * Math.PI * 2) * 0.22 + (rng() - 0.5) * 0.1;
            p.z = Math.sin(angle) * radius * 0.85 + (rng() - 0.5) * 0.1;
            p.y = 1.2 + t * 14.0 + (rng() - 0.5) * 0.18;

          }
        } else if (voxel.role === "trunk") {
          const t = clamp((p.y - 5) / 9);
          const angle = Math.atan2(p.z, Math.abs(p.x) > 0.01 ? p.x : 0.01) + t * 0.65;
          const radius = 1.28 - t * 0.36 + Math.sin(t * Math.PI * 8 + angle) * 0.08;
          p.x = Math.cos(angle) * radius + (rng() - 0.5) * 0.1;
          p.z = Math.sin(angle) * radius * 0.82 + (rng() - 0.5) * 0.1;
          p.y = 1.1 + t * 13.8 + (rng() - 0.5) * 0.18;
          color = new THREE.Color(pick(t > 0.72 ? sheathGreen : sheath));
        } else if (voxel.role === "flower" || voxel.role === "mushroom") {
          color = placeBanana(voxel, p);
        } else if (voxel.role === "grassTuft") {
          const t = (voxel.seed * 13.0 + Math.abs(p.x) * 0.06) % 1;
          const angle = voxel.seed * Math.PI * 18;
          const radius = 1.1 + t * 1.4;
          p.x = Math.cos(angle) * radius + (rng() - 0.5) * 0.1;
          p.z = Math.sin(angle) * radius + (rng() - 0.5) * 0.1;
          p.y = 0.9 + t * 5.2 + (rng() - 0.5) * 0.14;
          color = new THREE.Color(pick(t > 0.48 ? sheathGreen : sheath));
        } else if (voxel.role === "grass") {
          p.x *= 1.2;
          p.z *= 1.2;
          p.y = Math.max(0, p.y) * 0.42;
          color = new THREE.Color(pick(grass));
        } else if (voxel.role === "underside") {
          p.x *= 1.05;
          p.z *= 1.05;
          p.y *= 0.66;
          color = new THREE.Color(pick(soil));
        } else if (voxel.role === "rock") {
          p.x *= 0.9;
          p.z *= 0.9;
          p.y = Math.min(p.y, 0.55);
          color = new THREE.Color(pick(soil)).multiplyScalar(0.86);
        }
        return [p, color];
      });
    }
