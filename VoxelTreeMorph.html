      };

      const placeFrond = (voxel, p) => {
        const s = voxel.seed;
        const blade = fronds[Math.floor((s * 97.0 + Math.abs(p.x) * 0.13 + p.z * 0.07) % fronds.length)];
        const u = (s * 19.0 + Math.abs(p.y) * 0.039 + Math.abs(p.x) * 0.021) % 1;
        const leafletSeed = (s * 83.0 + p.z * 0.17 + p.x * 0.09) % 1;
        const width = blade.width * Math.sin(Math.PI * u) * (0.62 + 0.18 * Math.sin(u * Math.PI * 5));
        const ribSide = (leafletSeed - 0.5) * 2 * width;
        const split = Math.abs(ribSide) < width * 0.13;
        const ragged = Math.abs(ribSide) > width * 0.72 && rng() < 0.35;
        const dirX = Math.cos(blade.angle);
        const dirZ = Math.sin(blade.angle);
        const sideX = Math.cos(blade.angle + Math.PI / 2);
        const sideZ = Math.sin(blade.angle + Math.PI / 2);
        const ripple = Math.sin(u * Math.PI * 9 + s * 23.0) * 0.13;
        const serration = ragged ? (rng() - 0.5) * 0.42 : 0;
        p.x = crown.x + dirX * blade.length * u + sideX * (ribSide + serration) + (rng() - 0.5) * 0.1;
        p.z = crown.z + dirZ * blade.length * u + sideZ * (ribSide + serration) + (rng() - 0.5) * 0.1;
        p.y = crown.y + blade.rise * Math.sin(u * Math.PI * 0.74) + blade.lift * u - blade.droop * u * u + ripple;
        if (split) return new THREE.Color(pick(rib));
        if (ragged || u > 0.84) return new THREE.Color(pick(rng() < 0.32 ? dryFrond : frondDeep)).multiplyScalar(0.92);
        if (u < 0.18 || leafletSeed > 0.76) return new THREE.Color(pick(frondLight));
        return new THREE.Color(pick(rng() < 0.58 ? frondMid : frondDeep));
      };

      return makeMap((voxel) => {
        const p = voxel.base.clone();
        let color = voxel.color.clone();
        if (voxel.role === "leaf") {
          if (voxel.seed < 0.2) {
            color = placeTrunkFiber(voxel, p);
          } else if (voxel.seed < 0.35) {
            color = placeDateBunch(voxel, p);
          } else {
            color = placeFrond(voxel, p);
          }
        } else if (voxel.role === "trunk") {
          const t = clamp((p.y - 5) / 9);
          const center = samplePath(trunkPath, t);
          const angle = Math.atan2(p.z, Math.abs(p.x) > 0.01 ? p.x : 0.01) + t * 1.1;
          const ridge = Math.sin(t * Math.PI * 30) > 0.34;
          const radius = 1.02 - t * 0.28 + (ridge ? 0.16 : 0);
          p.x = center.x + Math.cos(angle) * radius + (rng() - 0.5) * 0.08;
          p.z = center.z + Math.sin(angle) * radius * 0.86 + (rng() - 0.5) * 0.08;
          p.y = center.y + (rng() - 0.5) * 0.18;
          color = new THREE.Color(pick(ridge ? barkLight : bark));
        } else if (voxel.role === "flower" || voxel.role === "mushroom") {
          color = placeDateBunch(voxel, p);
        } else if (voxel.role === "grassTuft") {
          const s = voxel.seed;
          const blade = fronds[Math.floor(s * fronds.length) % fronds.length];
          const u = 0.08 + ((s * 17.0 + Math.abs(p.x) * 0.04) % 0.62);
          const side = ((s * 43.0 + p.z * 0.1) % 1 - 0.5) * 0.55;
          const dirX = Math.cos(blade.angle);
          const dirZ = Math.sin(blade.angle);
          const sideX = Math.cos(blade.angle + Math.PI / 2);
          const sideZ = Math.sin(blade.angle + Math.PI / 2);
          p.x = crown.x + dirX * blade.length * u * 0.42 + sideX * side + (rng() - 0.5) * 0.08;
          p.z = crown.z + dirZ * blade.length * u * 0.42 + sideZ * side + (rng() - 0.5) * 0.08;
          p.y = crown.y - 0.7 - u * 3.5 + Math.sin(u * Math.PI) * 0.45;
          color = new THREE.Color(pick(dryFrond));
        } else if (voxel.role === "grass") {
          p.x *= 1.28;
          p.z *= 1.28;
          p.y = Math.max(0, p.y) * 0.34;
          color = new THREE.Color(pick(sand));
        } else if (voxel.role === "underside") {
          p.x *= 1.06;
          p.z *= 1.06;
          p.y *= 0.62;
          color = new THREE.Color(pick(soil));
        } else if (voxel.role === "rock") {
          p.x *= 0.95;
          p.z *= 0.95;
          p.y = Math.min(p.y, 0.35);
          color = new THREE.Color(pick(rng() < 0.45 ? stone : soil)).multiplyScalar(0.86);
        }
        return [p, color];
      });
    }

    function makeWeepingWillowMap() {
      const leafDeep = ["#1f5a35", "#28683f", "#194b2e", "#2d7043", "#225f39"];
      const leafMid = ["#4a9a56", "#58aa62", "#3f8e4c", "#65b76b", "#4f9f58", "#5aa85a"];
      const leafLight = ["#83c96f", "#94d87f", "#78bd66", "#a6e18e", "#8bd077"];
      const leafYellow = ["#b2c86d", "#c0d37a", "#a5bc62", "#d1df8a"];
      const whiteBark = ["#f4ead9", "#fff4df", "#e8dfcf", "#d9d1c4", "#f8f0e6"];
      const barkShade = ["#b8aa94", "#c8baa5", "#a9967e", "#d2c7b6"];
      const barkLine = ["#806d57", "#917c63", "#6e5e4d", "#a0886d"];
      const grass = ["#3f8a3d", "#4b9848", "#5aa655", "#367c38", "#6bb760"];
      const moss = ["#5a9d54", "#6baa62", "#78b86e", "#4f8f4a"];
      const soil = ["#4a3520", "#5c4328", "#3a2a1b", "#6a4f30", "#2e2116"];
      const stone = ["#a89f91", "#918879", "#b8afa0", "#80776b"];

      const trunkPath = [
        [0, 0.45, 0],
        [-0.32, 5.0, 0.16],
        [0.26, 9.3, -0.12],
        [-0.12, 13.0, 0.1],
        [0.18, 16.2, 0]
      ];

      const limbs = [
        { angle: -2.95, start: 0.54, length: 10.6, lift: 2.8, sag: 2.1, hang: 9.8 },
        { angle: -2.48, start: 0.62, length: 9.5, lift: 3.2, sag: 1.8, hang: 8.9 },
        { angle: -1.96, start: 0.66, length: 11.2, lift: 2.9, sag: 2.0, hang: 10.0 },
        { angle: -1.34, start: 0.72, length: 9.0, lift: 3.5, sag: 1.4, hang: 8.4 },
        { angle: -0.78, start: 0.58, length: 11.6, lift: 2.6, sag: 2.4, hang: 10.2 },
        { angle: -0.18, start: 0.64, length: 10.0, lift: 3.0, sag: 2.0, hang: 9.5 },
        { angle: 0.42, start: 0.56, length: 11.8, lift: 2.7, sag: 2.3, hang: 10.4 },
        { angle: 1.04, start: 0.68, length: 9.2, lift: 3.4, sag: 1.6, hang: 8.8 },
        { angle: 1.58, start: 0.72, length: 10.4, lift: 3.1, sag: 1.8, hang: 9.4 },
        { angle: 2.16, start: 0.6, length: 11.4, lift: 2.8, sag: 2.2, hang: 10.0 },
        { angle: 2.72, start: 0.54, length: 10.2, lift: 2.6, sag: 2.1, hang: 9.7 }
      ];

      const limbPoint = (limb, along) => {
        const base = samplePath(trunkPath, limb.start);
        const lift = limb.lift * Math.sin(along * Math.PI * 0.82);
        const sag = limb.sag * along * along;
        return {
          x: base.x + Math.cos(limb.angle) * limb.length * along,
          y: base.y + lift - sag,
          z: base.z + Math.sin(limb.angle) * limb.length * along
        };
      };

      const placeWhiteTrunk = (voxel, p) => {
        const t = clamp((voxel.base.y - 4.8) / 10.8);
        const center = samplePath(trunkPath, t);
        const angle = Math.atan2(voxel.base.z, Math.abs(voxel.base.x) > 0.01 ? voxel.base.x : 0.01) + t * 0.85;
        const ripple = Math.sin(t * Math.PI * 18 + angle * 5);
        const radius = 1.65 - t * 0.52 + ripple * 0.08;
        p.x = center.x + Math.cos(angle) * radius + (rng() - 0.5) * 0.12;
        p.z = center.z + Math.sin(angle) * radius * 0.92 + (rng() - 0.5) * 0.12;
        p.y = center.y + (rng() - 0.5) * 0.2;
        const lit = Math.cos(angle) > -0.1;
        if (ripple > 0.72) return new THREE.Color(pick(barkLine));
        return new THREE.Color(pick(lit ? whiteBark : barkShade));
      };

      const placeWhiteLimb = (voxel, p) => {
        const s = voxel.seed;
        const limb = limbs[Math.floor((s * 67.0 + Math.abs(voxel.base.z) * 0.13) % limbs.length)];
        const along = (s * 31.0 + Math.abs(voxel.base.y) * 0.041 + Math.abs(voxel.base.x) * 0.019) % 1;
        const branch = limbPoint(limb, along);
        const taper = 0.92 * (1 - along) + 0.2;
        const side = Math.sin(s * 91.0 + voxel.base.z) * taper;
        p.x = branch.x + Math.cos(limb.angle + Math.PI / 2) * side + (rng() - 0.5) * taper * 0.5;
        p.z = branch.z + Math.sin(limb.angle + Math.PI / 2) * side + (rng() - 0.5) * taper * 0.5;
        p.y = branch.y + Math.cos(s * 47.0 + voxel.base.x) * taper * 0.55 + (rng() - 0.5) * 0.14;
        return new THREE.Color(pick(along < 0.28 || Math.cos(limb.angle) > 0.15 ? whiteBark : barkShade));
      };

      const placeCurtainLeaf = (voxel, p) => {
        const s = voxel.seed;
        const limb = limbs[Math.floor((s * 97.0 + Math.abs(p.x) * 0.11 + p.z * 0.07) % limbs.length)];
        const along = 0.56 + ((s * 23.0 + Math.abs(p.z) * 0.035) % 0.4);
        const drop = (s * 43.0 + Math.abs(p.y) * 0.037 + Math.abs(p.x) * 0.021) % 1;
        const anchor = limbPoint(limb, along);
        const sideSeed = (s * 137.0 + p.z * 0.15 + p.x * 0.08) % 1;
        const strandSide = (sideSeed - 0.5) * (1.25 + along * 1.15);
        const sway = Math.sin(drop * Math.PI * 5 + s * 22.0) * 0.34;
        const dirX = Math.cos(limb.angle);
        const dirZ = Math.sin(limb.angle);
        const sideX = Math.cos(limb.angle + Math.PI / 2);
        const sideZ = Math.sin(limb.angle + Math.PI / 2);
        const outward = 0.72 + drop * 0.22;
        p.x = anchor.x + sideX * strandSide + dirX * (sway * 0.38 + outward) + (rng() - 0.5) * 0.13;
        p.z = anchor.z + sideZ * strandSide + dirZ * (sway * 0.38 + outward) + (rng() - 0.5) * 0.13;
        p.y = anchor.y - drop * limb.hang + Math.sin(drop * Math.PI) * 0.18 + (rng() - 0.5) * 0.1;
        if (drop > 0.82 && rng() < 0.32) return new THREE.Color(pick(leafYellow));
        if (sideSeed > 0.78 || drop < 0.18) return new THREE.Color(pick(leafLight));
        return new THREE.Color(pick(rng() < 0.6 ? leafMid : leafDeep));
      };

      return makeMap((voxel) => {
        const p = voxel.base.clone();
        let color = voxel.color.clone();
        if (voxel.role === "leaf") {
          if (voxel.seed < 0.34) {
            color = placeWhiteLimb(voxel, p);
          } else {
            color = placeCurtainLeaf(voxel, p);
          }
        } else if (voxel.role === "trunk") {
          color = placeWhiteTrunk(voxel, p);
        } else if (voxel.role === "flower" || voxel.role === "mushroom" || voxel.role === "grassTuft") {
          color = voxel.seed < 0.34 ? placeWhiteLimb(voxel, p) : placeCurtainLeaf(voxel, p);
        } else if (voxel.role === "grass") {
          p.x *= 1.18;
          p.z *= 1.18;
          p.y = Math.max(0, p.y) * 0.48;
          color = new THREE.Color(pick(rng() < 0.35 ? moss : grass));
        } else if (voxel.role === "underside") {
          p.x *= 1.03;
          p.z *= 1.03;
          p.y *= 0.64;
          color = new THREE.Color(pick(soil));
        } else if (voxel.role === "rock") {
          p.x *= 0.95;
          p.z *= 0.95;
          p.y = Math.min(p.y, 0.55);
          color = new THREE.Color(pick(rng() < 0.45 ? stone : soil)).multiplyScalar(0.9);
        }
        return [p, color];
      });
    }

    function makeMap(transform) {
      const positions = new Array(voxels.length);
      const colors = new Array(voxels.length);
      for (let i = 0; i < voxels.length; i++) {
        const [position, color] = transform(voxels[i], i);
        positions[i] = position;
        colors[i] = color;
      }
      return { positions, colors };
    }

    function applyVariation(index, immediate = false) {
      const variation = variations[index];
      activeVariation = index;
      for (let i = 0; i < voxels.length; i++) {
        voxels[i].current = variation.positions[i].clone();
        voxels[i].currentColor = variation.colors[i].clone();
        if (immediate) offsets[i].set(0, 0, 0);
        setInstance(i);
      }
      mesh.instanceMatrix.needsUpdate = true;
      mesh.instanceColor.needsUpdate = true;
    }

    function startMorph(index) {
      if (morphing || index === activeVariation) return;
      targetVariation = index;
      morphing = true;
      morphStarted = performance.now();
      morphFromPositions = voxels.map((v) => v.current.clone());
      morphFromColors = voxels.map((v) => v.currentColor.clone());
      if (typeof syncPicker === "function") syncPicker();
    }

    function updateMorph(now) {
      if (!morphing) return;
      const duration = settings.morphMs;
      let t = clamp((now - morphStarted) / duration);
      t = easeInOutCubic(t);
      const target = variations[targetVariation];
      const base = variations[0];

      for (let i = 0; i < voxels.length; i++) {
        const waveDelay = (Math.sin(base.positions[i].x * 0.5 + base.positions[i].z * 0.7) * 0.5 + 0.5) * 0.3;
        const local = clamp((t - waveDelay) / (1 - waveDelay));
        const v = voxels[i];
        v.current.copy(morphFromPositions[i]).lerp(target.positions[i], local);
        v.currentColor.copy(morphFromColors[i]).lerp(target.colors[i], local);
        setInstance(i);
      }
      mesh.instanceMatrix.needsUpdate = true;
      mesh.instanceColor.needsUpdate = true;

      if (t >= 1) {
        morphing = false;
        activeVariation = targetVariation;
        lastMorphAt = now;
        morphFromPositions = null;
        morphFromColors = null;
      }
    }

    function updateAutoCycle(now) {
      if (now >= suppressAutoUntil && !controls.autoRotate && settings.autoRotate) {
        controls.autoRotate = true;
      }
      if (!settings.autoMorph) {
        lastMorphAt = now;
        return;
      }
      if (morphing || now < suppressAutoUntil) {
        if (morphing) lastMorphAt = now;
        return;
      }
      if (now - lastMorphAt >= settings.cycleMs) {
        const order = [3, 0, 1, 2, 8, 4, 5, 10, 11, 12, 6, 7, 9];
        const next = order[(order.indexOf(activeVariation) + 1) % order.length];
        startMorph(next);
      }
    }

    function updateHover(dt, now) {
      raycaster.setFromCamera(pointer, camera);
      camera.getWorldDirection(cameraDir);
      root.updateMatrixWorld(true);
      worldTreeCenter.copy(treeCenter);
      root.localToWorld(worldTreeCenter);
      hoverPlane.setFromNormalAndCoplanarPoint(cameraDir.clone().negate(), worldTreeCenter);
      const hit = raycaster.ray.intersectPlane(hoverPlane, hoverPoint);
      if (hit) {
        localHoverPoint.copy(hoverPoint);
        root.worldToLocal(localHoverPoint);
      }
      hoverActive = Boolean(hit && localHoverPoint.distanceTo(treeCenter) < 18 && pointer.lastMove > -Infinity);
      const blend = 1 - Math.exp(-(hoverActive ? 8 : 2.5) * dt);

      for (let i = 0; i < voxels.length; i++) {
        const current = voxels[i].current;
        let tx = 0;
        let ty = 0;
        let tz = 0;

        if (hoverActive) {
          const dx = current.x - localHoverPoint.x;
          const dy = current.y - localHoverPoint.y;
          const dz = current.z - localHoverPoint.z;
          const distance = Math.sqrt(dx * dx + dy * dy + dz * dz);
          const radius = settings.hoverRadius;
          if (distance < radius && distance > 0.01) {
            const intensity = 1 - distance / radius;
            const force = intensity * intensity * intensity * settings.hoverForce;
            const inv = 1 / distance;
            const rand = randDirs[i];
            const wave = 1 + (Math.sin(now * 0.003 + current.x * 1.3 + current.y * 0.7 + current.z * 1.1) * 0.15) * intensity;
            const vx = dx * inv * 0.66 + rand.x * 0.34;
            const vy = dy * inv * 0.66 + rand.y * 0.34;
            const vz = dz * inv * 0.66 + rand.z * 0.34;
            const len = Math.sqrt(vx * vx + vy * vy + vz * vz) || 1;
            tx = (vx / len) * force * wave;
            ty = (vy / len) * force * wave;
            tz = (vz / len) * force * wave;
          }
        }

        offsets[i].x += (tx - offsets[i].x) * blend;
        offsets[i].y += (ty - offsets[i].y) * blend;
        offsets[i].z += (tz - offsets[i].z) * blend;
        setInstance(i);
      }

      mesh.instanceMatrix.needsUpdate = true;
    }

    function setInstance(i) {
      const voxel = voxels[i];
      const position = voxel.current || voxel.base;
      const offset = offsets[i];
      const jitter = voxel.jitter;
      tempObj.position.set(
        position.x + offset.x + jitter.x,
        position.y + offset.y + jitter.y,
        position.z + offset.z + jitter.z
      );
      tempObj.rotation.set(0, 0, 0);
      tempObj.scale.setScalar(voxel.scale);
      tempObj.updateMatrix();
      mesh.setMatrixAt(i, tempObj.matrix);
      mesh.setColorAt(i, tempColor.copy(voxel.currentColor || voxel.color));
    }

    function buildParticles() {
      const dustMax = 6000;
      const dustRangeXZ = 42;
      const dustRangeY = 50;
      const dustBaseY = -12;
      const positions = new Float32Array(dustMax * 3);
      const velocity = new Float32Array(dustMax * 3);
      for (let i = 0; i < dustMax; i++) {
        positions[i * 3] = (rng() - 0.5) * dustRangeXZ;
        positions[i * 3 + 1] = rng() * dustRangeY + dustBaseY;
        positions[i * 3 + 2] = (rng() - 0.5) * dustRangeXZ;
        velocity[i * 3] = (rng() - 0.5) * 0.12;
        velocity[i * 3 + 1] = (rng() - 0.2) * 0.06;
        velocity[i * 3 + 2] = (rng() - 0.5) * 0.12;
      }

      const geo = new THREE.BufferGeometry();
      geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      geo.setDrawRange(0, settings.dustCount);
      const mat = new THREE.PointsMaterial({
        color: 0xff9a4a,
        opacity: 0.82,
        size: 0.11,
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        sizeAttenuation: true
      });
      const dust = new THREE.Points(geo, mat);
      dust.frustumCulled = false;
      scene.add(dust);

      const leafMax = 200;
      const leafGeo = new THREE.PlaneGeometry(0.5, 0.5);
      const leafMat = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        opacity: 0.78,
        transparent: true,
        depthWrite: false,
        side: THREE.DoubleSide
      });
      const leaves = new THREE.InstancedMesh(leafGeo, leafMat, leafMax);
      leaves.instanceColor = new THREE.InstancedBufferAttribute(new Float32Array(leafMax * 3), 3);
      leaves.frustumCulled = false;
      leaves.count = settings.leafCount;
      root.add(leaves);

      const leafState = [];
      const leafColorSets = [
        ["#e63c2e", "#d4452f", "#f05a3a", "#ff6b45", "#f5a623", "#ff8c42"],
        ["#1a4a2a", "#224e30", "#2a5a38", "#1e4828", "#164020", "#2e6e3e"],
        ["#ffb7c5", "#ff97b0", "#ffc8d6", "#fff0f5", "#ffd0db"],
        ["#456f3a", "#5a8845", "#3a5e30", "#9a5226", "#b04030", "#345532"],
        ["#2f7a36", "#54a04a", "#7ec06a", "#a8d068", "#388540", "#62b058"],
        ["#1b5028", "#143f20", "#d92d1a", "#ff8418", "#f5c518", "#205830"],
        ["#a87858", "#7a9a65", "#c8a050", "#ff9050", "#6a8a55", "#b88868"],
        ["#2e6e34", "#358040", "#5a9a52", "#1a3e22", "#7ac070", "#4a9ec0"],
        ["#7b4cc4", "#9867ea", "#b184f4", "#c7a6ff", "#5c2c91", "#357a43"],
        ["#143f22", "#367c40", "#78b765", "#6a4428", "#967050", "#2f7137"],
        ["#4a9a38", "#66b24a", "#86c858", "#f5d529", "#ffd83d", "#7b5a32"],
        ["#3d8a3e", "#79bf5c", "#5a2f18", "#7a4424", "#a98a47", "#8a6540"],
        ["#7fc66c", "#9bdc85", "#2d7a43", "#f2eadb", "#d8d1c4", "#5aa85a"]
      ];
      for (let i = 0; i < leafMax; i++) {
        resetLeaf(i, rng() * 6);
      }

      function resetLeaf(i, life = 0) {
        const a = rng() * Math.PI * 2;
        const r = rng() * 6;
        leafState[i] = {
          x: Math.cos(a) * r,
          y: 18 + rng() * 8,
          z: Math.sin(a) * r,
          vx: (rng() - 0.5) * 0.8,
          vy: -(1.5 + rng() * 1.5),
          vz: (rng() - 0.5) * 0.8,
          rotX: rng() * Math.PI * 2,
          rotY: rng() * Math.PI * 2,
          rotZ: rng() * Math.PI * 2,
          spinX: (rng() - 0.5) * 2,
          spinY: (rng() - 0.5) * 1.5,
          spinZ: (rng() - 0.5) * 2,
          scale: 0.25 + rng() * 0.45,
          wobblePhase: rng() * Math.PI * 2,
          wobbleFreq: 1.5 + rng() * 2,
          wobbleAmp: 0.3 + rng() * 0.5,
          life,
          maxLife: 4 + rng() * 6
        };
      }

      window.__updateParticles = (dt, now) => {
        const t = Math.min(dt, 0.05);
        const a = geo.attributes.position.array;
        const seconds = now * 0.001;
        const halfXZ = dustRangeXZ / 2;
        const topY = dustBaseY + dustRangeY;
        const dustCount = settings.dustCount;
        geo.setDrawRange(0, dustCount);
        for (let i = 0; i < dustCount; i++) {
          a[i * 3] += (velocity[i * 3] + Math.sin(seconds * 0.5 + i * 0.7) * 0.06) * t;
          a[i * 3 + 1] += (velocity[i * 3 + 1] + Math.sin(seconds * 0.3 + i * 1.1) * 0.03) * t;
          a[i * 3 + 2] += (velocity[i * 3 + 2] + Math.cos(seconds * 0.4 + i * 0.9) * 0.06) * t;
          if (a[i * 3] > halfXZ) a[i * 3] = -halfXZ;
          if (a[i * 3] < -halfXZ) a[i * 3] = halfXZ;
          if (a[i * 3 + 1] > topY) a[i * 3 + 1] = dustBaseY;
          if (a[i * 3 + 1] < dustBaseY) a[i * 3 + 1] = topY;
          if (a[i * 3 + 2] > halfXZ) a[i * 3 + 2] = -halfXZ;
          if (a[i * 3 + 2] < -halfXZ) a[i * 3 + 2] = halfXZ;
        }
        geo.attributes.position.needsUpdate = true;

        const leafCount = settings.leafCount;
        leaves.count = leafCount;
        const colors = leafColorSets[activeVariation] || leafColorSets[0];
        if (leaves.userData.lastVariation !== activeVariation) {
          leaves.userData.lastVariation = activeVariation;
          for (let i = 0; i < leafMax; i++) {
            tempColor.set(pick(colors));
            leaves.setColorAt(i, tempColor);
          }
          leaves.instanceColor.needsUpdate = true;
        }

        for (let i = 0; i < leafCount; i++) {
          const leaf = leafState[i];
          leaf.life += t;
          if (leaf.life >= leaf.maxLife || leaf.y < -16) {
            resetLeaf(i);
            tempColor.set(pick(colors));
            leaves.setColorAt(i, tempColor);
            leaves.instanceColor.needsUpdate = true;
          }
          const wobble = Math.sin(seconds * leaf.wobbleFreq + leaf.wobblePhase) * leaf.wobbleAmp;
          leaf.x += (leaf.vx + wobble) * t;
          leaf.y += leaf.vy * t;
          leaf.z += (leaf.vz + Math.cos(seconds * leaf.wobbleFreq * 0.7 + leaf.wobblePhase) * leaf.wobbleAmp * 0.6) * t;
          leaf.rotX += leaf.spinX * t;
          leaf.rotY += leaf.spinY * t;
          leaf.rotZ += leaf.spinZ * t;
          const life = leaf.life / leaf.maxLife;
          const fade = life < 0.1 ? life / 0.1 : life > 0.85 ? (1 - life) / 0.15 : 1;
          tempObj.position.set(leaf.x, leaf.y, leaf.z);
          tempObj.rotation.set(leaf.rotX, leaf.rotY, leaf.rotZ);
          tempObj.scale.setScalar(leaf.scale * fade);
          tempObj.updateMatrix();
          leaves.setMatrixAt(i, tempObj.matrix);
        }
        leaves.instanceMatrix.needsUpdate = true;
      };
    }

    function updateParticles(dt, now) {
      window.__updateParticles?.(dt, now);
    }

    function updateLights(now) {
      const phase = now * 0.001;
      rim.intensity = 2.6 + Math.sin(phase * 0.7) * 0.35 + (hoverActive ? 0.45 : 0);
      accent.intensity = 2.1 + Math.sin(phase * 0.53 + 1) * 0.3;
      root.position.y = -0.6 + Math.sin(phase * 1.2) * 0.035;
    }

    function resize() {
      const width = Math.max(1, stage.clientWidth);
      const height = Math.max(1, stage.clientHeight);
      renderer.setSize(width, height, false);
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
    }

    function onPointerMove(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      pointer.lastMove = performance.now();
    }

    function onPointerLeave() {
      pointer.x = 9999;
      pointer.y = 9999;
      pointer.lastMove = -Infinity;
    }

    function pauseAfterInteraction() {
      suppressAutoUntil = performance.now() + 5000;
      controls.autoRotate = false;
    }

    function terrainNoise(x, z) {
      return Math.sin(x * 1.7 + z * 0.9) * 0.4 +
        Math.cos(z * 2.1 - x * 0.6) * 0.35 +
        Math.sin((x + z) * 1.1) * 0.25;
    }

    function samplePath(points, t) {
      const lengths = [];
      let total = 0;
      for (let i = 1; i < points.length; i++) {
        const a = points[i - 1];
        const b = points[i];
        const len = Math.hypot(b[0] - a[0], b[1] - a[1], b[2] - a[2]);
        lengths.push(len);
        total += len;
      }
      let acc = 0;
      for (let i = 0; i < lengths.length; i++) {
        const next = acc + lengths[i] / total;
        if (t <= next) {
          const local = (t - acc) / (next - acc || 1);
          const a = points[i];
          const b = points[i + 1];
          return new THREE.Vector3(
            a[0] + (b[0] - a[0]) * local,
            a[1] + (b[1] - a[1]) * local,
            a[2] + (b[2] - a[2]) * local
          );
        }
        acc = next;
      }
      const last = points[points.length - 1];
      return new THREE.Vector3(last[0], last[1], last[2]);
    }

    function randomUnitVector() {
      const a = rng() * Math.PI * 2;
      const p = Math.acos(2 * rng() - 1);
      const s = Math.sin(p);
      return new THREE.Vector3(s * Math.cos(a), s * Math.sin(a), Math.cos(p));
    }

    function pick(values) {
      return values[Math.floor(rng() * values.length)];
    }

    function clamp(value) {
      return Math.max(0, Math.min(1, value));
    }

    function easeInOutCubic(t) {
      return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function mulberry32(seed) {
      return function random() {
        let t = seed += 0x6D2B79F5;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }
  </script>
