<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VoxelTreeMorph</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      color-scheme: dark;
      --film-w: 552;
      --film-h: 720;
      --body-background: #050403;
      --stage-background:
        radial-gradient(circle at 50% 48%, rgba(116, 73, 43, 0.32), rgba(34, 20, 11, 0.38) 39%, rgba(6, 4, 2, 0.98) 78%),
        #050403;
      --stage-overlay:
        radial-gradient(circle at 50% 45%, transparent 0 43%, rgba(0, 0, 0, 0.05) 68%, rgba(0, 0, 0, 0.34) 100%),
        linear-gradient(90deg, rgba(0, 0, 0, 0.12), transparent 21%, transparent 79%, rgba(0, 0, 0, 0.16));
      --grain-opacity: 0.075;
      --ui-panel-bg: rgba(12, 8, 5, 0.6);
      --ui-hover-bg: rgba(80, 50, 28, 0.7);
      --ui-button-bg: rgba(40, 26, 16, 0.55);
      --ui-border: rgba(220, 180, 130, 0.18);
      --ui-button-border: rgba(220, 180, 130, 0.22);
      --ui-border-active: rgba(255, 220, 170, 0.6);
      --ui-text: #e8d2b0;
      --ui-muted: #d4a874;
      --ui-accent: #ffb766;
      --ui-accent-strong: #d97a30;
      --ui-accent-dark: #1a0f06;
      --ui-glow: rgba(255, 140, 60, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--body-background);
      font-family: system-ui, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
    }

    #stage {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      isolation: isolate;
      background: var(--stage-background);
      cursor: crosshair;
    }

    #stage::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      background: var(--stage-overlay);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .grain {
      position: absolute;
      inset: -3%;
      z-index: 5;
      pointer-events: none;
      opacity: var(--grain-opacity);
      background-image:
        radial-gradient(circle at 10% 20%, #fff 0 0.5px, transparent 0.8px),
        radial-gradient(circle at 70% 40%, #fff 0 0.45px, transparent 0.75px),
        radial-gradient(circle at 50% 90%, #fff 0 0.35px, transparent 0.7px);
      background-size: 52px 57px, 71px 63px, 43px 49px;
      animation: grainDrift 1.7s steps(2, end) infinite;
    }

    .fallback {
      position: absolute;
      inset: 0;
      z-index: 9;
      display: grid;
      place-items: center;
      padding: 32px;
      background: var(--body-background);
      color: var(--ui-text);
      text-align: center;
      line-height: 1.45;
      visibility: hidden;
    }

    .no-webgl .fallback {
      visibility: visible;
    }

    @keyframes grainDrift {
      from { transform: translate3d(0, 0, 0); }
      to { transform: translate3d(-2%, 2%, 0); }
    }

    #picker {
      position: fixed;
      bottom: 22px;
      right: 22px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 14px;
      border-radius: 6px;
      background: var(--ui-panel-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--ui-border);
      box-shadow: 0 6px 30px rgba(0, 0, 0, 0.4);
      font-size: 13px;
      letter-spacing: 0.04em;
      min-width: 140px;
      max-height: calc(100vh - 44px);
      overflow-y: auto;
    }

    #picker button {
      appearance: none;
      border: 1px solid var(--ui-button-border);
      background: var(--ui-button-bg);
      color: var(--ui-text);
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font: inherit;
      text-align: left;
      transition: background 160ms ease, color 160ms ease, border-color 160ms ease, transform 120ms ease;
    }

    #picker button:hover {
      background: var(--ui-hover-bg);
      border-color: var(--ui-accent);
    }

    #picker button:active {
      transform: translateY(1px);
    }

    #picker button.active {
      background: linear-gradient(180deg, var(--ui-accent), var(--ui-accent-strong));
      color: var(--ui-accent-dark);
      border-color: var(--ui-border-active);
      box-shadow: 0 0 12px var(--ui-glow);
    }

    #repo-link {
      position: fixed;
      bottom: 22px;
      left: 22px;
      z-index: 10;
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 0 16px;
      border-radius: 6px;
      border: 1px solid var(--ui-button-border);
      background: var(--ui-panel-bg);
      color: var(--ui-text);
      text-decoration: none;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 6px 30px rgba(0, 0, 0, 0.4);
      font-size: 13px;
      letter-spacing: 0.04em;
      transition: background 160ms ease, color 160ms ease, border-color 160ms ease, transform 120ms ease;
    }

    #repo-link:hover {
      background: var(--ui-hover-bg);
      border-color: var(--ui-accent);
    }

    #repo-link:active {
      transform: translateY(1px);
    }

    #repo-link:focus-visible {
      outline: 2px solid var(--ui-accent);
      outline-offset: 3px;
    }

    #settings {
      position: fixed;
      top: 22px;
      left: 22px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 14px 16px;
      border-radius: 6px;
      background: var(--ui-panel-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--ui-border);
      box-shadow: 0 6px 30px rgba(0, 0, 0, 0.4);
      font-size: 12px;
      letter-spacing: 0.04em;
      width: 220px;
      max-height: calc(100vh - 44px);
      overflow-y: auto;
      color: var(--ui-text);
    }

    #settings h3 {
      margin: 0 0 2px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--ui-muted);
      opacity: 0.85;
    }

    #settings label {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 11px;
    }

    #settings .row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
    }

    #settings .row span:last-child {
      color: var(--ui-accent);
      font-variant-numeric: tabular-nums;
      font-size: 11px;
    }

    #settings input[type="range"] {
      appearance: none;
      width: 100%;
      height: 4px;
      background: var(--ui-button-border);
      border-radius: 2px;
      outline: none;
      margin: 0;
    }

    #settings input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: linear-gradient(180deg, var(--ui-accent), var(--ui-accent-strong));
      border: 1px solid var(--ui-border-active);
      cursor: pointer;
      box-shadow: 0 0 6px var(--ui-glow);
    }

    #settings input[type="range"]::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: linear-gradient(180deg, var(--ui-accent), var(--ui-accent-strong));
      border: 1px solid var(--ui-border-active);
      cursor: pointer;
      box-shadow: 0 0 6px var(--ui-glow);
    }

    #settings .toggle {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      cursor: pointer;
    }

    #settings .toggle input {
      appearance: none;
      width: 28px;
      height: 16px;
      border-radius: 8px;
      background: var(--ui-button-border);
      position: relative;
      cursor: pointer;
      transition: background 160ms ease;
    }

    #settings .toggle input::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--ui-text);
      transition: left 160ms ease, background 160ms ease;
    }

    #settings .toggle input:checked {
      background: linear-gradient(180deg, var(--ui-accent), var(--ui-accent-strong));
    }

    #settings .toggle input:checked::after {
      left: 14px;
      background: var(--ui-accent-dark);
    }
  </style>

</head>
<body>
  <main id="stage" aria-label="interactive voxel tree morph animation">
    <div class="fallback">This browser needs WebGL to render the voxel tree.</div>
    <div class="grain" aria-hidden="true"></div>
  </main>

  <a
    id="repo-link"
    href="https://github.com/azidancorp/VoxelTreeMorph"
    target="_blank"
    rel="noopener noreferrer"
    aria-label="Open VoxelTreeMorph repository on GitHub"
  >GitHub Repo</a>

    <label>
      <div class="row"><span>Particle density</span><span data-out="dustCount">3176</span></div>
      <input type="range" min="0" max="6000" step="50" value="3176" data-setting="dustCount">
    </label>
    <label>
      <div class="row"><span>Falling leaves</span><span data-out="leafCount">42</span></div>
      <input type="range" min="0" max="200" step="2" value="42" data-setting="leafCount">
    </label>
    <label>
      <div class="row"><span>Cycle time (s)</span><span data-out="cycleMs">5.0</span></div>
      <input type="range" min="1500" max="20000" step="100" value="5000" data-setting="cycleMs">
    </label>
    <label>
      <div class="row"><span>Morph speed (s)</span><span data-out="morphMs">1.9</span></div>
      <input type="range" min="400" max="6000" step="100" value="1900" data-setting="morphMs">
    </label>
    <label>
      <div class="row"><span>Explode radius</span><span data-out="hoverRadius">7.2</span></div>
      <input type="range" min="1" max="20" step="0.1" value="7.2" data-setting="hoverRadius">
    </label>
    <label>
      <div class="row"><span>Explode force</span><span data-out="hoverForce">8.6</span></div>
      <input type="range" min="0" max="30" step="0.1" value="8.6" data-setting="hoverForce">
    </label>
    <label>
      <div class="row"><span>Rotate speed</span><span data-out="rotateSpeed">0.38</span></div>
      <input type="range" min="0" max="3" step="0.02" value="0.38" data-setting="rotateSpeed">
    </label>
    <label class="toggle">
      <span>Auto rotate</span>
      <input type="checkbox" checked data-setting="autoRotate">
    </label>
    <label class="toggle">
      <span>Auto morph</span>
      <input type="checkbox" checked data-setting="autoMorph">
    </label>
  </section>

  <nav id="picker" aria-label="tree variation picker"></nav>

          background: "radial-gradient(circle at 50% 47%, rgba(86, 124, 60, 0.32), rgba(34, 44, 28, 0.42) 42%, rgba(6, 8, 5, 0.98) 80%), #060805",
          fog: { color: "#0b1408", density: 0.022 },
          lighting: {
            hemisphere: { sky: "#e0f0d4", ground: "#0e1a0d", intensity: 1.04 },
            ambient: { color: "#c8d8a8", intensity: 0.46 },
            key: { color: "#fff0d4", intensity: 4.1, position: [5.4, 14.6, 5.0] },
            fill: { color: "#5a9a52", intensity: 1.02 },
            rim: { color: "#e83a4e", pulseBase: 2.7, pulseAmount: 0.32 },
            accent: { color: "#88c876", pulseBase: 2.05 }
          }
        }
      })
    ];

    const CYCLE_VARIATION_INDICES = TREE_VARIATIONS
      .map((variation, index) => ({ index, order: variation.cycleOrder }))
      .sort((a, b) => a.order - b.order || a.index - b.index)
      .map(({ index }) => index);

    const initialVariation = TREE_VARIATIONS[0];
    const initialFrame = initialVariation.camera;

    const stage = document.querySelector("#stage");
    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      alpha: false,
      powerPreference: "high-performance"
    });

    if (!renderer.capabilities.isWebGL2 && !renderer.capabilities.isWebGL) {
      document.body.classList.add("no-webgl");
    }

    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.5));
    renderer.setSize(stage.clientWidth, stage.clientHeight, false);
    renderer.setClearColor(initialVariation.scene.clear, 1);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.25;
    renderer.shadowMap.enabled = false;
    stage.prepend(renderer.domElement);

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(initialVariation.scene.fog.color, initialVariation.scene.fog.density);

    const camera = new THREE.PerspectiveCamera(initialFrame.fov, 1, initialFrame.near, initialFrame.far);
    camera.position.fromArray(initialFrame.position);
    camera.lookAt(...initialFrame.target);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.055;
    controls.enablePan = false;
    controls.autoRotate = settings.autoRotate;
    controls.autoRotateSpeed = settings.rotateSpeed;
    controls.minDistance = initialFrame.minDistance;
    controls.maxDistance = initialFrame.maxDistance;
    controls.target.fromArray(initialFrame.target);

    const hemisphere = new THREE.HemisphereLight();
    scene.add(hemisphere);

    const ambient = new THREE.AmbientLight();
    scene.add(ambient);

    const key = new THREE.DirectionalLight();
    key.castShadow = false;
    scene.add(key);

    const fill = new THREE.DirectionalLight();
    scene.add(fill);

    const rim = new THREE.PointLight();
    scene.add(rim);

    const accent = new THREE.PointLight();
    scene.add(accent);

    const lights = { hemisphere, ambient, key, fill, rim, accent };

    const root = new THREE.Group();
    root.position.fromArray(initialFrame.rootPosition);
    root.rotation.y = initialFrame.rootRotationY;
    root.scale.setScalar(initialFrame.rootScale);
    scene.add(root);

    const rng = mulberry32(0xB05A1);
    const tempObj = new THREE.Object3D();
    const tempColor = new THREE.Color();
    const tempCameraTarget = new THREE.Vector3();
    const tempCameraDirection = new THREE.Vector3();
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2(9999, 9999);
    pointer.lastMove = -Infinity;
    const localHoverPoint = new THREE.Vector3(9999, 9999, 9999);
    const localRay = new THREE.Ray();
    const localViewOut = new THREE.Vector3();
    const inverseRootMatrix = new THREE.Matrix4();
    const treeCenter = new THREE.Vector3(0, 8.3, 0);
    const box = new THREE.Box3();

    const roles = {
      underside: [],
      grass: [],
      rock: [],
      trunk: [],
      leaf: [],
      flower: [],
      grassTuft: [],
      mushroom: []
    };

    const voxels = [];
    const variations = [];
    const offsets = [];
    const randDirs = [];
    let activeVariation = 0;
    let targetVariation = 0;
    let morphing = false;
    let morphStarted = 0;
    let morphFromPositions = null;
    let morphFromColors = null;
    let lastMorphAt = performance.now();
    let suppressAutoUntil = 0;
    let resumeRotateOnPointerRelease = false;
    let hoverActive = false;
    let hoverDepth = 0;
    let activeSceneStyle = initialVariation.scene;
    let cameraFrameTransition = null;
    let lightingStyleTransition = null;
    let currentFloatAmplitude = initialFrame.floatAmplitude;
    const currentRootBasePosition = new THREE.Vector3().fromArray(initialFrame.rootPosition);

    applyVariationStyle(activeVariation, true);
    buildBaseVoxels();

    for (const voxel of voxels) {
      box.expandByPoint(voxel.base);
      offsets.push(new THREE.Vector3());
      randDirs.push(randomUnitVector());
    }

    box.getCenter(treeCenter);
    treeCenter.y += 2.3;
    for (const variation of TREE_VARIATIONS) {
      const map = variation.map();
      variations.push({ ...variation, positions: map.positions, colors: map.colors });
    }
    const morphWaveReference = variations.find((variation) => variation.id === "maple") || variations[0];

    const cube = new THREE.BoxGeometry(1, 1, 1);
    const material = new THREE.MeshStandardMaterial({
      color: 0xffffff,
      roughness: 0.82,
      metalness: 0.0
    });
    const mesh = new THREE.InstancedMesh(cube, material, voxels.length);
    mesh.castShadow = false;
    mesh.receiveShadow = false;
    mesh.frustumCulled = false;
    mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    root.add(mesh);

    applyVariation(activeVariation, true);
    buildParticles();

    const picker = document.querySelector("#picker");
    for (const [i, variation] of TREE_VARIATIONS.entries()) {
      const button = document.createElement("button");
      button.type = "button";
      button.dataset.variation = String(i);
      button.dataset.variationId = variation.id;
      button.textContent = variation.label;
      picker.append(button);
    }

    const pickerButtons = Array.from(picker.querySelectorAll("button"));
    function syncPicker() {
      const current = morphing ? targetVariation : activeVariation;
      for (const btn of pickerButtons) {
        const i = Number(btn.dataset.variation);
        const active = i === current;
        btn.classList.toggle("active", active);
        btn.setAttribute("aria-pressed", String(active));
      }
    }
    for (const btn of pickerButtons) {
      btn.addEventListener("click", () => {
        const i = Number(btn.dataset.variation);
        pauseAfterInteraction();
        startMorph(i);
        syncPicker();
      });
    }
    syncPicker();

    const settingFormatters = {
      cycleMs: (v) => (v / 1000).toFixed(1),
      morphMs: (v) => (v / 1000).toFixed(1),
      hoverRadius: (v) => Number(v).toFixed(1),
      hoverForce: (v) => Number(v).toFixed(1),
      rotateSpeed: (v) => Number(v).toFixed(2),
      dustCount: (v) => String(Math.round(v)),
      leafCount: (v) => String(Math.round(v))
    };

    function syncSettingOutput(key, value) {
      const out = document.querySelector(`#settings [data-out="${key}"]`);
      if (out) out.textContent = (settingFormatters[key] || ((v) => String(v)))(value);
    }

    for (const input of document.querySelectorAll("#settings [data-setting]")) {
      const key = input.dataset.setting;
      if (input.type === "checkbox") {
        input.checked = Boolean(settings[key]);
        input.addEventListener("change", () => {
          settings[key] = input.checked;
          if (key === "autoRotate") controls.autoRotate = input.checked;
        });
      } else {
        input.value = settings[key];
        syncSettingOutput(key, settings[key]);
        input.addEventListener("input", () => {
          const value = Number(input.value);
          settings[key] = value;
          syncSettingOutput(key, value);
          if (key === "rotateSpeed") controls.autoRotateSpeed = value;
        });
      }
    }

    renderer.domElement.addEventListener("pointermove", onPointerMove, { passive: true });
    renderer.domElement.addEventListener("pointerleave", onPointerLeave, { passive: true });
    renderer.domElement.addEventListener("pointerdown", pausePointerInteraction, { passive: true });
    renderer.domElement.addEventListener("wheel", pauseAfterInteraction, { passive: true });
    window.addEventListener("pointerup", resumeAutoRotateAfterPointerRelease, { passive: true });
    window.addEventListener("pointercancel", resumeAutoRotateAfterPointerRelease, { passive: true });
    controls.addEventListener("end", resumeAutoRotateAfterPointerRelease);
    window.addEventListener("resize", resize, { passive: true });
    resize();

    window.__voxelTreeMorph = {
      source: "inspired by the cool Hugging Face bonsai-image-webgpu voxel mechanics",
      voxels: voxels.length,
      variationCount: TREE_VARIATIONS.length,
      variations: TREE_VARIATIONS.map(variationDebugSummary),
      cycleOrder: () => CYCLE_VARIATION_INDICES.map((index) => TREE_VARIATIONS[index].id),
      get cycleMs() { return settings.cycleMs; },
      get morphSeconds() { return settings.morphMs / 1000; },
      get hoverRadius() { return settings.hoverRadius; },
      get hoverForce() { return settings.hoverForce; },
      go: (variation) => startMorph(resolveVariationIndex(variation)),
      next: () => startMorph(nextVariationIndex(activeVariation)),
      state: () => ({
        activeVariation,
        activeId: getVariationDefinition(activeVariation).id,
        targetVariation,
        targetId: getVariationDefinition(targetVariation).id,
        styleId: getVariationDefinition(morphing ? targetVariation : activeVariation).id,
        morphing,
        hoverActive
      }),
      colorStats: () => {
        const sum = new THREE.Color(0, 0, 0);
        let brightest = 0;
        for (const voxel of voxels) {
          const color = voxel.currentColor || voxel.color;
          sum.r += color.r;
          sum.g += color.g;
          sum.b += color.b;
          brightest = Math.max(brightest, color.r, color.g, color.b);
        }
        return {
          average: [sum.r / voxels.length, sum.g / voxels.length, sum.b / voxels.length],
          brightest,
          first: voxels[0].currentColor?.toArray()
        };
      }
    };

    let last = performance.now();
    renderer.setAnimationLoop((now) => {
      const dt = Math.min((now - last) / 1000, 0.05);
      last = now;

      controls.update();
      updateAutoCycle(now);
      updateMorph(now);
      updateCameraFrameTransition(now);
      updateLightingStyleTransition(now);
      updateHover(dt, now);
      updateParticles(dt, now);
      updateLights(now);

      renderer.render(scene, camera);
    });

    function buildBaseVoxels() {
      const occupied = new Set();
      const add = (role, x, y, z, color, scale = 1) => {
        const key = `${x.toFixed(3)},${y.toFixed(3)},${z.toFixed(3)}`;
        if (occupied.has(key)) return;
        occupied.add(key);
        const seed = rng();
        const voxel = {
          role,
          base: new THREE.Vector3(x, y, z),
          color: new THREE.Color(color),
          scale,
          seed,
          jitter: new THREE.Vector3(
            (rng() - 0.5) * 0.04,
            (rng() - 0.5) * 0.04,
            (rng() - 0.5) * 0.04
          )
        };
        roles[role].push(voxel);
        voxels.push(voxel);
      };

      const grassColors = ["#4a8c3f", "#3d7a34", "#5a9e4a", "#2d6b24", "#68ad58", "#3f8535", "#55a048"];
      const rockColors = ["#a0978a", "#8c8478", "#b5ad9e", "#9a9184", "#7d756a", "#938b7f"];
      const undersideColors = ["#8b6914", "#7a5c12", "#6b4e10", "#9c7a1e", "#5c4010", "#706860"];
      const trunkColors = ["#4a3728", "#3d2e20", "#5c4535", "#2e2218", "#6b5444"];
      const leafColors = ["#e63c2e", "#d4452f", "#f05a3a", "#c93525", "#ff6b45", "#e8502a", "#ff7f50"];
      const flowerColors = ["#e63c2e", "#f05a3a", "#ff6b45", "#f5a623", "#ff8c42"];

      for (let x = -8; x <= 8; x++) {
        for (let z = -6; z <= 6; z++) {
          const d = Math.sqrt(x * x * 0.48 + z * z * 0.58);
          const noise = terrainNoise(x, z);
          if (d < 7.6 + noise * 1.45) add("grass", x, 0, z, pick(grassColors));
          if (d < 8.7 + noise * 1.1 && rng() > 0.18) add("underside", x, -1, z, pick(undersideColors));
          if (d < 6.2 + noise * 1.0 && rng() > 0.24) add("grass", x, 1, z, pick(grassColors));
          if (d < 4.9 + noise * 0.85 && rng() > 0.2) add("grass", x, 2, z, pick(grassColors));
          if (d < 3.7 + noise * 0.65 && rng() > 0.24) add("grass", x, 3, z, pick(grassColors));
        }
      }

      for (let y = -2; y >= -11; y--) {
        const depth = Math.abs(y + 1);
        const radius = Math.max(0.8, 8.0 - depth * 0.58 + Math.sin(depth * 0.8) * 0.7);
        for (let x = -10; x <= 10; x++) {
          for (let z = -8; z <= 8; z++) {
            const nx = x - Math.sin(depth * 0.7) * 0.35;
            const nz = z - Math.cos(depth * 0.9) * 0.25;
            const d = Math.sqrt(nx * nx * 0.45 + nz * nz * 0.55);
            if (d < radius + terrainNoise(x + depth * 0.3, z - depth * 0.2) * (1 + depth * 0.08) && rng() > 0.1) {
              add("underside", x, y, z, depth < 4 ? pick(undersideColors) : pick(rockColors));
            }
          }
        }
      }

      const rootStones = [
        [0, -12, 0, 1.1], [-3, -12, -1, 0.85], [2, -12, 2, 0.8], [-1, -12, -3, 0.7],
        [3, -12, -2, 0.62], [-4, -11, 1, 0.7], [1, -13, -4, 0.52], [-2, -13, 3, 0.75]
      ];
      for (const [cx, cy, cz, r] of rootStones) {
        for (let y = cy; y >= cy - 2; y--) {
          const layer = Math.abs(y - cy);
          const rr = Math.max(0.35, r - layer * 0.28);
          for (let x = Math.floor(cx - rr - 1); x <= Math.ceil(cx + rr + 1); x++) {
            for (let z = Math.floor(cz - rr - 1); z <= Math.ceil(cz + rr + 1); z++) {
              if (Math.sqrt((x - cx) ** 2 + (z - cz) ** 2) < rr + terrainNoise(x + layer, z - layer) * 0.28) {
                add("underside", x, y, z, pick(rockColors));
              }
            }
          }
        }
      }

      const trunk = [
        [0, 5, 0], [-1, 5, 0], [0, 5, -1], [-1, 5, -1],
        [0, 6, 0], [-1, 6, 0], [0, 6, -1], [-1, 6, -1],
        [0, 7, 0], [-1, 7, 0], [0, 7, -1],
        [0, 8, 0], [-1, 8, 0], [0, 8, -1],
        [0, 9, 0], [-1, 9, 0], [0, 10, 0], [-1, 10, 0],
        [0, 11, 0], [-1, 11, 0], [0, 12, 0], [0, 13, 0],
        [-2, 11, 0], [-3, 11, 0], [-3, 12, 0], [-4, 12, 0], [-5, 13, 0],
        [1, 10, 0], [2, 10, 0], [2, 11, 0], [3, 11, 0], [4, 12, 0], [5, 13, -1],
        [0, 11, 1], [0, 12, 2], [1, 12, 2], [1, 13, 3],
        [0, 10, -1], [0, 11, -2], [-1, 12, -2], [-1, 13, -3],
        [1, 8, 0], [-2, 8, 0], [0, 8, 1], [-1, 8, -1]
      ];
      for (const p of trunk) add("trunk", p[0], p[1], p[2], pick(trunkColors));

      const canopy = [];
      const addLeaf = (x, y, z) => {
        const key = `${x},${y},${z}`;
        if (!canopy.includes(key)) canopy.push(key);
      };
      const mainRadius = 6.3;
      const yScale = mainRadius / 4.5;
      for (let x = -8; x <= 8; x++) {
        for (let y = 12; y <= 23; y++) {
          for (let z = -7; z <= 7; z++) {
            const yy = (y - 17) * yScale;
            const rough = Math.sin(x * 1.8 + z * 1.4) * 0.7 + Math.cos(y * 1.1 + x * 0.7) * 0.6 + Math.sin(z * 2.3 - y * 0.5) * 0.4;
            if (Math.sqrt(x * x + yy * yy + z * z) < mainRadius + rough && rng() > 0.18) addLeaf(x, y, z);
          }
        }
      }

      const lobes = [
        [-5, 14, 0, 3.5], [-5, 14, 1, 2.8], [5, 14, -1, 3.5], [4, 15, 0, 3],
        [1, 14, 3, 3.2], [1, 14, -3, 3], [-1, 14, -3, 2.8], [0, 21, 0, 3],
        [-2, 20, 1, 2.5], [2, 20, -1, 2.5], [1, 21, 1, 2], [-1, 21, -1, 2],
        [-7, 15, 0, 2], [6, 15, 0, 2], [0, 15, 5, 2.2], [0, 15, -5, 2.2],
        [-3, 12, 2, 2.5], [3, 12, -2, 2.5], [-2, 12, -3, 2], [2, 12, 3, 2]
      ];
      for (const [cx, cy, cz, r] of lobes) {
        for (let x = Math.floor(cx - r - 1); x <= Math.ceil(cx + r + 1); x++) {
          for (let y = Math.floor(cy - r); y <= Math.ceil(cy + r + 1); y++) {
            for (let z = Math.floor(cz - r - 1); z <= Math.ceil(cz + r + 1); z++) {
              const dx = x - cx;
              const dy = (y - cy) * 1.15;
              const dz = z - cz;
              if (Math.sqrt(dx * dx + dy * dy + dz * dz) < r && rng() > 0.2) addLeaf(x, y, z);
            }
          }
        }
      }

      for (const key of canopy) {
        const [x, y, z] = key.split(",").map(Number);
        add("leaf", x, y, z, pick(leafColors));
      }

      const stones = [
        [-2, 5, -1], [-1, 5, -1], [0, 5, -1], [1, 5, -1], [-2, 5, 0], [-1, 5, 0], [0, 5, 0], [1, 5, 0],
        [-1, 5, 1], [0, 5, 1], [1, 5, 1], [-2, 5, 1], [3, 2, 2], [3, 3, 2], [4, 1, -1], [4, 2, -1],
        [-4, 1, -2], [-4, 2, -2], [-3, 2, 2], [-3, 3, 2], [5, 1, 1], [5, 1, 0], [-5, 1, 0], [2, 3, -2],
        [-3, 3, -1], [6, 1, -2], [-6, 0, 2], [1, 4, 2], [-2, 4, -2], [3, 1, -3], [-2, 1, 3]
      ];
      for (const p of stones) add("rock", p[0], p[1], p[2], pick(rockColors));

      const topByXZ = new Map();
      for (const voxel of roles.grass) {
        const key = `${Math.round(voxel.base.x)},${Math.round(voxel.base.z)}`;
        if (!topByXZ.has(key) || voxel.base.y > topByXZ.get(key).y) topByXZ.set(key, voxel.base);
      }

      for (const pos of topByXZ.values()) {
        const underTree = Math.abs(pos.x) < 2 && Math.abs(pos.z) < 2;
        if (!underTree && rng() < 0.34) {
          add("grassTuft", pos.x + (rng() - 0.5) * 0.5, pos.y + 0.72, pos.z + (rng() - 0.5) * 0.5, pick(grassColors), 0.48);
        }
        if (!underTree && rng() < 0.15 && pos.x < -2) {
          add("mushroom", pos.x + (rng() - 0.5) * 0.35, pos.y + 0.55, pos.z + (rng() - 0.5) * 0.35, "#e8d5b0", 0.45);
        }
        if (!underTree && rng() < 0.32) {
          add("flower", pos.x + (rng() - 0.5) * 0.45, pos.y + 0.45, pos.z + (rng() - 0.5) * 0.45, pick(flowerColors), 0.36);
        }
      }
    }

    function makeWinterMap() {
      const white = ["#e8f0e8", "#d0e0d0", "#c8dcc8", "#f0f5f0", "#dceadc"];
      const pine = ["#1a4a2a", "#224e30", "#183e24", "#2a5a38", "#1e4828", "#164020"];
      const bark = ["#3a2818", "#2e2010", "#4a3420", "#342818"];
      const rock = ["#d0d0d0", "#c0c0c0", "#e0e0e0", "#b8b8b8", "#cccccc"];
      return makeMap((voxel) => {
        const p = voxel.base.clone();
        let color = voxel.color.clone();
        if (voxel.role === "leaf") {
          const h = (p.y - 12) / 11;
          const angle = Math.atan2(p.z, p.x);
          const radius = Math.sqrt(p.x * p.x + p.z * p.z);
          const tier = Math.floor(h * 5);
          const cap = Math.max(2.6, (5.5 - tier) * (1 - (h * 5 - tier) * 0.3));
          const squeezed = Math.min(radius, cap) * (cap / Math.max(3, radius + 1));
          p.x = Math.cos(angle) * squeezed * 1.1 + (rng() - 0.5) * 0.28;
          p.z = Math.sin(angle) * squeezed * 1.1 + (rng() - 0.5) * 0.28;
          p.y += h * 2 + (rng() - 0.5) * 0.25;
          color = new THREE.Color(pick((h * 5 - tier) > 0.6 || h > 0.8 ? white : pine));
          if ((h * 5 - tier) > 0.6 || h > 0.8) color.multiplyScalar(0.74);
        } else if (voxel.role === "trunk") {
          p.x = p.x * 0.7 + (rng() - 0.5) * 0.15;
          p.z = p.z * 0.7 + (rng() - 0.5) * 0.15;
          color = new THREE.Color(pick(bark));
        } else if (voxel.role === "grass" || voxel.role === "grassTuft") {
          p.x *= 0.72;
          p.z *= 0.72;
          p.y += Math.max(0, 4 - Math.abs(p.x) - Math.abs(p.z) * 0.5) * 0.18;
          color = new THREE.Color(pick(white)).multiplyScalar(0.82);
        } else if (voxel.role === "rock" || voxel.role === "underside") {
          p.x *= 0.94;
          p.z *= 0.94;
          color = new THREE.Color(pick(rock)).multiplyScalar(voxel.role === "rock" ? 0.9 : 0.72);
        }
        return [p, color];
      });
    }

    function makeBlossomMap() {
      const blossom = ["#ffb7c5", "#ff97b0", "#ffc8d6", "#ff85a0", "#ffd0db", "#ffa0b8", "#ff90a8"];
      const pale = ["#fff0f5", "#ffe8ef", "#fff5f8", "#ffeef3"];
      const bark = ["#5c3a28", "#4a2e1e", "#6b4835", "#3d2418", "#7a5840"];
      const grass = ["#5a9e4a", "#4a8c3f", "#68ad58", "#3d7a34", "#55a048"];
      const stone = ["#a09888", "#8c847a", "#b5ada0", "#9a9284", "#706860"];
      return makeMap((voxel) => {
        const p = voxel.base.clone();
        let color = voxel.color.clone();
        if (voxel.role === "leaf") {
          const h = (p.y - 12) / 11;
          const radius = Math.sqrt(p.x * p.x + p.z * p.z);
          const spread = 1.28;
          p.x = p.x * spread + (rng() - 0.5) * 0.28;
          p.z = p.z * spread + (rng() - 0.5) * 0.28;
          p.y = p.y - radius * 0.06 - h * 1.5 + (rng() - 0.5) * 0.25;
          color = new THREE.Color(pick(rng() < 0.15 ? pale : blossom));
        } else if (voxel.role === "trunk") {

    function makeBaobabMap() {
      const bark = ["#a87858", "#9a6a48", "#b88868", "#8a5a3a", "#a06848", "#b07050", "#967050"];
      const barkShade = ["#5a3a25", "#6a4530", "#724935", "#7a503c", "#5a3528"];

      const leaves = ["#6a8a55", "#7a9a65", "#5a7848", "#88a572", "#6e9460", "#4f6e3e"];

      const soil = ["#6a3a1a", "#5a2e15", "#7a4520", "#4a2812", "#6c3a1c", "#854c22"];
      const sun = ["#ff9050", "#e87830", "#ff7530", "#f08a40"];

      const trunkBaseY = -1;
      const trunkTopY = 15.5;
      const trunkH = trunkTopY - trunkBaseY;

      const trunkRadius = (yt) => {
        const t = clamp((yt - trunkBaseY) / trunkH);
        return 4.6 - 1.05 * t + Math.sin(t * Math.PI) * 0.45;
      };

      const branchCount = 11;
      const branches = [];
      for (let i = 0; i < branchCount; i++) {
        const a = (i / branchCount) * Math.PI * 2 + 0.27;
        branches.push({
          cosA: Math.cos(a),
          sinA: Math.sin(a),
          length: 5.4 + (i % 4) * 0.8,
          lift: 1.6 + ((i * 37) % 5) * 0.35
        });
      }
      const branchStartR = trunkRadius(trunkTopY) - 0.5;
      const clumpCount = 14;
      const clumps = [];
      for (let i = 0; i < clumpCount; i++) {
        const b = branches[i % branchCount];
        const radial = branchStartR + b.length + ((i * 0.37) % 1) * 0.9;
        const off = ((i * 17) % branchCount) / branchCount * 0.35;
        const ca = b.cosA + (((i * 13) % 7) - 3) * 0.04;
        const sa = b.sinA + (((i * 19) % 7) - 3) * 0.04;
        clumps.push({
          x: ca * radial + off,
          y: trunkTopY + b.lift + 0.5 + ((i * 0.29) % 1) * 1.1,
          z: sa * radial - off
        });
      }

      return makeMap((voxel) => {
        const p = voxel.base.clone();
        let color = voxel.color.clone();
        if (voxel.role === "leaf") {
          const s = voxel.seed;
          if (s < 0.62) {
            const ringT = s / 0.62;
            const yt = trunkBaseY + ringT * trunkH;
            const angle = Math.atan2(voxel.base.z, voxel.base.x || 0.001) + s * Math.PI * 5.5;
            const radius = trunkRadius(yt) + (rng() - 0.5) * 0.5;
            p.x = Math.cos(angle) * radius + (rng() - 0.5) * 0.28;
            p.z = Math.sin(angle) * radius + (rng() - 0.5) * 0.28;
            p.y = yt + (rng() - 0.5) * 0.55;
            const lit = Math.cos(angle) > 0.1;
            color = new THREE.Color(pick(lit ? (rng() < 0.45 ? barkLight : bark) : (rng() < 0.55 ? barkShade : bark)));
          } else if (s < 0.93) {
            const bi = Math.floor(((s - 0.62) / 0.31) * branchCount) % branchCount;
            const b = branches[bi];
            const along = ((s * 173.3 + voxel.base.y * 0.11) % 1);
            const r0 = branchStartR + along * b.length;
            const taper = 0.55 * (1 - along) + 0.18;
            p.x = b.cosA * r0 + (rng() - 0.5) * taper * 1.6;
            p.z = b.sinA * r0 + (rng() - 0.5) * taper * 1.6;
            p.y = trunkTopY + along * b.lift + Math.sin(along * Math.PI) * 0.7 + (rng() - 0.5) * taper;
            color = new THREE.Color(pick(rng() < 0.4 ? barkShade : bark));
          } else {
            const ci = Math.floor(rng() * clumpCount);
            const c = clumps[ci];
            p.x = c.x + (rng() - 0.5) * 1.7;
            p.z = c.z + (rng() - 0.5) * 1.7;
            p.y = c.y + (rng() - 0.5) * 1.2;
            color = new THREE.Color(pick(leaves));
          }
        } else if (voxel.role === "trunk") {
          const t = clamp((p.y - 5) / 13);
          const yt = trunkBaseY + t * trunkH;
          const ring = Math.atan2(p.z, Math.abs(p.x) > 0.01 ? p.x : 0.01);
          const radius = trunkRadius(yt);
          p.x = Math.cos(ring) * radius + (rng() - 0.5) * 0.25;
          p.z = Math.sin(ring) * radius + (rng() - 0.5) * 0.25;
          p.y = yt + (rng() - 0.5) * 0.3;
          const lit = Math.cos(ring) > 0.1;
          color = new THREE.Color(pick(lit ? barkLight : bark));
        } else if (voxel.role === "grass" || voxel.role === "grassTuft") {
          p.x *= 1.35;
          p.z *= 1.35;
          p.y = Math.max(0, p.y) * 0.4;
          color = new THREE.Color(pick(savanna));
        } else if (voxel.role === "underside") {
          p.x *= 1.06;
          p.z *= 1.06;
          p.y *= 0.78;
          color = new THREE.Color(pick(soil));
        } else if (voxel.role === "rock") {
          color = new THREE.Color(pick(soil)).multiplyScalar(0.88);
        } else if (voxel.role === "flower" || voxel.role === "mushroom") {
          color = new THREE.Color(pick(rng() < 0.5 ? savanna : sun));
        }
        return [p, color];
      });
    }

          if (topLit && r < 0.5) palette = leafLight;
          else if (ny < -0.2 && r < 0.55) palette = leafDeep;
          else palette = r < 0.55 ? leafMid : leafDeep;
          color = new THREE.Color(pick(palette));
        } else if (voxel.role === "trunk") {
          const t = clamp((p.y - 5) / 9);
          const thick = 1.15 + (1 - t) * 0.5;
          const ring = Math.atan2(p.z, Math.abs(p.x) > 0.01 ? p.x : 0.01);
          p.x = Math.cos(ring) * thick + Math.sin(p.y * 0.3) * 0.3 + (rng() - 0.5) * 0.18;
          p.z = Math.sin(ring) * thick + (rng() - 0.5) * 0.18;
          p.y = 4.5 + t * 11 + (rng() - 0.5) * 0.25;
          const lit = Math.cos(ring) > 0.2;
          color = new THREE.Color(pick(lit && rng() < 0.45 ? barkLight : bark));
        } else if (rootRoles.has(voxel.role)) {
          const idx = Math.floor(voxel.seed * archCount * 1.7) % archCount;
          const arch = arches[idx];
          const along = (voxel.seed * 31.7 + Math.abs(p.x) * 0.11 + Math.abs(p.z) * 0.09) % 1;
          const radial = along * arch.length;
          const archLift = Math.sin(along * Math.PI) * 1.2;
          const taper = 0.55 * (1 - along) + 0.22;
          p.x = arch.cosA * radial + (rng() - 0.5) * taper * 1.4;
          p.z = arch.sinA * radial + (rng() - 0.5) * taper * 1.4;
          const apex = arch.startY * (1 - along) + archLift;
          const dip = Math.max(0, along - 0.78) * (arch.startY + 5);
          p.y = apex - dip + (rng() - 0.5) * 0.22;
          color = new THREE.Color(pick(rootBark));
        } else if (voxel.role === "grass") {
          const radial = Math.sqrt(p.x * p.x + p.z * p.z);
          p.x *= 1.32;
          p.z *= 1.32;
          p.y = waterLevel + (rng() - 0.5) * 0.22;
          const r = rng();
          const palette = radial > 4.5 && r < 0.2 ? foam : waterShallow;
          color = new THREE.Color(pick(palette));
        } else if (voxel.role === "underside") {
          const depth = Math.abs(p.y);
          p.x *= 1.08;
          p.z *= 1.08;
          p.y = waterLevel - 0.5 - (depth - 1) * 0.55;
          let palette;
          if (depth < 2.5) palette = waterMid;
          else if (depth < 5) palette = waterDeep;
          else if (depth < 8) palette = waterDeep;
          else palette = mud;
          color = new THREE.Color(pick(palette));
        }
        return [p, color];
      });
    }

    function makeJacarandaMap() {

        { angle: 0.55, start: 0.52, length: 6.4, lift: 2.4 },
        { angle: 1.38, start: 0.37, length: 7.2, lift: 1.8 },
        { angle: 2.28, start: 0.62, length: 5.6, lift: 2.5 }
      ];

      const blossomClusters = branches.flatMap((branch, i) => {

          const sway = Math.sin(i * 1.7 + j) * 0.85;

            x: base.x + Math.cos(branch.angle) * branch.length * along + Math.cos(branch.angle + Math.PI / 2) * sway,
            y: base.y + branch.lift * along + Math.sin(along * Math.PI) * 1.2 + j * 0.45,
            z: base.z + Math.sin(branch.angle) * branch.length * along + Math.sin(branch.angle + Math.PI / 2) * sway,

            ry: 1.0 + j * 0.25,
            rz: 1.45 + ((i + j) % 3) * 0.32

      });
      blossomClusters.push({ x: 0.2, y: 17.7, z: -0.3, rx: 2.0, ry: 1.15, rz: 1.9 });

            const side = Math.sin(s * 80.0) * taper;
            p.x = base.x + Math.cos(branch.angle) * branch.length * along + Math.cos(branch.angle + Math.PI / 2) * side + (rng() - 0.5) * taper;
            p.z = base.z + Math.sin(branch.angle) * branch.length * along + Math.sin(branch.angle + Math.PI / 2) * side + (rng() - 0.5) * taper;
            p.y = base.y + branch.lift * along + Math.sin(along * Math.PI) * 1.4 + (rng() - 0.5) * taper;
            color = new THREE.Color(pick(rng() < 0.24 ? barkLight : bark));
          } else {
            const cluster = blossomClusters[Math.floor((s * 97.0 + p.x * 0.19 + p.z * 0.13) % blossomClusters.length)];
            const a = s * Math.PI * 17.0 + p.x * 0.31;
            const r = Math.sqrt((s * 13.7 + Math.abs(p.z) * 0.07) % 1);
            const vertical = Math.sin(s * Math.PI * 23.0 + p.y) * 0.8;
            p.x = cluster.x + Math.cos(a) * r * cluster.rx + (rng() - 0.5) * 0.38;
            p.z = cluster.z + Math.sin(a) * r * cluster.rz + (rng() - 0.5) * 0.38;
            p.y = cluster.y + vertical * cluster.ry + (rng() - 0.5) * 0.32;
            if (s > 0.86 && rng() < 0.7) {
              p.x += (rng() - 0.5) * 1.8;
              p.z += (rng() - 0.5) * 1.8;
              color = new THREE.Color(pick(leafGreen));
            } else {
              const palette = s > 0.68 ? bloomPale : s > 0.42 ? bloomMid : bloomDeep;
              color = new THREE.Color(pick(palette));
            }
          }
        } else if (voxel.role === "trunk") {
          const t = clamp((p.y - 5) / 9);
          const curve = samplePath(trunkPath, t);
          const ring = Math.atan2(p.z, Math.abs(p.x) > 0.01 ? p.x : 0.01);
          const thick = 1.18 - t * 0.38;
          p.x = curve.x + Math.cos(ring) * thick + (rng() - 0.5) * 0.15;
          p.z = curve.z + Math.sin(ring) * thick + (rng() - 0.5) * 0.15;
          p.y = curve.y + (rng() - 0.5) * 0.22;
          color = new THREE.Color(pick(Math.cos(ring) > 0.18 ? barkLight : bark));
        } else if (voxel.role === "grass" || voxel.role === "grassTuft") {
          p.x *= 1.08;
          p.z *= 1.08;
          p.y = Math.max(0, p.y) * 0.48;
          color = new THREE.Color(pick(grass));
        } else if (voxel.role === "underside") {
          p.x *= 1.02;
          p.z *= 1.02;
          p.y *= 0.62;
          color = new THREE.Color(pick(soil));
        } else if (voxel.role === "rock") {
          color = new THREE.Color(pick(soil)).multiplyScalar(0.88);
        } else if (voxel.role === "flower" || voxel.role === "mushroom") {
          const cluster = blossomClusters[Math.floor(voxel.seed * blossomClusters.length) % blossomClusters.length];
          const a = rng() * Math.PI * 2;
          const r = Math.sqrt(rng());
          p.x = cluster.x + Math.cos(a) * r * cluster.rx * 0.8;
          p.z = cluster.z + Math.sin(a) * r * cluster.rz * 0.8;
          p.y = cluster.y + (rng() - 0.5) * cluster.ry * 1.5;
          color = new THREE.Color(pick(lavender));
        }
        return [p, color];
      });
    }

          const z = base.z + Math.sin(limb.angle) * limb.length * along + Math.sin(limb.angle + Math.PI / 2) * side;
          return {

            z,
            y: base.y + limb.lift * along + Math.sin(along * Math.PI) * 1.3 - limb.sag * along * along + 3.0 + j * 0.45,

        const anchorZ = base.z + Math.sin(limb.angle) * limb.length * along + Math.sin(limb.angle + Math.PI / 2) * side;
        const anchorY = base.y + limb.lift * along + Math.sin(along * Math.PI) * 1.3 - limb.sag * along * along;
        return {

          y: anchorY,
          z: anchorZ,
          sway: 0.18 + (i % 3) * 0.07,

      const buttressRoots = Array.from({ length: 16 }, (_, i) => {
        const angle = (i / 16) * Math.PI * 2 + 0.18 + Math.sin(i * 1.7) * 0.08;

            const along = (s * 37.0 + p.y * 0.045 + Math.abs(p.z) * 0.018) % 1;
            const base = samplePath(trunkPath, limb.start);
            const taper = limb.thick * (1 - along * 0.68) + 0.22;
            const side = Math.sin(s * 92.0 + p.x) * taper;

            p.z = cluster.z + Math.sin(a) * r * cluster.rz + (rng() - 0.5) * 0.5;
            p.y = cluster.y + height * cluster.ry + (rng() - 0.5) * 0.38;
            const palette = height > 0.45 ? leafLight : r > 0.72 ? leafMid : leafDeep;
            color = new THREE.Color(pick(palette));
          }
        } else if (voxel.role === "trunk") {
          const t = clamp((p.y - 5) / 9);
          const curve = samplePath(trunkPath, t);
          const ring = Math.atan2(p.z, Math.abs(p.x) > 0.01 ? p.x : 0.01);
          const baseBias = (1 - t) * (1 - t);
          const lobe = 1 + Math.sin(ring * 6 + t * 2.4) * 0.16 * (1 - t);
          const flare = (3.65 - t * 1.35 + Math.sin(t * Math.PI) * 0.42 + baseBias * 0.75) * lobe;
          p.x = curve.x + Math.cos(ring) * flare + (rng() - 0.5) * 0.22;
          p.z = curve.z + Math.sin(ring) * flare * 0.96 + (rng() - 0.5) * 0.22;
          p.y = curve.y - baseBias * 0.42 + (rng() - 0.5) * 0.24;
          color = new THREE.Color(pick(Math.cos(ring) > -0.05 ? barkLight : bark));
        } else if (voxel.role === "flower" || voxel.role === "mushroom" || voxel.role === "grassTuft") {

          const drop = (voxel.seed * 17.0 + Math.abs(p.z) * 0.11) % 1;
          p.x = root.x + Math.sin(drop * Math.PI * 5 + voxel.seed * 20.0) * (root.sway + 0.08) + (rng() - 0.5) * 0.12;
          p.z = root.z + Math.cos(drop * Math.PI * 4 + voxel.seed * 19.0) * (root.sway + 0.08) + (rng() - 0.5) * 0.12;
          p.y = root.y - drop * root.reach + (rng() - 0.5) * 0.16;
          color = new THREE.Color(pick(rootBark));
        } else if (voxel.role === "grass") {
          p.x *= 1.35;
          p.z *= 1.35;
          p.y = Math.max(0, p.y) * 0.4;
          color = new THREE.Color(pick(grass));
        } else if (voxel.role === "underside") {
          p.x *= 1.12;
          p.z *= 1.12;
          p.y *= 0.68;
          color = new THREE.Color(pick(soil));
        } else if (voxel.role === "rock") {
          const root = buttressRoots[Math.floor(voxel.seed * buttressRoots.length * 2.0) % buttressRoots.length];
          const along = 0.32 + ((voxel.seed * 29.0 + Math.abs(p.x) * 0.08) % 0.68);

          p.z = Math.sin(root.angle) * root.length * along + Math.sin(root.angle + Math.PI / 2) * side + (rng() - 0.5) * width * 0.45;
          p.y = 2.7 - along * 2.25 + Math.sin(along * Math.PI) * 0.34 + (rng() - 0.5) * 0.16;
          color = new THREE.Color(pick(rootBark)).multiplyScalar(0.9);
        }
        return [p, color];
      });

        const u = (s * 29.7 + Math.abs(p.x) * 0.093 + Math.abs(p.z) * 0.071 + p.y * 0.019) % 1;
        const fan = (col - 3) * 0.24 + Math.sin(row * 1.7) * 0.06;
        const arc = (u - 0.5) * 1.35;
        const curl = Math.sin(u * Math.PI);
        p.x = bunchAnchor.x + fan + arc * 0.35 + curl * 0.12 + (rng() - 0.5) * 0.08;
        p.z = bunchAnchor.z + row * 0.16 - col * 0.035 + (rng() - 0.5) * 0.1;
        p.y = bunchAnchor.y - row * 0.48 - u * 1.25 + curl * 0.42 + (rng() - 0.5) * 0.09;
        if (u < 0.11 || u > 0.9) return new THREE.Color(pick(bananaTip));
        return new THREE.Color(pick(banana));
      };

      const placeLeafBlade = (voxel, p) => {
        const s = voxel.seed;
        if (s < 0.17) {
          const t = (s * 7.3 + p.y * 0.033 + Math.abs(p.x) * 0.021) % 1;
          const side = ((s * 41.0 + p.z * 0.13) % 1 - 0.5) * 1.25 * Math.sin(t * Math.PI);
          p.x = side + Math.sin(t * Math.PI * 1.2) * 0.28 + (rng() - 0.5) * 0.08;
          p.z = 0.1 + Math.cos(t * Math.PI) * 0.18 + (rng() - 0.5) * 0.16;
          p.y = crown.y + t * 9.7 + Math.sin(t * Math.PI) * 0.75;
          return new THREE.Color(pick(t < 0.18 || Math.abs(side) < 0.14 ? rib : leafLight));
        }

        const shifted = (s - 0.17) / 0.83;
        const blade = leaves[Math.floor(shifted * leaves.length) % leaves.length];
        const u = (shifted * 19.0 + Math.abs(p.y) * 0.037 + Math.abs(p.x) * 0.019) % 1;
        const edgeSeed = (s * 83.0 + p.z * 0.17 + p.x * 0.09) % 1;
        const bladeWidth = blade.width * Math.sin(Math.PI * u) * (0.72 + 0.18 * Math.sin(u * Math.PI * 3));
        const side = (edgeSeed - 0.5) * 2 * bladeWidth;
        const ragged = Math.abs(side) > bladeWidth * 0.72 && rng() < 0.42;
        const split = Math.abs(side) < bladeWidth * 0.09;
        const dirX = Math.cos(blade.angle);
        const dirZ = Math.sin(blade.angle);
        const sideX = Math.cos(blade.angle + Math.PI / 2);
        const sideZ = Math.sin(blade.angle + Math.PI / 2);
        const ripple = Math.sin(u * Math.PI * 7 + s * 23.0) * 0.14;
        const tear = ragged ? (rng() - 0.5) * 0.55 : 0;
        p.x = crown.x + dirX * blade.length * u + sideX * (side + tear) + (rng() - 0.5) * 0.12;
        p.z = crown.z + dirZ * blade.length * u + sideZ * (side + tear) + (rng() - 0.5) * 0.12;
        p.y = crown.y + blade.rise * Math.sin(u * Math.PI * 0.72) + blade.lift * u - blade.droop * u * u + ripple + (split ? 0.15 : 0);
        if (split) return new THREE.Color(pick(rib));
        if (ragged) return new THREE.Color(pick(rng() < 0.4 ? leafDeep : leafMid)).multiplyScalar(0.9);
        return new THREE.Color(pick(u < 0.2 || edgeSeed > 0.78 ? leafLight : leafMid));
      };

      return makeMap((voxel) => {
        const p = voxel.base.clone();
        let color = voxel.color.clone();
        if (voxel.role === "leaf") {
          if (voxel.seed < 0.14) {
            const t = (voxel.seed * 8.0 + p.y * 0.042 + Math.abs(p.x) * 0.017) % 1;
            const angle = voxel.seed * Math.PI * 16 + p.z * 0.22;
            const radius = 0.72 + 0.55 * (1 - t) + Math.sin(t * Math.PI * 5) * 0.08;
            p.x = Math.cos(angle) * radius + Math.sin(t * Math.PI * 2) * 0.22 + (rng() - 0.5) * 0.1;
            p.z = Math.sin(angle) * radius * 0.85 + (rng() - 0.5) * 0.1;
            p.y = 1.2 + t * 14.0 + (rng() - 0.5) * 0.18;
            color = new THREE.Color(pick(t > 0.62 ? sheathGreen : sheath));
          } else if (voxel.seed < 0.26) {
            color = placeBanana(voxel, p);
          } else {
            color = placeLeafBlade(voxel, p);
          }
        } else if (voxel.role === "trunk") {
          const t = clamp((p.y - 5) / 9);
          const angle = Math.atan2(p.z, Math.abs(p.x) > 0.01 ? p.x : 0.01) + t * 0.65;
          const radius = 1.28 - t * 0.36 + Math.sin(t * Math.PI * 8 + angle) * 0.08;
          p.x = Math.cos(angle) * radius + (rng() - 0.5) * 0.1;
          p.z = Math.sin(angle) * radius * 0.82 + (rng() - 0.5) * 0.1;
          p.y = 1.1 + t * 13.8 + (rng() - 0.5) * 0.18;
          color = new THREE.Color(pick(t > 0.72 ? sheathGreen : sheath));
        } else if (voxel.role === "flower" || voxel.role === "mushroom") {
          color = placeBanana(voxel, p);
        } else if (voxel.role === "grassTuft") {
          const t = (voxel.seed * 13.0 + Math.abs(p.x) * 0.06) % 1;
          const angle = voxel.seed * Math.PI * 18;
          const radius = 1.1 + t * 1.4;
          p.x = Math.cos(angle) * radius + (rng() - 0.5) * 0.1;
          p.z = Math.sin(angle) * radius + (rng() - 0.5) * 0.1;
          p.y = 0.9 + t * 5.2 + (rng() - 0.5) * 0.14;
          color = new THREE.Color(pick(t > 0.48 ? sheathGreen : sheath));
        } else if (voxel.role === "grass") {
          p.x *= 1.2;
          p.z *= 1.2;
          p.y = Math.max(0, p.y) * 0.42;
          color = new THREE.Color(pick(grass));
        } else if (voxel.role === "underside") {
          p.x *= 1.05;
          p.z *= 1.05;
          p.y *= 0.66;
          color = new THREE.Color(pick(soil));
        } else if (voxel.role === "rock") {
          p.x *= 0.9;
          p.z *= 0.9;
          p.y = Math.min(p.y, 0.55);
          color = new THREE.Color(pick(soil)).multiplyScalar(0.86);
        }
        return [p, color];
      });
    }

    function makeBambooGroveMap() {

      );

      const culmCenter = (culm, t) => {
        const bow = Math.sin(t * Math.PI * 0.9 + culm.phase * Math.PI * 2) * culm.lean * t;
        const cross = Math.sin(t * Math.PI * 3.1 + culm.phase * 5.7) * 0.04 * t;
        return {
          x: culm.x + Math.cos(culm.angle) * bow + Math.cos(culm.angle + Math.PI / 2) * cross,
          y: 0.55 + t * culm.h,
          z: culm.z + Math.sin(culm.angle) * bow + Math.sin(culm.angle + Math.PI / 2) * cross
        };
      };

      const placeCulm = (voxel, p, forceNode = false, offset = 0) => {
        const ci = culmIndex(voxel, offset);
        const culm = culms[ci];
        const maxNode = Math.max(3, Math.floor(culm.h / culm.node) - 1);
        let t = hash01(voxel.seed * 31.7 + voxel.base.y * 0.061 + Math.abs(voxel.base.x) * 0.037 + offset);
        if (forceNode) {
          const nodeIndex = 1 + Math.floor(hash01(voxel.seed * 53.1 + voxel.base.x * 0.19 + offset) * maxNode);
          t = clamp((nodeIndex * culm.node + culm.phase * 0.45) / culm.h);
        }

        const quantizedY = Math.round(t * culm.h * 1.05) / 1.05;
        t = clamp(quantizedY / culm.h);
        const center = culmCenter(culm, t);
        const segment = (center.y - 0.55) / culm.node + culm.phase;
        const segmentEdge = Math.min(fract(segment), 1 - fract(segment));
        const isNode = forceNode || segmentEdge < 0.075;
        const jitter = isNode ? 0.18 : 0.08;

        const u = hash01(voxel.seed * 41.0 + Math.abs(voxel.base.y) * 0.037 + Math.abs(voxel.base.x) * 0.021 + offset);

        if (Math.abs(width) < 0.045 || edgeSeed > 0.86) return new THREE.Color(choose(rib, voxel.seed * 43.0 + u));
        if (u > 0.84) return new THREE.Color(choose(hash01(voxel.seed * 59.0) > 0.45 ? leafDeep : leafMid, voxel.seed * 61.0));

      });
    }

        const center = samplePath(trunkPath, t);
        const angle = voxel.seed * Math.PI * 34 + t * Math.PI * 13 + voxel.base.z * 0.15;
        const ringRidge = Math.sin(t * Math.PI * 34 + angle * 2.0) > 0.36;
        const radius = 0.92 - t * 0.23 + (ringRidge ? 0.12 : 0) + (rng() - 0.5) * 0.08;
        p.x = center.x + Math.cos(angle) * radius + (rng() - 0.5) * 0.08;
        p.z = center.z + Math.sin(angle) * radius * 0.88 + (rng() - 0.5) * 0.08;
        p.y = center.y + (rng() - 0.5) * 0.22;
        if (ringRidge) return new THREE.Color(pick(barkLight));
        return new THREE.Color(pick(Math.cos(angle) > 0.1 ? bark : barkDark));
      };

      const placeDateBunch = (voxel, p) => {
        const s = voxel.seed;
        const bunch = bunches[Math.floor((s * 53.0 + Math.abs(voxel.base.x) * 0.19) % bunches.length)];
        const row = Math.floor(s * 47) % 7;
        const col = Math.floor(s * 131) % 6;
        const u = (s * 29.0 + Math.abs(voxel.base.y) * 0.031 + Math.abs(voxel.base.z) * 0.047) % 1;
        const hang = (row / 6) * bunch.length + u * 0.45;
        const clump = Math.sin((row + 1) * 1.7 + col) * 0.12;
        const side = (col - 2.5) * 0.21 * (1 - row * 0.08) + clump;
        const dirX = Math.cos(bunch.angle);
        const dirZ = Math.sin(bunch.angle);
        const sideX = Math.cos(bunch.angle + Math.PI / 2);
        const sideZ = Math.sin(bunch.angle + Math.PI / 2);
        p.x = crown.x + dirX * (0.95 + row * bunch.lean * 0.18) + sideX * side * bunch.spread + (rng() - 0.5) * 0.12;
        p.z = crown.z + dirZ * (0.95 + row * bunch.lean * 0.18) + sideZ * side * bunch.spread + (rng() - 0.5) * 0.12;
        p.y = bunch.y - hang + Math.sin(u * Math.PI) * 0.22 + (rng() - 0.5) * 0.08;
        return new THREE.Color(pick(rng() < 0.62 ? dateBrown : dateAmber));
      };

      const placeFrond = (voxel, p) => {
        const s = voxel.seed;
        const blade = fronds[Math.floor((s * 97.0 + Math.abs(p.x) * 0.13 + p.z * 0.07) % fronds.length)];
        const u = (s * 19.0 + Math.abs(p.y) * 0.039 + Math.abs(p.x) * 0.021) % 1;
        const leafletSeed = (s * 83.0 + p.z * 0.17 + p.x * 0.09) % 1;
        const width = blade.width * Math.sin(Math.PI * u) * (0.62 + 0.18 * Math.sin(u * Math.PI * 5));
        const ribSide = (leafletSeed - 0.5) * 2 * width;
        const split = Math.abs(ribSide) < width * 0.13;
        const ragged = Math.abs(ribSide) > width * 0.72 && rng() < 0.35;
        const dirX = Math.cos(blade.angle);
        const dirZ = Math.sin(blade.angle);
        const sideX = Math.cos(blade.angle + Math.PI / 2);
        const sideZ = Math.sin(blade.angle + Math.PI / 2);
        const ripple = Math.sin(u * Math.PI * 9 + s * 23.0) * 0.13;
        const serration = ragged ? (rng() - 0.5) * 0.42 : 0;
        p.x = crown.x + dirX * blade.length * u + sideX * (ribSide + serration) + (rng() - 0.5) * 0.1;
        p.z = crown.z + dirZ * blade.length * u + sideZ * (ribSide + serration) + (rng() - 0.5) * 0.1;
        p.y = crown.y + blade.rise * Math.sin(u * Math.PI * 0.74) + blade.lift * u - blade.droop * u * u + ripple;
        if (split) return new THREE.Color(pick(rib));
        if (ragged || u > 0.84) return new THREE.Color(pick(rng() < 0.32 ? dryFrond : frondDeep)).multiplyScalar(0.92);
        if (u < 0.18 || leafletSeed > 0.76) return new THREE.Color(pick(frondLight));
        return new THREE.Color(pick(rng() < 0.58 ? frondMid : frondDeep));
      };

      return makeMap((voxel) => {
        const p = voxel.base.clone();
        let color = voxel.color.clone();
        if (voxel.role === "leaf") {
          if (voxel.seed < 0.2) {
            color = placeTrunkFiber(voxel, p);
          } else if (voxel.seed < 0.35) {
            color = placeDateBunch(voxel, p);
          } else {
            color = placeFrond(voxel, p);
          }
        } else if (voxel.role === "trunk") {
          const t = clamp((p.y - 5) / 9);
          const center = samplePath(trunkPath, t);
          const angle = Math.atan2(p.z, Math.abs(p.x) > 0.01 ? p.x : 0.01) + t * 1.1;
          const ridge = Math.sin(t * Math.PI * 30) > 0.34;
          const radius = 1.02 - t * 0.28 + (ridge ? 0.16 : 0);
          p.x = center.x + Math.cos(angle) * radius + (rng() - 0.5) * 0.08;
          p.z = center.z + Math.sin(angle) * radius * 0.86 + (rng() - 0.5) * 0.08;
          p.y = center.y + (rng() - 0.5) * 0.18;
          color = new THREE.Color(pick(ridge ? barkLight : bark));
        } else if (voxel.role === "flower" || voxel.role === "mushroom") {
          color = placeDateBunch(voxel, p);
        } else if (voxel.role === "grassTuft") {
          const s = voxel.seed;
          const blade = fronds[Math.floor(s * fronds.length) % fronds.length];
          const u = 0.08 + ((s * 17.0 + Math.abs(p.x) * 0.04) % 0.62);
          const side = ((s * 43.0 + p.z * 0.1) % 1 - 0.5) * 0.55;
          const dirX = Math.cos(blade.angle);
          const dirZ = Math.sin(blade.angle);
          const sideX = Math.cos(blade.angle + Math.PI / 2);
          const sideZ = Math.sin(blade.angle + Math.PI / 2);
          p.x = crown.x + dirX * blade.length * u * 0.42 + sideX * side + (rng() - 0.5) * 0.08;
          p.z = crown.z + dirZ * blade.length * u * 0.42 + sideZ * side + (rng() - 0.5) * 0.08;
          p.y = crown.y - 0.7 - u * 3.5 + Math.sin(u * Math.PI) * 0.45;
          color = new THREE.Color(pick(dryFrond));
        } else if (voxel.role === "grass") {
          p.x *= 1.28;
          p.z *= 1.28;
          p.y = Math.max(0, p.y) * 0.34;
          color = new THREE.Color(pick(sand));
        } else if (voxel.role === "underside") {
          p.x *= 1.06;
          p.z *= 1.06;
          p.y *= 0.62;
          color = new THREE.Color(pick(soil));
        } else if (voxel.role === "rock") {
          p.x *= 0.95;
          p.z *= 0.95;
          p.y = Math.min(p.y, 0.35);
          color = new THREE.Color(pick(rng() < 0.45 ? stone : soil)).multiplyScalar(0.86);
        }
        return [p, color];
      });
    }

    function makeWeepingWillowMap() {
      const leafDeep = ["#1f5a35", "#28683f", "#194b2e", "#2d7043", "#225f39"];
      const leafMid = ["#4a9a56", "#58aa62", "#3f8e4c", "#65b76b", "#4f9f58", "#5aa85a"];
      const leafLight = ["#83c96f", "#94d87f", "#78bd66", "#a6e18e", "#8bd077"];
      const leafYellow = ["#b2c86d", "#c0d37a", "#a5bc62", "#d1df8a"];
      const whiteBark = ["#f4ead9", "#fff4df", "#e8dfcf", "#d9d1c4", "#f8f0e6"];
      const barkShade = ["#b8aa94", "#c8baa5", "#a9967e", "#d2c7b6"];
      const barkLine = ["#806d57", "#917c63", "#6e5e4d", "#a0886d"];
      const grass = ["#3f8a3d", "#4b9848", "#5aa655", "#367c38", "#6bb760"];
      const moss = ["#5a9d54", "#6baa62", "#78b86e", "#4f8f4a"];
      const soil = ["#4a3520", "#5c4328", "#3a2a1b", "#6a4f30", "#2e2116"];
      const stone = ["#a89f91", "#918879", "#b8afa0", "#80776b"];

      const trunkPath = [
        [0, 0.45, 0],
        [-0.32, 5.4, 0.16],
        [0.26, 10.1, -0.12],
        [-0.12, 14.7, 0.1],
        [0.18, 18.6, 0]
      ];

      const limbs = [
        { angle: -2.95, start: 0.62, length: 10.6, lift: 2.9, sag: 2.0, hang: 9.0 },
        { angle: -2.48, start: 0.7, length: 9.5, lift: 3.3, sag: 1.7, hang: 8.2 },
        { angle: -1.96, start: 0.74, length: 11.2, lift: 3.0, sag: 1.9, hang: 9.2 },
        { angle: -1.34, start: 0.8, length: 9.0, lift: 3.5, sag: 1.3, hang: 7.8 },
        { angle: -0.78, start: 0.66, length: 11.6, lift: 2.8, sag: 2.2, hang: 9.4 },
        { angle: -0.18, start: 0.72, length: 10.0, lift: 3.1, sag: 1.9, hang: 8.8 },
        { angle: 0.42, start: 0.64, length: 11.8, lift: 2.8, sag: 2.1, hang: 9.6 },
        { angle: 1.04, start: 0.76, length: 9.2, lift: 3.4, sag: 1.5, hang: 8.1 },
        { angle: 1.58, start: 0.8, length: 10.4, lift: 3.1, sag: 1.7, hang: 8.7 },
        { angle: 2.16, start: 0.68, length: 11.4, lift: 2.9, sag: 2.0, hang: 9.2 },
        { angle: 2.72, start: 0.62, length: 10.2, lift: 2.7, sag: 1.9, hang: 8.9 }
      ];

      const limbPoint = (limb, along) => {
        const base = samplePath(trunkPath, limb.start);
        const lift = limb.lift * Math.sin(along * Math.PI * 0.82);
        const sag = limb.sag * along * along;
        return {
          x: base.x + Math.cos(limb.angle) * limb.length * along,
          y: base.y + lift - sag,
          z: base.z + Math.sin(limb.angle) * limb.length * along
        };
      };

      const placeWhiteTrunk = (voxel, p) => {
        const t = clamp((voxel.base.y - 4.8) / 8.6);
        const center = samplePath(trunkPath, t);
        const angle = Math.atan2(voxel.base.z, Math.abs(voxel.base.x) > 0.01 ? voxel.base.x : 0.01) + t * 0.85;
        const ripple = Math.sin(t * Math.PI * 18 + angle * 5);
        const radius = 1.65 - t * 0.52 + ripple * 0.08;
        p.x = center.x + Math.cos(angle) * radius + (rng() - 0.5) * 0.12;
        p.z = center.z + Math.sin(angle) * radius * 0.92 + (rng() - 0.5) * 0.12;
        p.y = center.y + (rng() - 0.5) * 0.2;
        const lit = Math.cos(angle) > -0.1;
        if (ripple > 0.72) return new THREE.Color(pick(barkLine));
        return new THREE.Color(pick(lit ? whiteBark : barkShade));
      };

      const placeWhiteLimb = (voxel, p) => {
        const s = voxel.seed;
        const limb = limbs[Math.floor((s * 67.0 + Math.abs(voxel.base.z) * 0.13) % limbs.length)];
        const along = (s * 31.0 + Math.abs(voxel.base.y) * 0.041 + Math.abs(voxel.base.x) * 0.019) % 1;
        const branch = limbPoint(limb, along);
        const taper = 0.92 * (1 - along) + 0.2;
        const side = Math.sin(s * 91.0 + voxel.base.z) * taper;
        p.x = branch.x + Math.cos(limb.angle + Math.PI / 2) * side + (rng() - 0.5) * taper * 0.5;
        p.z = branch.z + Math.sin(limb.angle + Math.PI / 2) * side + (rng() - 0.5) * taper * 0.5;
        p.y = branch.y + Math.cos(s * 47.0 + voxel.base.x) * taper * 0.55 + (rng() - 0.5) * 0.14;
        return new THREE.Color(pick(along < 0.28 || Math.cos(limb.angle) > 0.15 ? whiteBark : barkShade));
      };

      const placeCurtainLeaf = (voxel, p) => {
        const s = voxel.seed;
        const limb = limbs[Math.floor((s * 97.0 + Math.abs(p.x) * 0.11 + p.z * 0.07) % limbs.length)];
        const along = 0.56 + ((s * 23.0 + Math.abs(p.z) * 0.035) % 0.4);
        const drop = (s * 43.0 + Math.abs(p.y) * 0.037 + Math.abs(p.x) * 0.021) % 1;
        const anchor = limbPoint(limb, along);
        const sideSeed = (s * 137.0 + p.z * 0.15 + p.x * 0.08) % 1;
        const strandSide = (sideSeed - 0.5) * (1.25 + along * 1.15);
        const sway = Math.sin(drop * Math.PI * 5 + s * 22.0) * 0.34;
        const dirX = Math.cos(limb.angle);
        const dirZ = Math.sin(limb.angle);
        const sideX = Math.cos(limb.angle + Math.PI / 2);
        const sideZ = Math.sin(limb.angle + Math.PI / 2);
        const outward = 0.72 + drop * 0.22;
        p.x = anchor.x + sideX * strandSide + dirX * (sway * 0.38 + outward) + (rng() - 0.5) * 0.13;
        p.z = anchor.z + sideZ * strandSide + dirZ * (sway * 0.38 + outward) + (rng() - 0.5) * 0.13;
        p.y = anchor.y - drop * limb.hang + Math.sin(drop * Math.PI) * 0.18 + (rng() - 0.5) * 0.1;
        if (drop > 0.82 && rng() < 0.32) return new THREE.Color(pick(leafYellow));
        if (sideSeed > 0.78 || drop < 0.18) return new THREE.Color(pick(leafLight));
        return new THREE.Color(pick(rng() < 0.6 ? leafMid : leafDeep));
      };

      return makeMap((voxel) => {
        const p = voxel.base.clone();
        let color = voxel.color.clone();
        if (voxel.role === "leaf") {
          if (voxel.seed < 0.42) {
            color = placeWhiteLimb(voxel, p);
          } else {
            color = placeCurtainLeaf(voxel, p);
          }
        } else if (voxel.role === "trunk") {
          color = placeWhiteTrunk(voxel, p);
        } else if (voxel.role === "flower" || voxel.role === "mushroom" || voxel.role === "grassTuft") {
          color = voxel.seed < 0.42 ? placeWhiteLimb(voxel, p) : placeCurtainLeaf(voxel, p);
        } else if (voxel.role === "grass") {
          p.x *= 1.18;
          p.z *= 1.18;
          p.y = Math.max(0, p.y) * 0.48;
          color = new THREE.Color(pick(rng() < 0.35 ? moss : grass));
        } else if (voxel.role === "underside") {
          p.x *= 1.03;
          p.z *= 1.03;
          p.y *= 0.64;
          color = new THREE.Color(pick(soil));
        } else if (voxel.role === "rock") {
          p.x *= 0.95;
          p.z *= 0.95;
          p.y = Math.min(p.y, 0.55);
          color = new THREE.Color(pick(rng() < 0.45 ? stone : soil)).multiplyScalar(0.9);
        }
        return [p, color];
      });
    }

    function makeRedwoodMap() {
      const needleDeep = ["#0e3a1e", "#123e22", "#0a3018", "#173a1e", "#103d20"];
      const needleMid = ["#1f5a2e", "#235e32", "#1a522a", "#286a36", "#2b6432"];
      const needleLight = ["#3a8244", "#458b4c", "#357a3e", "#4a9050", "#3f8c46"];
      const needleSun = ["#5fa45a", "#6dab62", "#73b56b", "#88c47a"];
      const cone = ["#5a3a20", "#704624", "#3e2914", "#6a4220"];
      const barkRed = ["#7a3920", "#8a4528", "#5e2e18", "#9a4f2e", "#6a341c", "#a85a34"];
      const barkDark = ["#3a1e10", "#42220f", "#2a1408", "#4a2814"];
      const barkLight = ["#b06440", "#bd724a", "#a05a38", "#c97a52"];
      const moss = ["#3a6e3a", "#4a7e44", "#2e5e2e", "#56875a"];
      const duff = ["#3a2814", "#46301a", "#2e1f0e", "#54391f", "#241a0e"];
      const fern = ["#2c6e36", "#387c3c", "#447e42", "#2a6230"];
      const sorrel = ["#7a3d20", "#8a4825", "#65331b"];

      const trunkBaseY = -0.4;
      const trunkTopY = 33.0;
      const trunkH = trunkTopY - trunkBaseY;
      const canopyBaseY = 13.0;
      const canopyTopY = 36.0;
      const canopyH = canopyTopY - canopyBaseY;
      const canopyMaxRadius = 5.0;

      const trunkRadius = (yt) => {
        const t = clamp((yt - trunkBaseY) / trunkH);
        return 0.5 + 1.55 * Math.pow(1 - t, 1.35);
      };

      const canopyRadius = (yt) => {
        const t = clamp((yt - canopyBaseY) / canopyH);
        return canopyMaxRadius * (1 - Math.pow(t, 1.15)) * (1 + Math.sin(t * Math.PI) * 0.06);
      };

      return makeMap((voxel) => {
        const p = voxel.base.clone();
        let color = voxel.color.clone();
        if (voxel.role === "leaf") {
          const s = voxel.seed;
          if (s < 0.22) {
            const t = (s * 17.0 + p.y * 0.029 + Math.abs(p.x) * 0.013) % 1;
            const yt = trunkBaseY + t * trunkH * 0.97;
            const angle = s * Math.PI * 31 + p.x * 0.17 + p.z * 0.11;
            const flute = Math.sin(angle * 6 + yt * 0.22) * 0.18;
            if (s < 0.05) {
              const r = canopyRadius(yt) * 0.3 + trunkRadius(yt) + 0.35;
              p.x = Math.cos(angle) * r + (rng() - 0.5) * 0.22;
              p.z = Math.sin(angle) * r + (rng() - 0.5) * 0.22;
              p.y = yt + (rng() - 0.5) * 0.35;
              color = new THREE.Color(pick(rng() < 0.4 ? cone : barkDark));
            } else {
              const r = trunkRadius(yt) + flute + (rng() - 0.5) * 0.18;
              p.x = Math.cos(angle) * r + (rng() - 0.5) * 0.14;
              p.z = Math.sin(angle) * r + (rng() - 0.5) * 0.14;
              p.y = yt + (rng() - 0.5) * 0.3;
              const lit = Math.cos(angle) > 0.1;
              let palette;
              if (flute < -0.08) palette = barkDark;
              else if (lit && rng() < 0.42) palette = barkLight;
              else palette = barkRed;
              color = new THREE.Color(pick(palette));
            }
          } else {
            const u = (s * 7.1 + Math.abs(p.y) * 0.013 + Math.abs(p.x) * 0.007) % 1;
            const yt = canopyBaseY + u * canopyH;
            const maxR = canopyRadius(yt);
            const angle = s * Math.PI * 27 + p.x * 0.31 + p.z * 0.17;
            const radialT = Math.sqrt((s * 41.3 + Math.abs(p.x) * 0.07 + Math.abs(p.z) * 0.05) % 1);
            const rad = maxR * (0.22 + radialT * 0.86);
            const drape = Math.sin(u * Math.PI * 9 + angle * 0.5) * 0.4;
            p.x = Math.cos(angle) * rad + (rng() - 0.5) * 0.4;
            p.z = Math.sin(angle) * rad + (rng() - 0.5) * 0.4;
            p.y = yt - rad * 0.18 + drape + (rng() - 0.5) * 0.42;
            const heightRatio = clamp((p.y - canopyBaseY) / canopyH);
            const outward = rad / Math.max(0.4, maxR);
            const lit = outward > 0.6;
            const r = rng();
            let palette;
            if (heightRatio > 0.8 && r < 0.55) palette = needleSun;
            else if (lit && heightRatio > 0.45) palette = needleLight;
            else if (heightRatio > 0.35) palette = r < 0.55 ? needleMid : needleDeep;
            else palette = r < 0.32 ? needleMid : needleDeep;
            color = new THREE.Color(pick(palette));
          }
        } else if (voxel.role === "trunk") {
          const t = clamp((p.y - 5) / 9);
          const yt = trunkBaseY + t * trunkH;
          const ring = Math.atan2(p.z, Math.abs(p.x) > 0.01 ? p.x : 0.01);
          const flute = Math.sin(ring * 6 + yt * 0.22) * 0.18;
          const radius = trunkRadius(yt) + flute;
          p.x = Math.cos(ring) * radius + (rng() - 0.5) * 0.16;
          p.z = Math.sin(ring) * radius + (rng() - 0.5) * 0.16;
          p.y = yt + (rng() - 0.5) * 0.26;
          const lit = Math.cos(ring) > 0.1;
          let palette;
          if (flute < -0.08) palette = barkDark;
          else if (lit && rng() < 0.4) palette = barkLight;
          else palette = barkRed;
          color = new THREE.Color(pick(palette));
        } else if (voxel.role === "grass" || voxel.role === "grassTuft") {
          p.x *= 1.12;
          p.z *= 1.12;
          p.y = Math.max(0, p.y) * 0.42;
          color = new THREE.Color(pick(rng() < 0.5 ? moss : fern));
        } else if (voxel.role === "underside") {
          p.x *= 1.05;
          p.z *= 1.05;
          p.y *= 0.6;
          color = new THREE.Color(pick(duff));
        } else if (voxel.role === "rock") {
          color = new THREE.Color(pick(rng() < 0.55 ? moss : duff)).multiplyScalar(0.88);
        } else if (voxel.role === "flower" || voxel.role === "mushroom") {
          color = new THREE.Color(pick(rng() < 0.5 ? sorrel : fern));
        }
        return [p, color];
      });
    }

    function makeRainbowEucalyptusMap() {
      const barkInner = ["#7fcf85", "#92dd92", "#6cb874", "#a8e8a4", "#5fa86b"];
      const barkGreen = ["#3f8c52", "#4a9c5e", "#356e44", "#56a86b", "#2e6238"];
      const barkBlue = ["#2c6a88", "#3a7e9c", "#1f567a", "#4c92b0", "#205678"];
      const barkPurple = ["#6b4a8e", "#7a5aa0", "#503570", "#56387a", "#3e2654"];
      const barkOrange = ["#d97a30", "#e89048", "#c46820", "#b85a18", "#a4480e"];
      const barkRed = ["#a4341c", "#b94028", "#902c14", "#82240e", "#6e1c08"];
      const barkMaroon = ["#5a2018", "#48160f", "#3a100a", "#2c0a06", "#52211a"];
      const barkPale = ["#dccab2", "#e2cdb2", "#c0a682", "#b59678"];

      const leafDeep = ["#39604a", "#406c52", "#2e533e", "#345a44"];
      const leafMid = ["#5e8a6c", "#6a9a78", "#557e62", "#73a682"];
      const leafSilver = ["#a8c2a0", "#b8d0b0", "#93ad8a", "#c0d2b6"];
      const gumNut = ["#7a5230", "#8a6238", "#5e3e22", "#a47242"];
      const grass = ["#3d7a34", "#4a8c3f", "#2d6b24", "#5a9e4a", "#356f2e"];
      const litter = ["#5e4530", "#6a4f35", "#75583c", "#48342a"];
      const soil = ["#3a2814", "#46301a", "#2e1f0e", "#241a0e"];
