      const trunkBaseY = -0.4;
      const trunkTopY = 24.0;
      const trunkH = trunkTopY - trunkBaseY;
      const canopyBaseY = 19.0;
      const canopyTopY = 27.0;
      const canopyH = canopyTopY - canopyBaseY;

      const trunkAxis = (t) => {
        const lean = Math.sin(t * Math.PI * 0.55) * 0.42;
        const sway = Math.sin(t * Math.PI * 1.6 + 0.5) * 0.22;
        return {
          x: lean + sway,
          z: Math.cos(t * Math.PI * 0.85 + 0.4) * 0.28 - 0.12
        };
      };

      const trunkRadius = (t) => 0.34 + 1.45 * Math.pow(1 - t, 1.22);

      const barkPalette = (yt, angle, seed) => {
        const stripe = Math.sin(angle * 1.7 + yt * 0.21 + seed * 6.3);
        const patch = Math.sin(angle * 3.0 - yt * 0.38 + seed * 9.0) * 0.7
          + Math.sin(yt * 0.46 + angle * 0.5 + seed * 3.1) * 0.6;
        const blend = stripe * 0.55 + patch * 0.45;
        if (blend > 0.78) return barkInner;
        if (blend > 0.4) return barkGreen;
        if (blend > 0.08) return barkBlue;
        if (blend > -0.2) return barkPurple;
        if (blend > -0.5) return barkOrange;
        if (blend > -0.8) return barkRed;
        return barkMaroon;
      };

      const placeTrunkVoxel = (voxel, p, offset = 0) => {
        const tRaw = (voxel.seed * 1.31 + Math.abs(voxel.base.y) * 0.043 + Math.abs(voxel.base.x) * 0.013 + offset * 0.11) % 1;
        const t = clamp((tRaw + 1) % 1);
        const yt = trunkBaseY + t * trunkH;
        const axis = trunkAxis(t);
        const ringSeed = voxel.seed * 11.0 + offset * 1.7;
        const baseAngle = Math.atan2(voxel.base.z, Math.abs(voxel.base.x) > 0.01 ? voxel.base.x : 0.01);
        const ring = baseAngle + ringSeed;
        const taper = trunkRadius(t);
        const flute = Math.sin(ring * 5.0 + yt * 0.31) * 0.06;
        const radius = taper + flute + (rng() - 0.5) * 0.07;
        p.x = axis.x + Math.cos(ring) * radius + (rng() - 0.5) * 0.07;
        p.z = axis.z + Math.sin(ring) * radius + (rng() - 0.5) * 0.07;
        p.y = yt + (rng() - 0.5) * 0.22;
        if (rng() < 0.035) return new THREE.Color(pick(barkPale));
        return new THREE.Color(pick(barkPalette(yt, ring, voxel.seed)));
      };

      const branches = [
        { y: 12.8, angle: 0.55, len: 9.6, baseR: 1.05, tipR: 0.42, tilt: 0.16, sweep: 0.7, twist: 1.8, clumpX: 2.9, clumpY: 1.25, clumpZ: 2.5 },
        { y: 15.4, angle: 2.9, len: 8.8, baseR: 0.95, tipR: 0.4, tilt: 0.22, sweep: -0.9, twist: 1.4, clumpX: 2.6, clumpY: 1.15, clumpZ: 2.3 },
        { y: 18.0, angle: 5.1, len: 8.0, baseR: 0.9, tipR: 0.38, tilt: 0.3, sweep: 0.55, twist: 2.2, clumpX: 2.3, clumpY: 1.05, clumpZ: 2.1 },
        { y: 20.4, angle: 1.7, len: 6.2, baseR: 0.75, tipR: 0.34, tilt: 0.42, sweep: -0.65, twist: 1.6, clumpX: 1.8, clumpY: 0.9, clumpZ: 1.7 },
        { y: 22.6, angle: 3.9, len: 4.6, baseR: 0.6, tipR: 0.3, tilt: 0.6, sweep: 0.8, twist: 1.2, clumpX: 1.35, clumpY: 0.8, clumpZ: 1.3 }
      ];

      const smoothstep = (u) => u * u * (3 - 2 * u);

      const branchPoint = (b, u) => {
        const axisT = clamp((b.y - trunkBaseY) / trunkH);
        const axis = trunkAxis(axisT);
        const bend = smoothstep(u);
        const ang = b.angle + b.sweep * bend;
        const horiz = u * b.len * Math.cos(b.tilt);
        const rise = u * b.len * Math.sin(b.tilt);
        const droop = Math.pow(u, 2.2) * 0.7;
        const wobble = Math.sin(u * Math.PI * b.twist + b.angle * 1.7) * 0.55 * u;
        const liftWobble = Math.sin(u * Math.PI * b.twist * 1.4 + 1.1) * 0.18 * u;
        return {
          x: axis.x + Math.cos(ang) * horiz + Math.cos(ang + Math.PI / 2) * wobble,
          y: b.y + rise - droop + liftWobble,
          z: axis.z + Math.sin(ang) * horiz + Math.sin(ang + Math.PI / 2) * wobble
        };
      };

      const branchTangent = (b, u) => {
        const a = branchPoint(b, Math.max(0, u - 0.05));
        const c = branchPoint(b, Math.min(1, u + 0.05));
        return { x: c.x - a.x, y: c.y - a.y, z: c.z - a.z };
      };

      const branchIndex = (voxel, offset = 0) => {
        const f = ((voxel.seed * 71.0 + offset * 3.7) % 1 + 1) % 1;
        return Math.floor(f * branches.length) % branches.length;
      };

      const placeBranchArm = (voxel, p, offset = 0) => {
        const b = branches[branchIndex(voxel, offset + 1.1)];
        const u = ((voxel.seed * 43.0 + offset * 0.19) % 1 + 1) % 1;
        const c = branchPoint(b, u);
        const radius = b.tipR + (b.baseR - b.tipR) * Math.pow(1 - u, 1.25);
        const tan = branchTangent(b, u);
        const tanLen = Math.hypot(tan.x, tan.y, tan.z) || 1;
        const nx = -tan.z / tanLen;
        const nz = tan.x / tanLen;
        const ring = (voxel.seed * 19.0 + u * 4.7) * Math.PI * 2;
        const rA = Math.cos(ring) * radius;
        const rB = Math.sin(ring) * radius * 0.65;
        p.x = c.x + nx * rA + (rng() - 0.5) * 0.16;
        p.z = c.z + nz * rA + (rng() - 0.5) * 0.16;
        p.y = c.y + rB + (rng() - 0.5) * 0.16;
        const along = b.y + u * b.len;
        const ringAngle = b.angle + b.sweep * smoothstep(u) + voxel.seed * 0.6;
        if (rng() < 0.04) return new THREE.Color(pick(barkPale));
        return new THREE.Color(pick(barkPalette(along, ringAngle, voxel.seed + 0.7)));
      };

      const placeLeafClump = (voxel, p, offset = 0) => {
        const b = branches[branchIndex(voxel, offset)];
        const tip = branchPoint(b, 1.0);
        const tan = branchTangent(b, 1.0);
        const overshoot = ((voxel.seed * 13.0 + offset * 0.13) % 1 + 1) % 1;
        const reach = 0.2 + overshoot * 0.9;
        const cx = tip.x + tan.x * reach;
        const cz = tip.z + tan.z * reach;
        const cy = tip.y + tan.y * reach;
        const polar = voxel.seed * Math.PI * 17 + offset * 2.3;
        const radial = Math.sqrt(((voxel.seed * 29.0 + offset * 0.41) % 1 + 1) % 1);
        const droopT = ((voxel.seed * 11.7 + offset * 0.19) % 1 + 1) % 1;
        const droop = Math.pow(droopT, 1.5) * (b.clumpY + 0.6);
        p.x = cx + Math.cos(polar) * radial * b.clumpX + (rng() - 0.5) * 0.22;
        p.z = cz + Math.sin(polar) * radial * b.clumpZ + (rng() - 0.5) * 0.22;
        p.y = cy - droop + (rng() - 0.5) * b.clumpY;
        const rn = rng();
        if (rn < 0.04) return new THREE.Color(pick(gumNut));
        if (rn < 0.22) return new THREE.Color(pick(leafSilver));
        if (rn < 0.62) return new THREE.Color(pick(leafMid));
        return new THREE.Color(pick(leafDeep));
      };

      const placeCanopyLeaf = (voxel, p, offset = 0) => {
        const r = ((voxel.seed * 17.3 + offset * 0.29) % 1 + 1) % 1;
        if (r < 0.34) return placeBranchArm(voxel, p, offset);
        return placeLeafClump(voxel, p, offset);
      };

      return makeMap((voxel) => {
        const p = voxel.base.clone();
        let color = voxel.color.clone();
        if (voxel.role === "trunk") {
          color = placeTrunkVoxel(voxel, p);
        } else if (voxel.role === "leaf") {
          if (voxel.seed < 0.42) {
            color = placeTrunkVoxel(voxel, p, 1.3);
          } else {
            color = placeCanopyLeaf(voxel, p);
          }
        } else if (voxel.role === "grass") {
          p.x *= 1.15;
          p.z *= 1.15;
          p.y = Math.max(0, p.y) * 0.4;
          color = new THREE.Color(pick(rng() < 0.55 ? grass : litter));
        } else if (voxel.role === "grassTuft") {
          p.x *= 1.18;
          p.z *= 1.18;
          p.y = 0.2 + Math.max(0, p.y) * 0.3;
          color = new THREE.Color(pick(rng() < 0.55 ? grass : leafSilver));
        } else if (voxel.role === "underside") {
          p.x *= 0.96;
          p.z *= 0.96;
          p.y = -0.4 + p.y * 0.36;
          color = new THREE.Color(pick(soil));
        } else if (voxel.role === "rock") {
          p.x *= 1.05;
          p.z *= 1.05;
          p.y = Math.min(p.y, 0.42);
          color = new THREE.Color(pick(rng() < 0.55 ? stone : litter));
        } else if (voxel.role === "flower" || voxel.role === "mushroom") {
          p.x *= 1.1;
          p.z *= 1.1;
          p.y = 0.15 + Math.max(0, p.y) * 0.18;
          const r = rng();
          if (r < 0.45) color = new THREE.Color(pick(barkOrange));
          else if (r < 0.74) color = new THREE.Color(pick(barkGreen));
          else if (r < 0.92) color = new THREE.Color(pick(barkPurple));
          else color = new THREE.Color(pick(barkRed));
        }
        return [p, color];
      });
    }

    function makeMonkeyPuzzleMap() {
      const barkDark = ["#241608", "#2e1c0c", "#1a0f06", "#372310", "#1e1206"];
      const barkMid = ["#3e2814", "#4a3220", "#322010", "#54382a", "#28190a"];
      const barkRing = ["#5a4226", "#684a2a", "#42301c", "#735234"];

      const leafDeep = ["#0e3a1c", "#123e22", "#0a3018", "#103d20", "#143d22", "#0c3418"];
      const leafMid = ["#1d5a30", "#235e32", "#1a522a", "#286a36", "#216034"];
      const leafLight = ["#3a8244", "#458b4c", "#357a3e", "#4a9050"];
      const leafTip = ["#5fa45a", "#6dab62", "#73b56b", "#88c47a"];
      const cone = ["#5a3a20", "#704624", "#3e2914", "#6a4220"];

      const grass = ["#3d6a2a", "#4a7c32", "#2d5a20", "#386528"];
      const litter = ["#3a2814", "#46301a", "#241a0e", "#54391f"];
      const soil = ["#2a1d0e", "#1e1408", "#341f10", "#221708"];
      const stone = ["#7a7264", "#65604f", "#8a8276"];
      const moss = ["#3a5e2a", "#4a7032", "#2e4e22", "#56875a"];

      const trunkBaseY = -0.4;
      const trunkTopY = 27.0;
      const trunkH = trunkTopY - trunkBaseY;

      const trunkRadius = (t) => 0.36 + 1.05 * Math.pow(1 - t, 1.45);

      const BRANCH_COUNT = 12;
      const branches = [];
      for (let i = 0; i < BRANCH_COUNT; i++) {
        const t = i / (BRANCH_COUNT - 1);
        const y = 8.5 + t * 15.5;
        const angle = i * 2.39996 + 0.4;
        const heightT = t;
        const tilt = -0.18 + heightT * 0.62;
        branches.push({
          y,
          angle,
          len: 22.0 - heightT * 8.0,
          baseR: 0.12 - heightT * 0.04,
          tipR: 0.05 - heightT * 0.015,
          tilt,
          twist: 3.2 + (i % 4) * 0.55,
          sweep: 0.0,
          rise: 0.5 + heightT * 0.9,
          wave: 0.85 + ((i * 7) % 5) * 0.12
        });
      }

      const smoothstep = (u) => u * u * (3 - 2 * u);

      const branchPoint = (b, u) => {
        const horiz = u * b.len * Math.cos(b.tilt);
        const baseRise = u * b.len * Math.sin(b.tilt);
        const curl = Math.pow(u, 2.1) * b.rise;
        const ang = b.angle + b.sweep * smoothstep(u);
        const twistPhase = u * Math.PI * b.twist + b.angle * 1.3;
        const wobble = Math.sin(twistPhase) * b.wave * 2.0 * u;
        const liftWobble = Math.sin(twistPhase * 1.3 + 0.7) * b.wave * u;
        return {
          x: Math.cos(ang) * horiz + Math.cos(ang + Math.PI / 2) * wobble,
          y: b.y + baseRise + curl + liftWobble * 0.4,
          z: Math.sin(ang) * horiz + Math.sin(ang + Math.PI / 2) * wobble
        };
      };

      const branchTangent = (b, u) => {
        const a = branchPoint(b, Math.max(0, u - 0.05));
        const c = branchPoint(b, Math.min(1, u + 0.05));
        return { x: c.x - a.x, y: c.y - a.y, z: c.z - a.z };
      };

      const placeTrunkVoxel = (voxel, p, offset = 0) => {
        const tRaw = (voxel.seed * 1.29 + Math.abs(voxel.base.y) * 0.041 + Math.abs(voxel.base.x) * 0.011 + offset * 0.11) % 1;
        const t = clamp((tRaw + 1) % 1);
        const yt = trunkBaseY + t * trunkH;
        const ringSeed = voxel.seed * 11.0 + offset * 1.7;
        const baseAngle = Math.atan2(voxel.base.z, Math.abs(voxel.base.x) > 0.01 ? voxel.base.x : 0.01);
        const ring = baseAngle + ringSeed;
        const taper = trunkRadius(t);
        const wrinkle = Math.sin(yt * 1.35 + ring * 2.1) * 0.07;
        const radius = taper + wrinkle + (rng() - 0.5) * 0.06;
        p.x = Math.cos(ring) * radius + (rng() - 0.5) * 0.06;
        p.z = Math.sin(ring) * radius + (rng() - 0.5) * 0.06;
        p.y = yt + (rng() - 0.5) * 0.2;
        const banded = Math.sin(yt * 1.05) > 0.55;
        if (banded && rng() < 0.35) return new THREE.Color(pick(barkRing));
        if (rng() < 0.32) return new THREE.Color(pick(barkMid));
        return new THREE.Color(pick(barkDark));
      };

      const branchIndex = (voxel, offset = 0) => {
        const f = ((voxel.seed * 71.0 + offset * 3.7) % 1 + 1) % 1;
        return Math.floor(f * branches.length) % branches.length;
      };

      const placeBranchCore = (voxel, p, offset = 0) => {
        const b = branches[branchIndex(voxel, offset + 1.1)];
        const u = ((voxel.seed * 43.0 + offset * 0.23) % 1 + 1) % 1;
        const c = branchPoint(b, u);
        const radius = b.tipR + (b.baseR - b.tipR) * Math.pow(1 - u, 1.25);
        const ringAngle = (voxel.seed * 19.0 + u * 4.7 + offset * 1.3) * Math.PI * 2;
        p.x = c.x + Math.cos(ringAngle) * radius * 0.6 + (rng() - 0.5) * 0.1;
        p.z = c.z + Math.sin(ringAngle) * radius * 0.6 + (rng() - 0.5) * 0.1;
        p.y = c.y + (rng() - 0.5) * 0.1;
        if (rng() < 0.35) return new THREE.Color(pick(barkMid));
        return new THREE.Color(pick(leafDeep));
      };

      const placeLeafySpike = (voxel, p, offset = 0) => {
        const b = branches[branchIndex(voxel, offset)];
        const u = ((voxel.seed * 43.0 + offset * 0.19) % 1 + 1) % 1;
        const c = branchPoint(b, u);
        const tan = branchTangent(b, u);
        const tanLen = Math.hypot(tan.x, tan.y, tan.z) || 1;
        const tx = tan.x / tanLen, ty = tan.y / tanLen, tz = tan.z / tanLen;
        let ux = 0, uy = 1, uz = 0;
        if (Math.abs(ty) > 0.92) { ux = 1; uy = 0; uz = 0; }
        let nx = uy * tz - uz * ty;
        let ny = uz * tx - ux * tz;
        let nz = ux * ty - uy * tx;
        const nlen = Math.hypot(nx, ny, nz) || 1;
        nx /= nlen; ny /= nlen; nz /= nlen;
        const bx = ty * nz - tz * ny;
        const by = tz * nx - tx * nz;
        const bz = tx * ny - ty * nx;

        const branchR = b.tipR + (b.baseR - b.tipR) * Math.pow(1 - u, 1.2);
        const spikeOut = branchR + 0.14 + Math.pow(rng(), 0.65) * 0.6;
        const spiralAngle = (voxel.seed * 91.0 + u * 18.4 + offset * 4.3) * Math.PI * 2;
        const cosA = Math.cos(spiralAngle);
        const sinA = Math.sin(spiralAngle);

        p.x = c.x + (nx * cosA + bx * sinA) * spikeOut + (rng() - 0.5) * 0.08;
        p.y = c.y + (ny * cosA + by * sinA) * spikeOut + (rng() - 0.5) * 0.08;
        p.z = c.z + (nz * cosA + bz * sinA) * spikeOut + (rng() - 0.5) * 0.08;

        const tipness = clamp((spikeOut - branchR) / 0.74);
        const r = rng();
        if (u > 0.84 && r < 0.05) return new THREE.Color(pick(cone));
        if (tipness > 0.78 && r < 0.34) return new THREE.Color(pick(leafTip));
        if (tipness > 0.5 && r < 0.32) return new THREE.Color(pick(leafLight));
        if (r < 0.52) return new THREE.Color(pick(leafMid));
        return new THREE.Color(pick(leafDeep));
      };

      return makeMap((voxel) => {
        const p = voxel.base.clone();
        let color = voxel.color.clone();
        if (voxel.role === "trunk") {
          color = placeTrunkVoxel(voxel, p);
        } else if (voxel.role === "leaf") {
          if (voxel.seed < 0.07) {
            color = placeTrunkVoxel(voxel, p, 1.3);
          } else if (voxel.seed < 0.15) {
            color = placeBranchCore(voxel, p);
          } else {
            color = placeLeafySpike(voxel, p);
          }
        } else if (voxel.role === "grass") {
          p.x *= 1.15;
          p.z *= 1.15;
          p.y = Math.max(0, p.y) * 0.4;
          color = new THREE.Color(pick(rng() < 0.55 ? grass : litter));
        } else if (voxel.role === "grassTuft") {
          p.x *= 1.18;
          p.z *= 1.18;
          p.y = 0.2 + Math.max(0, p.y) * 0.3;
          color = new THREE.Color(pick(rng() < 0.5 ? grass : moss));
        } else if (voxel.role === "underside") {
          p.x *= 0.96;
          p.z *= 0.96;
          p.y = -0.4 + p.y * 0.36;
          color = new THREE.Color(pick(soil));
        } else if (voxel.role === "rock") {
          p.x *= 1.05;
          p.z *= 1.05;
          p.y = Math.min(p.y, 0.42);
          color = new THREE.Color(pick(rng() < 0.55 ? stone : moss));
        } else if (voxel.role === "flower" || voxel.role === "mushroom") {
          p.x *= 1.1;
          p.z *= 1.1;
          p.y = 0.15 + Math.max(0, p.y) * 0.18;
          color = new THREE.Color(pick(rng() < 0.5 ? cone : leafMid));
        }
        return [p, color];
      });
    }

    function makeGiantWaterLilyMap() {

        const angleFromNotch = Math.atan2(Math.sin(angle - pad.notch), Math.cos(angle - pad.notch));
        const notchCut = Math.abs(angleFromNotch) < 0.32 ? 0.6 : 1.0;

        const rim = radialT > 0.9;

        const upward = rim ? 0.5 : 0.06 + dimple;
        p.x = pad.x + Math.cos(angle) * r + (rng() - 0.5) * 0.14;
        p.z = pad.z + Math.sin(angle) * r + (rng() - 0.5) * 0.14;
        p.y = waterY + upward + (rng() - 0.5) * 0.05;

      const placeFlower = (voxel, p, offset = 0) => {

        const pad = flowerPads[i];

        const angle = ((voxel.seed * 41.0 + voxel.base.x * 0.17 + voxel.base.z * 0.11 + offset * 1.7) % 1 + 1) % 1 * Math.PI * 2;

        const petalLen = f.kind === "bud" ? 0.55 : 0.95 + layer * 0.32;
        const flat = openness * petalLen;
        const up = (1 - openness) * petalLen + (f.kind === "bud" ? 0.6 : 0.1);

        const hCenter = waterY + f.height;
        p.x = pad.x + Math.cos(angle) * r + (rng() - 0.5) * 0.1;
        p.z = pad.z + Math.sin(angle) * r + (rng() - 0.5) * 0.1;

        }

        if (radialT > 0.52 && rng() < 0.5) return new THREE.Color(pick(petalPink));

      const placeStem = (voxel, p, offset = 0) => {

        }
        const i = flowerPadIndex(voxel.seed, offset + 0.7);
        const pad = flowerPads[i];
        const t = ((voxel.seed * 17.0 + Math.abs(voxel.base.y) * 0.013 + offset * 0.11) % 1 + 1) % 1;
        const sway = Math.sin(t * Math.PI * 2 + voxel.seed * 11.0) * 0.08;
        p.x = pad.x + sway + (rng() - 0.5) * 0.16;
        p.z = pad.z + sway * 0.6 + (rng() - 0.5) * 0.16;
        p.y = waterY - 0.15 + t * (pad.flower.height + 0.25) + (rng() - 0.5) * 0.05;
        return new THREE.Color(pick(stemGreen));
      };

      const placeWater = (voxel, p, offset = 0) => {
        const x = voxel.base.x * 1.34 + (rng() - 0.5) * 1.3;
        const z = voxel.base.z * 1.5 + (rng() - 0.5) * 1.3;
        p.x = Math.max(-12.6, Math.min(12.6, x));
        p.z = Math.max(-9.2, Math.min(9.2, z));
        const ripples = Math.sin(p.x * 0.7 + p.z * 0.6 + offset) * 0.05 + Math.cos(p.x * 0.4 - p.z * 0.5) * 0.03;
        p.y = waterY - 0.22 + ripples + (rng() - 0.5) * 0.04;
        if (rng() < 0.08) return new THREE.Color(pick(ripple));
        if (rng() < 0.5) return new THREE.Color(pick(waterShallow));
        return new THREE.Color(pick(waterMid));
      };

      const placeDeepWater = (voxel, p) => {
        p.x *= 1.55;
        p.z *= 1.55;
        p.y = Math.min(p.y * 0.52, waterY - 0.5);
        return new THREE.Color(pick(rng() < 0.7 ? waterDeep : waterMid));
      };

      return makeMap((voxel) => {
        const p = voxel.base.clone();
        let color = voxel.color.clone();
        if (voxel.role === "leaf") {
          if (voxel.seed < 0.7) {
            color = placePad(voxel, p);
          } else if (voxel.seed < 0.93) {
            color = placeFlower(voxel, p);
          } else {
            color = placeStem(voxel, p);
          }
        } else if (voxel.role === "trunk") {
          color = voxel.seed < 0.55 ? placeStem(voxel, p, 1.7) : placePad(voxel, p, 2.3);

        } else if (voxel.role === "underside") {
          color = placeDeepWater(voxel, p);
        } else if (voxel.role === "rock") {
          p.x *= 1.18;
          p.z *= 1.18;
          p.y = Math.min(p.y * 0.42, waterY - 0.08);
          color = new THREE.Color(pick(rng() < 0.5 ? stone : mud)).multiplyScalar(0.85);
        }
        return [p, color];
      });
    }

    function makeDragonBloodMap() {

      for (let i = 0; i < BRANCH_COUNT; i++) {

        branches.push({
          angle,
          forkY: trunkForkY - 0.5 + ((i * 0.53) % 1) * 0.8,

            baseR: 0.16,
            tipR: 0.06,
            arcHeight: 0.18 + (((i + k) * 0.41) % 1) * 0.12
          });

      }

      const branchPoint = (b, u) => {
        const ang = b.angle;
        const cosA = Math.cos(ang);
        const sinA = Math.sin(ang);
        const iu = 1 - u;
        const outR = iu * iu * b.forkR + 2 * iu * u * b.midOut + u * u * b.tipOut;
        const upY = iu * iu * 0 + 2 * iu * u * b.midUp + u * u * b.tipUp;
        const twistPhase = u * Math.PI * b.twist + b.angle * 1.3;
        const wobble = Math.sin(twistPhase) * 0.22 * u * (1 - u);
        return {
          x: cosA * outR + Math.cos(ang + Math.PI / 2) * wobble,
          y: b.forkY + upY,

        };

      const subBranchPoint = (s, u) => {
        const parent = branches[s.parentIdx];

        const tipX = start.x + Math.cos(ang2) * s.extraOut;
        const tipZ = start.z + Math.sin(ang2) * s.extraOut;
        const tipY = start.y + s.extraUp;
        const arc = Math.sin(u * Math.PI) * s.arcHeight;
        return {
          x: start.x + (tipX - start.x) * u,
          y: start.y + (tipY - start.y) * u + arc,

          p.z = c.z + Math.sin(ringAngle) * radius + (rng() - 0.5) * 0.08;
          p.y = c.y + (rng() - 0.5) * 0.08;

          const b = branches[branchIndex(voxel, offset + 1.1)];

          const radius = b.tipR + (b.baseR - b.tipR) * Math.pow(1 - u, 1.2);
          const ringAngle = (voxel.seed * 19.0 + u * 4.7 + offset * 1.3) * Math.PI * 2;

      return makeMap((voxel) => {

    function makeVenusFlytrapMap() {
      const trapInner = ["#a82038", "#c43048", "#7e1828", "#d6446a", "#921a30", "#bc2850", "#9a1c34"];
      const trapRim = ["#3e0a14", "#5a1020", "#28080e", "#48101c", "#641826"];

      const flowerPink = ["#ffb0c8", "#ffc0d4", "#ff90b0", "#ffd0e0"];

      const smoothstep = (u) => u * u * (3 - 2 * u);
      const makeTrap = (angle, reach, rise, size, baseOffset, lean = 0, upTilt = 0, weight = 1) => ({

        startX: Math.cos(angle) * baseOffset,
        startZ: Math.sin(angle) * baseOffset,
        tipX: Math.cos(angle) * reach,
        tipZ: Math.sin(angle) * reach,
        tipY: rise,
        lobeLength: size * 2.58,
        lobeWidth: size * 2.05,
        lobeDepth: size * 0.45,
        openness: size * 0.58,

        weight,

        radialZ: Math.sin(angle),

      const weightedTrapIndex = (f) => {

        for (let i = 0; i < traps.length; i++) {

        t = clamp(t);

        const z = trap.startZ + (trap.tipZ - trap.startZ) * ease;
        const baseY = 0.25;

        const stemR = 0.46 * (1 - t * 0.48);

        const pitch = smoothstep(u);
        const spineFront = u * trap.lobeLength * (0.82 - trap.upTilt * 0.035);
        const lift = trap.lean * u + trap.upTilt * pitch + Math.max(0, spineFront) * trap.upTilt * 0.12 + Math.sin(u * Math.PI) * 0.28;
        p.x = trap.tipX + trap.radialX * spineFront + trap.hingeX * wobble;
        p.z = trap.tipZ + trap.radialZ * spineFront + trap.hingeZ * wobble;
        p.y = trap.tipY + lift + (rng() - 0.5) * 0.08;
        return new THREE.Color(pick(u > 0.8 ? stemPale : stemGreen));
      };

      const placeLobe = (voxel, p, side) => {
        const idx = trapIndexFromSeed(voxel);
        const trap = traps[idx];

        const uSeed = ((voxel.seed * 47.1 + side * 0.13) % 1 + 1) % 1;
        const widthSeed = ((voxel.seed * 113.3 + side * 0.19) % 1 + 1) % 1;
        const shellSeed = ((voxel.seed * 173.7 + side * 0.07) % 1 + 1) % 1;
        const u = Math.pow(uSeed, 0.68);
        const widthNorm = (widthSeed * 2 - 1) * (1.04 - Math.abs(shellSeed - 0.5) * 0.14);
        const edgeFalloff = Math.pow(Math.sin(Math.PI * clamp(u * 0.96 + 0.02)), 0.42);
        const frontNotch = 1 - smoothstep(clamp((u - 0.84) / 0.16)) * 0.1;
        const lobeWidth = trap.lobeWidth * edgeFalloff * frontNotch;
        let localHinge = widthNorm * lobeWidth;
        if (side > 0) localHinge *= 0.92;
        const localFront = u * trap.lobeLength - 0.28;
        const pitch = smoothstep(u);
        const pitchedFront = localFront * (1 - trap.upTilt * 0.045);
        const pitchLift = Math.max(0, localFront) * trap.upTilt * 0.13;
        const cup = Math.sin(u * Math.PI) * trap.lobeDepth * (1 - Math.abs(widthNorm) * 0.42);
        const jawGap = 0.12 + smoothstep(u) * trap.openness;
        const lipCurl = smoothstep(clamp((u - 0.6) / 0.4)) * trap.lobeDepth * 0.34;
        const widthCurl = smoothstep(clamp((Math.abs(widthNorm) - 0.72) / 0.28)) * trap.lobeDepth * 0.38;
        const lowerJawDrop = side < 0
          ? trap.lobeDepth * (0.42 + smoothstep(u) * 0.58) + smoothstep(clamp((u - 0.55) / 0.45)) * trap.openness * 0.18
          : 0;
        const upperJawInset = side > 0
          ? smoothstep(clamp((u - 0.28) / 0.72)) * trap.lobeDepth * 0.64
          : 0;

        let worldX = trap.tipX + trap.hingeX * localHinge + trap.radialX * (pitchedFront - upperJawInset);
        let worldZ = trap.tipZ + trap.hingeZ * localHinge + trap.radialZ * (pitchedFront - upperJawInset);
        let worldY = trap.tipY + trap.lean * u + trap.upTilt * pitch + pitchLift + side * (jawGap + cup + lipCurl + widthCurl) - lowerJawDrop;

        const sideEdge = Math.abs(widthNorm) > 0.82 && u > 0.16;
        const frontEdge = u > 0.8;
        const r = rng();
        const isTooth = (frontEdge && r < 0.86) || (sideEdge && r < 0.62);

        if (isTooth) {
          const toothLength = 0.46 + shellSeed * 0.58;
          const sideDir = Math.sign(widthNorm || 1);
          const frontToothReach = frontEdge ? (side > 0 ? 0.58 : 1) : 0.25;
          const sideToothReach = sideEdge ? (side > 0 ? 0.68 : 0.9) : 0.22;
          worldX += trap.radialX * toothLength * frontToothReach + trap.hingeX * sideDir * toothLength * sideToothReach;
          worldZ += trap.radialZ * toothLength * frontToothReach + trap.hingeZ * sideDir * toothLength * sideToothReach;
          worldY += trap.upTilt * 0.1 - side * toothLength * 0.08;
          if (side < 0) worldY -= toothLength * 0.36;
        }

        p.x = worldX + (rng() - 0.5) * 0.1;
        p.y = worldY + (rng() - 0.5) * 0.1;
        p.z = worldZ + (rng() - 0.5) * 0.1;

        if (isTooth) return new THREE.Color(pick(trapTeeth));
        if (frontEdge || sideEdge || u < 0.08) {
          if (r < 0.64) return new THREE.Color(pick(trapTeeth));
          if (r < 0.82) return new THREE.Color(pick(trapRim));
          return new THREE.Color(pick(trapBack));
        }
        const innerSurface = side > 0 || (u > 0.18 && Math.abs(widthNorm) < 0.72 && shellSeed < 0.7);
        if (innerSurface) {
          if (r < 0.14) return new THREE.Color(pick(trapTeeth));
          if (r < 0.86) return new THREE.Color(pick(trapInner));
          return new THREE.Color(pick(trapRim));
        }
        if (r < 0.78) return new THREE.Color(pick(trapBack));
        if (r < 0.91) return new THREE.Color(pick(stemGreen));
        if (r < 0.97) return new THREE.Color(pick(trapRim));
        return new THREE.Color(pick(trapTeeth));
      };

      return makeMap((voxel) => {
        const p = voxel.base.clone();
        let color = voxel.color.clone();
        if (voxel.role === "trunk") {
          color = placeStem(voxel, p, trapIndexFromSeed(voxel));
        } else if (voxel.role === "leaf") {
          const route = ((voxel.seed * 211.7) % 1 + 1) % 1;
          if (route < 0.05) {
            color = placeStem(voxel, p, trapIndexFromAngle(voxel));
          } else if (route < 0.13) {
            color = placeTrapSpine(voxel, p);
          } else if (route < 0.565) {
            color = placeLobe(voxel, p, +1);
          } else {
            color = placeLobe(voxel, p, -1);
          }
        } else if (voxel.role === "grass") {
          p.x *= 1.12;
          p.z *= 1.12;
          p.y = Math.max(0, p.y) * 0.4;
          const r = rng();
          color = new THREE.Color(pick(r < 0.55 ? moss : r < 0.82 ? mossBright : peat));
        } else if (voxel.role === "grassTuft") {
          p.x *= 1.18;
          p.z *= 1.18;
          p.y = 0.42 + Math.max(0, p.y) * 0.22;
          color = new THREE.Color(pick(rng() < 0.55 ? mossBright : moss));
        } else if (voxel.role === "underside") {
          p.x *= 0.96;
          p.z *= 0.96;
          p.y = -0.4 + p.y * 0.36;
          color = new THREE.Color(pick(peat));
        } else if (voxel.role === "rock") {
          p.x *= 1.06;
          p.z *= 1.06;
          p.y = Math.min(p.y, 0.5);
          color = new THREE.Color(pick(rng() < 0.5 ? bogStone : peat));
        } else if (voxel.role === "flower" || voxel.role === "mushroom") {
          p.x *= 1.1;
          p.z *= 1.1;
          p.y = 0.28 + Math.max(0, p.y) * 0.2;
          const r = rng();
          if (r < 0.35) color = new THREE.Color(pick(flowerPink));
          else if (r < 0.72) color = new THREE.Color(pick(mossBright));
          else color = new THREE.Color(pick(trapTeeth));
        }
        return [p, color];
      });
    }

    function makeMap(transform) {
      const positions = new Array(voxels.length);
      const colors = new Array(voxels.length);
      for (let i = 0; i < voxels.length; i++) {
        const [position, color] = transform(voxels[i], i);
        positions[i] = position;
        colors[i] = color;
      }
      return { positions, colors };
    }

    function getVariationDefinition(index) {
      return TREE_VARIATIONS[index] || TREE_VARIATIONS[0];
    }

    function resolveVariationIndex(value) {
      if (typeof value === "string") {
        const index = TREE_VARIATIONS.findIndex((variation) => variation.id === value);
        return index === -1 ? activeVariation : index;
      }
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) return activeVariation;
      const index = Math.trunc(numeric) % TREE_VARIATIONS.length;
      return index < 0 ? index + TREE_VARIATIONS.length : index;
    }

    function nextVariationIndex(index) {
      const current = CYCLE_VARIATION_INDICES.indexOf(index);
      return CYCLE_VARIATION_INDICES[(Math.max(0, current) + 1) % CYCLE_VARIATION_INDICES.length];
    }

    function variationDebugSummary(variation) {
      return {
        id: variation.id,
        label: variation.label,
        cycleOrder: variation.cycleOrder,
        particlePalette: [...variation.particlePalette],
        camera: { ...variation.camera, distance: cameraFrameDistance(variation.camera) },
        uiAccent: { ...variation.uiAccent },
        fog: { ...variation.scene.fog },
        lighting: {
          hemisphere: { ...variation.scene.lighting.hemisphere },
          ambient: { ...variation.scene.lighting.ambient },
          key: { ...variation.scene.lighting.key },
          fill: { ...variation.scene.lighting.fill },
          rim: { ...variation.scene.lighting.rim },
          accent: { ...variation.scene.lighting.accent }
        },
        background: variation.scene.background
      };
    }

    function applyVariationStyle(index, immediateFrame = false) {
      const variation = getVariationDefinition(index);
      const currentLighting = cloneLightingStyle(activeSceneStyle.lighting);
      activeSceneStyle = { ...variation.scene, lighting: currentLighting };

      applyCssVariables(variation.uiAccent, variation.scene);
      renderer.setClearColor(variation.scene.clear, 1);
      scene.fog.color.set(variation.scene.fog.color);
      scene.fog.density = variation.scene.fog.density;
      setCameraFrameTarget(variation.camera, immediateFrame);
      setLightingStyleTarget(variation.scene.lighting, immediateFrame);
    }

    function applyCssVariables(uiAccent, sceneStyle) {
      const style = document.documentElement.style;
      style.setProperty("--body-background", sceneStyle.clear);
      style.setProperty("--stage-background", sceneStyle.background);
      style.setProperty("--stage-overlay", sceneStyle.overlay);
      style.setProperty("--grain-opacity", String(sceneStyle.grainOpacity));
      style.setProperty("--ui-panel-bg", uiAccent.panel);
      style.setProperty("--ui-hover-bg", uiAccent.hover);
      style.setProperty("--ui-button-bg", uiAccent.button);
      style.setProperty("--ui-border", uiAccent.border);
      style.setProperty("--ui-button-border", uiAccent.buttonBorder);
      style.setProperty("--ui-border-active", uiAccent.borderActive);
      style.setProperty("--ui-text", uiAccent.text);
      style.setProperty("--ui-muted", uiAccent.muted);
      style.setProperty("--ui-accent", uiAccent.accent);
      style.setProperty("--ui-accent-strong", uiAccent.strong);
      style.setProperty("--ui-accent-dark", uiAccent.dark);
      style.setProperty("--ui-glow", uiAccent.glow);
    }

    function setCameraFrameTarget(frame, immediate = false) {
      if (immediate) {
        cameraFrameTransition = null;
        applyCameraFrame(frame, true);
        return;
      }

      const currentFrame = readCameraFrame();
      cameraFrameTransition = {
        from: currentFrame,
        to: cloneCameraFrame(frame),
        started: performance.now(),
        duration: Math.max(settings.morphMs, 900)
      };
    }

    function readCameraFrame() {
      return {
        fov: camera.fov,
        near: camera.near,
        far: camera.far,
        distance: camera.position.distanceTo(controls.target),
        target: controls.target.toArray(),
        minDistance: controls.minDistance,
        maxDistance: controls.maxDistance,
        rootPosition: currentRootBasePosition.toArray(),
        rootRotationY: root.rotation.y,
        rootScale: root.scale.x,
        floatAmplitude: currentFloatAmplitude
      };
    }

    function cloneCameraFrame(frame) {
      return {
        ...frame,
        distance: cameraFrameDistance(frame),
        position: [...frame.position],
        target: [...frame.target],
        rootPosition: [...frame.rootPosition]
      };
    }

    function interpolateCameraFrame(from, to, t) {
      return {
        fov: lerp(from.fov, to.fov, t),
        near: lerp(from.near, to.near, t),
        far: lerp(from.far, to.far, t),
        distance: lerp(from.distance, to.distance, t),
        target: lerpArray(from.target, to.target, t),
        minDistance: lerp(from.minDistance, to.minDistance, t),
        maxDistance: lerp(from.maxDistance, to.maxDistance, t),
        rootPosition: lerpArray(from.rootPosition, to.rootPosition, t),
        rootRotationY: lerp(from.rootRotationY, to.rootRotationY, t),
        rootScale: lerp(from.rootScale, to.rootScale, t),
        floatAmplitude: lerp(from.floatAmplitude, to.floatAmplitude, t)
      };
    }

    function updateCameraFrameTransition(now) {
      if (!cameraFrameTransition) return;
      const progress = clamp((now - cameraFrameTransition.started) / cameraFrameTransition.duration);
      const eased = easeInOutCubic(progress);
      applyCameraFrame(interpolateCameraFrame(cameraFrameTransition.from, cameraFrameTransition.to, eased));
      if (progress >= 1) {
        applyCameraFrame(cameraFrameTransition.to);
        cameraFrameTransition = null;
      }
    }

    function applyCameraFrame(frame, useAbsolutePosition = false) {
      const target = tempCameraTarget.fromArray(frame.target);
      camera.fov = frame.fov;
      camera.near = frame.near;
      camera.far = frame.far;
      controls.minDistance = frame.minDistance;
      controls.maxDistance = frame.maxDistance;
      if (useAbsolutePosition) {
        camera.position.fromArray(frame.position);
        if (typeof frame.distance === "number") {
          tempCameraDirection.copy(camera.position).sub(target);
          if (tempCameraDirection.lengthSq() >= 1e-6) {
            tempCameraDirection.normalize();
            camera.position.copy(target).addScaledVector(tempCameraDirection, clampCameraDistance(frame, frame.distance));
          }
        }
      } else {
        tempCameraDirection.copy(camera.position).sub(controls.target);
        if (tempCameraDirection.lengthSq() < 1e-6) {
          tempCameraDirection.fromArray(frame.position).sub(target);
        }
        tempCameraDirection.normalize();
        const distance = clampCameraDistance(frame, frame.distance ?? cameraFrameDistance(frame));
        camera.position.copy(target).addScaledVector(tempCameraDirection, distance);
      }
      camera.lookAt(target);
      camera.updateProjectionMatrix();
      controls.target.copy(target);
      currentRootBasePosition.fromArray(frame.rootPosition);
      root.position.set(frame.rootPosition[0], frame.rootPosition[1], frame.rootPosition[2]);
      root.rotation.y = frame.rootRotationY;
      root.scale.setScalar(frame.rootScale);
      currentFloatAmplitude = frame.floatAmplitude;
      const wasAutoRotating = controls.autoRotate;
      controls.autoRotate = false;
      controls.update();
      controls.autoRotate = wasAutoRotating;
    }

    function cameraFrameDistance(frame) {
      if (typeof frame.distance === "number") return frame.distance;
      const position = frame.position || DEFAULT_CAMERA_FRAME.position;
      const target = frame.target || DEFAULT_CAMERA_FRAME.target;
      return Math.hypot(
        position[0] - target[0],
        position[1] - target[1],
        position[2] - target[2]
      );
    }

    function clampCameraDistance(frame, distance) {
      return Math.max(frame.minDistance, Math.min(frame.maxDistance, distance));
    }

    function setLightingStyleTarget(style, immediate = false) {
      if (immediate) {
        lightingStyleTransition = null;
        activeSceneStyle.lighting = cloneLightingStyle(style);
        applyLightingStyle(activeSceneStyle.lighting);
        return;
      }

      lightingStyleTransition = {
        from: cloneLightingStyle(activeSceneStyle.lighting),
        to: cloneLightingStyle(style),
        started: performance.now(),
        duration: Math.max(settings.morphMs, 900)
      };
    }

    function updateLightingStyleTransition(now) {
      if (!lightingStyleTransition) return;
      const progress = clamp((now - lightingStyleTransition.started) / lightingStyleTransition.duration);
      const eased = easeInOutCubic(progress);
      activeSceneStyle.lighting = interpolateLightingStyle(lightingStyleTransition.from, lightingStyleTransition.to, eased);
      applyLightingStyle(activeSceneStyle.lighting);
      if (progress >= 1) {
        activeSceneStyle.lighting = cloneLightingStyle(lightingStyleTransition.to);
        applyLightingStyle(activeSceneStyle.lighting);
        lightingStyleTransition = null;
      }
    }

    function cloneLightingStyle(style) {
      return {
        hemisphere: cloneLightStyle(style.hemisphere),
        ambient: cloneLightStyle(style.ambient),
        key: cloneLightStyle(style.key),
        fill: cloneLightStyle(style.fill),
        rim: cloneLightStyle(style.rim),
        accent: cloneLightStyle(style.accent)
      };
    }

    function cloneLightStyle(style) {
      const clone = { ...style };
      if (style.position) clone.position = [...style.position];
      return clone;
    }

    function interpolateLightingStyle(from, to, t) {
      return {
        hemisphere: interpolateLightStyle(from.hemisphere, to.hemisphere, t, ["sky", "ground"]),
        ambient: interpolateLightStyle(from.ambient, to.ambient, t, ["color"]),
        key: interpolateLightStyle(from.key, to.key, t, ["color"]),
        fill: interpolateLightStyle(from.fill, to.fill, t, ["color"]),
        rim: interpolateLightStyle(from.rim, to.rim, t, ["color"]),
        accent: interpolateLightStyle(from.accent, to.accent, t, ["color"])
      };
    }

    function interpolateLightStyle(from, to, t, colorFields) {
      const style = {};
      for (const field of colorFields) {
        if (from[field] || to[field]) style[field] = lerpColor(from[field] || to[field], to[field] || from[field], t);
      }
      for (const field of ["intensity", "distance", "decay", "pulseBase", "pulseAmount", "pulseSpeed", "pulseOffset", "hoverBoost"]) {
        if (typeof from[field] === "number" || typeof to[field] === "number") {
          const fromValue = typeof from[field] === "number" ? from[field] : to[field];
          const toValue = typeof to[field] === "number" ? to[field] : from[field];
          style[field] = lerp(fromValue, toValue, t);
        }
      }
      if (from.position || to.position) {
        style.position = lerpArray(from.position || to.position, to.position || from.position, t);
      }
      return style;
    }

    function applyLightingStyle(style) {
      lights.hemisphere.color.set(style.hemisphere.sky);
      lights.hemisphere.groundColor.set(style.hemisphere.ground);
      lights.hemisphere.intensity = style.hemisphere.intensity;
      applyLightStyle(lights.ambient, style.ambient);
      applyLightStyle(lights.key, style.key);
      applyLightStyle(lights.fill, style.fill);
      applyLightStyle(lights.rim, style.rim);
      applyLightStyle(lights.accent, style.accent);
    }

    function applyLightStyle(light, style) {
      if (style.color) light.color.set(style.color);
      if (typeof style.intensity === "number") light.intensity = style.intensity;
      if (style.position) light.position.fromArray(style.position);
      if (typeof style.distance === "number") light.distance = style.distance;
      if (typeof style.decay === "number") light.decay = style.decay;
    }

    function applyVariation(index, immediate = false) {
      index = resolveVariationIndex(index);
      applyVariationStyle(index, immediate);
      const variation = variations[index];
      activeVariation = index;
      for (let i = 0; i < voxels.length; i++) {
        voxels[i].current = variation.positions[i].clone();
        voxels[i].currentColor = variation.colors[i].clone();
        if (immediate) offsets[i].set(0, 0, 0);
        setInstance(i);
      }
      mesh.instanceMatrix.needsUpdate = true;
      mesh.instanceColor.needsUpdate = true;
    }

    function startMorph(index) {
      index = resolveVariationIndex(index);
      if (morphing || index === activeVariation) return;
      applyVariationStyle(index);
      targetVariation = index;
      morphing = true;
      morphStarted = performance.now();
      morphFromPositions = voxels.map((v) => v.current.clone());
      morphFromColors = voxels.map((v) => v.currentColor.clone());
      if (typeof syncPicker === "function") syncPicker();
    }

    function updateMorph(now) {
      if (!morphing) return;
      const duration = settings.morphMs;
      let t = clamp((now - morphStarted) / duration);
      t = easeInOutCubic(t);
      const target = variations[targetVariation];
      const base = morphWaveReference;

      for (let i = 0; i < voxels.length; i++) {
        const waveDelay = (Math.sin(base.positions[i].x * 0.5 + base.positions[i].z * 0.7) * 0.5 + 0.5) * 0.3;
        const local = clamp((t - waveDelay) / (1 - waveDelay));
        const v = voxels[i];
        v.current.copy(morphFromPositions[i]).lerp(target.positions[i], local);
        v.currentColor.copy(morphFromColors[i]).lerp(target.colors[i], local);
        setInstance(i);
      }
      mesh.instanceMatrix.needsUpdate = true;
      mesh.instanceColor.needsUpdate = true;

      if (t >= 1) {
        morphing = false;
        activeVariation = targetVariation;
        lastMorphAt = now;
        morphFromPositions = null;
        morphFromColors = null;
      }
    }

    function updateAutoCycle(now) {
      if (now >= suppressAutoUntil && !controls.autoRotate && settings.autoRotate) {
        controls.autoRotate = true;
      }
      if (!settings.autoMorph) {
        lastMorphAt = now;
        return;
      }
      if (morphing || now < suppressAutoUntil) {
        if (morphing) lastMorphAt = now;
        return;
      }
      if (now - lastMorphAt >= settings.cycleMs) {
        startMorph(nextVariationIndex(activeVariation));
      }
    }

    function resolveHoverTarget() {
      if (pointer.lastMove === -Infinity || Math.abs(pointer.x) > 1.1 || Math.abs(pointer.y) > 1.1) {
        return false;
      }

      raycaster.setFromCamera(pointer, camera);
      root.updateMatrixWorld(true);
      inverseRootMatrix.copy(root.matrixWorld).invert();
      localRay.copy(raycaster.ray).applyMatrix4(inverseRootMatrix);
      localViewOut.copy(localRay.direction).multiplyScalar(-1);

      const ox = localRay.origin.x;
      const oy = localRay.origin.y;
      const oz = localRay.origin.z;
      const dx = localRay.direction.x;
      const dy = localRay.direction.y;
      const dz = localRay.direction.z;
      const magnetRadius = Math.max(1.15, Math.min(settings.hoverRadius * 0.42, 4.25));
      let directDepth = Infinity;
      let directIndex = -1;
      let nearestDepth = 0;
      let nearestEdgeDistance = Infinity;
      let nearestScore = Infinity;

      for (let i = 0; i < voxels.length; i++) {
        const voxel = voxels[i];
        const current = voxel.current;
        const jitter = voxel.jitter;
        const cx = current.x + jitter.x;
        const cy = current.y + jitter.y;
        const cz = current.z + jitter.z;
        const half = voxel.scale * 0.56;
        const hitDepth = intersectVoxelBox(ox, oy, oz, dx, dy, dz, cx, cy, cz, half);
        if (hitDepth < directDepth) {
          directDepth = hitDepth;
          directIndex = i;
        }

        const toX = cx - ox;
        const toY = cy - oy;
        const toZ = cz - oz;
        const depth = toX * dx + toY * dy + toZ * dz;
        if (depth <= 0) continue;

        const closestX = ox + dx * depth;
        const closestY = oy + dy * depth;
        const closestZ = oz + dz * depth;
        const rx = cx - closestX;
        const ry = cy - closestY;
        const rz = cz - closestZ;
        const edgeDistance = Math.max(0, Math.sqrt(rx * rx + ry * ry + rz * rz) - half);
        const score = edgeDistance * edgeDistance + depth * 0.0015;
        if (score < nearestScore) {
          nearestScore = score;
          nearestDepth = depth;
          nearestEdgeDistance = edgeDistance;
        }
      }

      if (directIndex !== -1) {
        hoverDepth = directDepth + Math.min(voxels[directIndex].scale * 0.45, settings.hoverRadius * 0.08);
      } else if (nearestEdgeDistance <= magnetRadius) {
        hoverDepth = nearestDepth;
      } else {
        return false;
      }

      localHoverPoint.copy(localRay.origin).addScaledVector(localRay.direction, hoverDepth);
      return localHoverPoint.distanceTo(treeCenter) < 22;
    }

    function intersectVoxelBox(ox, oy, oz, dx, dy, dz, cx, cy, cz, half) {
      let tNear = -Infinity;
      let tFar = Infinity;
      let min = cx - half;
      let max = cx + half;

      if (Math.abs(dx) < 1e-6) {
        if (ox < min || ox > max) return Infinity;
      } else {
        let t1 = (min - ox) / dx;
        let t2 = (max - ox) / dx;
        if (t1 > t2) [t1, t2] = [t2, t1];
        tNear = Math.max(tNear, t1);
        tFar = Math.min(tFar, t2);
        if (tNear > tFar) return Infinity;
      }

      min = cy - half;
      max = cy + half;
      if (Math.abs(dy) < 1e-6) {
        if (oy < min || oy > max) return Infinity;
      } else {
        let t1 = (min - oy) / dy;
        let t2 = (max - oy) / dy;
        if (t1 > t2) [t1, t2] = [t2, t1];
        tNear = Math.max(tNear, t1);
        tFar = Math.min(tFar, t2);
        if (tNear > tFar) return Infinity;
      }

      min = cz - half;
      max = cz + half;
      if (Math.abs(dz) < 1e-6) {
        if (oz < min || oz > max) return Infinity;
      } else {
        let t1 = (min - oz) / dz;
        let t2 = (max - oz) / dz;
        if (t1 > t2) [t1, t2] = [t2, t1];
        tNear = Math.max(tNear, t1);
        tFar = Math.min(tFar, t2);
        if (tNear > tFar) return Infinity;
      }

      if (tFar < 0) return Infinity;
      return Math.max(tNear, 0);
    }

    function updateHover(dt, now) {
      hoverActive = resolveHoverTarget();
      const blend = 1 - Math.exp(-(hoverActive ? 8 : 2.5) * dt);

      for (let i = 0; i < voxels.length; i++) {
        const current = voxels[i].current;
        let tx = 0;
        let ty = 0;
        let tz = 0;

        if (hoverActive) {
          const toX = current.x - localRay.origin.x;
          const toY = current.y - localRay.origin.y;
          const toZ = current.z - localRay.origin.z;
          const depth = toX * localRay.direction.x + toY * localRay.direction.y + toZ * localRay.direction.z;
          const closestX = localRay.origin.x + localRay.direction.x * depth;
          const closestY = localRay.origin.y + localRay.direction.y * depth;
          const closestZ = localRay.origin.z + localRay.direction.z * depth;
          const radialX = current.x - closestX;
          const radialY = current.y - closestY;
          const radialZ = current.z - closestZ;
          const depthDelta = depth - hoverDepth;
          const radialSq = radialX * radialX + radialY * radialY + radialZ * radialZ;
          const distance = Math.sqrt(radialSq + depthDelta * depthDelta * 0.58);
          const radius = settings.hoverRadius;
          if (distance < radius) {
            const intensity = 1 - distance / radius;
            const force = intensity * intensity * intensity * settings.hoverForce;
            const rand = randDirs[i];
            const wave = 1 + (Math.sin(now * 0.003 + current.x * 1.3 + current.y * 0.7 + current.z * 1.1) * 0.15) * intensity;
            const radialLen = Math.sqrt(radialSq);
            const nearRay = 1 - clamp(radialLen / Math.max(radius * 0.35, 0.001));
            const depthPush = clamp(depthDelta / Math.max(radius, 0.001), -1, 1) * 0.18;
            const lift = 0.34 + nearRay * 0.55;
            const vx = radialX * 0.82 + localViewOut.x * lift + localRay.direction.x * depthPush + rand.x * 0.22;
            const vy = radialY * 0.82 + localViewOut.y * lift + localRay.direction.y * depthPush + rand.y * 0.22;
            const vz = radialZ * 0.82 + localViewOut.z * lift + localRay.direction.z * depthPush + rand.z * 0.22;
            const len = Math.sqrt(vx * vx + vy * vy + vz * vz) || 1;
            tx = (vx / len) * force * wave;
            ty = (vy / len) * force * wave;
            tz = (vz / len) * force * wave;
          }
        }

        offsets[i].x += (tx - offsets[i].x) * blend;
        offsets[i].y += (ty - offsets[i].y) * blend;
        offsets[i].z += (tz - offsets[i].z) * blend;
        setInstance(i);
      }

      mesh.instanceMatrix.needsUpdate = true;
    }

    function setInstance(i) {
      const voxel = voxels[i];
      const position = voxel.current || voxel.base;
      const offset = offsets[i];
      const jitter = voxel.jitter;
      tempObj.position.set(
        position.x + offset.x + jitter.x,
        position.y + offset.y + jitter.y,
        position.z + offset.z + jitter.z
      );
      tempObj.rotation.set(0, 0, 0);
      tempObj.scale.setScalar(voxel.scale);
      tempObj.updateMatrix();
      mesh.setMatrixAt(i, tempObj.matrix);
      mesh.setColorAt(i, tempColor.copy(voxel.currentColor || voxel.color));
    }

    function buildParticles() {
      const dustMax = 6000;
      const dustRangeXZ = 42;
      const dustRangeY = 50;
      const dustBaseY = -12;
      const positions = new Float32Array(dustMax * 3);
      const velocity = new Float32Array(dustMax * 3);
      for (let i = 0; i < dustMax; i++) {
        positions[i * 3] = (rng() - 0.5) * dustRangeXZ;
        positions[i * 3 + 1] = rng() * dustRangeY + dustBaseY;
        positions[i * 3 + 2] = (rng() - 0.5) * dustRangeXZ;
        velocity[i * 3] = (rng() - 0.5) * 0.12;
        velocity[i * 3 + 1] = (rng() - 0.2) * 0.06;
        velocity[i * 3 + 2] = (rng() - 0.5) * 0.12;
      }

      const geo = new THREE.BufferGeometry();
      geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      geo.setDrawRange(0, settings.dustCount);
      const mat = new THREE.PointsMaterial({
        color: 0xff9a4a,
        opacity: 0.82,
        size: 0.11,
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        sizeAttenuation: true
      });
      const dust = new THREE.Points(geo, mat);
      dust.frustumCulled = false;
      scene.add(dust);

      const leafMax = 200;
      const leafGeo = new THREE.PlaneGeometry(0.5, 0.5);
      const leafMat = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        opacity: 0.78,
        transparent: true,
        depthWrite: false,
        side: THREE.DoubleSide
      });
      const leaves = new THREE.InstancedMesh(leafGeo, leafMat, leafMax);
      leaves.instanceColor = new THREE.InstancedBufferAttribute(new Float32Array(leafMax * 3), 3);
      leaves.frustumCulled = false;
      leaves.count = settings.leafCount;
      root.add(leaves);

      const leafState = [];
      for (let i = 0; i < leafMax; i++) {
        resetLeaf(i, rng() * 6);
      }

      function resetLeaf(i, life = 0) {
        const a = rng() * Math.PI * 2;
        const r = rng() * 6;
        leafState[i] = {
          x: Math.cos(a) * r,
          y: 18 + rng() * 8,
          z: Math.sin(a) * r,
          vx: (rng() - 0.5) * 0.8,
          vy: -(1.5 + rng() * 1.5),
          vz: (rng() - 0.5) * 0.8,
          rotX: rng() * Math.PI * 2,
          rotY: rng() * Math.PI * 2,
          rotZ: rng() * Math.PI * 2,
          spinX: (rng() - 0.5) * 2,
          spinY: (rng() - 0.5) * 1.5,
          spinZ: (rng() - 0.5) * 2,
          scale: 0.25 + rng() * 0.45,
          wobblePhase: rng() * Math.PI * 2,
          wobbleFreq: 1.5 + rng() * 2,
          wobbleAmp: 0.3 + rng() * 0.5,
          life,
          maxLife: 4 + rng() * 6
        };
      }

      window.__updateParticles = (dt, now) => {
        const t = Math.min(dt, 0.05);
        const a = geo.attributes.position.array;
        const seconds = now * 0.001;
        const halfXZ = dustRangeXZ / 2;
        const topY = dustBaseY + dustRangeY;
        const dustCount = settings.dustCount;
        geo.setDrawRange(0, dustCount);
        for (let i = 0; i < dustCount; i++) {
          a[i * 3] += (velocity[i * 3] + Math.sin(seconds * 0.5 + i * 0.7) * 0.06) * t;
          a[i * 3 + 1] += (velocity[i * 3 + 1] + Math.sin(seconds * 0.3 + i * 1.1) * 0.03) * t;
          a[i * 3 + 2] += (velocity[i * 3 + 2] + Math.cos(seconds * 0.4 + i * 0.9) * 0.06) * t;
          if (a[i * 3] > halfXZ) a[i * 3] = -halfXZ;
          if (a[i * 3] < -halfXZ) a[i * 3] = halfXZ;
          if (a[i * 3 + 1] > topY) a[i * 3 + 1] = dustBaseY;
          if (a[i * 3 + 1] < dustBaseY) a[i * 3 + 1] = topY;
          if (a[i * 3 + 2] > halfXZ) a[i * 3 + 2] = -halfXZ;
          if (a[i * 3 + 2] < -halfXZ) a[i * 3 + 2] = halfXZ;
        }
        geo.attributes.position.needsUpdate = true;

        const leafCount = settings.leafCount;
        leaves.count = leafCount;
        const particleVariation = morphing ? targetVariation : activeVariation;
        const particleDefinition = getVariationDefinition(particleVariation);
        const colors = particleDefinition.particlePalette;
        if (leaves.userData.lastVariation !== particleVariation) {
          leaves.userData.lastVariation = particleVariation;
          mat.color.set(particleDefinition.uiAccent.accent);
          for (let i = 0; i < leafMax; i++) {
            tempColor.set(pick(colors));
            leaves.setColorAt(i, tempColor);
          }
          leaves.instanceColor.needsUpdate = true;
        }

        for (let i = 0; i < leafCount; i++) {
          const leaf = leafState[i];
          leaf.life += t;
          if (leaf.life >= leaf.maxLife || leaf.y < -16) {
            resetLeaf(i);
            tempColor.set(pick(colors));
            leaves.setColorAt(i, tempColor);
            leaves.instanceColor.needsUpdate = true;
          }
          const wobble = Math.sin(seconds * leaf.wobbleFreq + leaf.wobblePhase) * leaf.wobbleAmp;
          leaf.x += (leaf.vx + wobble) * t;
          leaf.y += leaf.vy * t;
          leaf.z += (leaf.vz + Math.cos(seconds * leaf.wobbleFreq * 0.7 + leaf.wobblePhase) * leaf.wobbleAmp * 0.6) * t;
          leaf.rotX += leaf.spinX * t;
          leaf.rotY += leaf.spinY * t;
          leaf.rotZ += leaf.spinZ * t;
          const life = leaf.life / leaf.maxLife;
          const fade = life < 0.1 ? life / 0.1 : life > 0.85 ? (1 - life) / 0.15 : 1;
          tempObj.position.set(leaf.x, leaf.y, leaf.z);
          tempObj.rotation.set(leaf.rotX, leaf.rotY, leaf.rotZ);
          tempObj.scale.setScalar(leaf.scale * fade);
          tempObj.updateMatrix();
          leaves.setMatrixAt(i, tempObj.matrix);
        }
        leaves.instanceMatrix.needsUpdate = true;
      };
    }

    function updateParticles(dt, now) {
      window.__updateParticles?.(dt, now);
    }

    function updateLights(now) {
      const phase = now * 0.001;
      const rimStyle = activeSceneStyle.lighting.rim;
      const accentStyle = activeSceneStyle.lighting.accent;
      rim.intensity = rimStyle.pulseBase +
        Math.sin(phase * rimStyle.pulseSpeed + rimStyle.pulseOffset) * rimStyle.pulseAmount +
        (hoverActive ? rimStyle.hoverBoost : 0);
      accent.intensity = accentStyle.pulseBase +
        Math.sin(phase * accentStyle.pulseSpeed + accentStyle.pulseOffset) * accentStyle.pulseAmount +
        (hoverActive ? accentStyle.hoverBoost : 0);
      root.position.y = currentRootBasePosition.y + Math.sin(phase * 1.2) * currentFloatAmplitude;
    }

    function resize() {
      const width = Math.max(1, stage.clientWidth);
      const height = Math.max(1, stage.clientHeight);
      renderer.setSize(width, height, false);
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
    }

    function onPointerMove(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      pointer.lastMove = performance.now();
    }

    function onPointerLeave() {
      pointer.x = 9999;
      pointer.y = 9999;
      pointer.lastMove = -Infinity;
    }

    function pausePointerInteraction() {
      resumeRotateOnPointerRelease = true;
      pauseAfterInteraction();
    }

    function resumeAutoRotateAfterPointerRelease() {
      if (!resumeRotateOnPointerRelease) return;
      resumeRotateOnPointerRelease = false;
      if (settings.autoRotate) controls.autoRotate = true;
    }

    function pauseAfterInteraction() {
      suppressAutoUntil = performance.now() + 5000;
      controls.autoRotate = false;
    }

    function terrainNoise(x, z) {
      return Math.sin(x * 1.7 + z * 0.9) * 0.4 +
        Math.cos(z * 2.1 - x * 0.6) * 0.35 +
        Math.sin((x + z) * 1.1) * 0.25;
    }

    function samplePath(points, t) {
      const lengths = [];
      let total = 0;
      for (let i = 1; i < points.length; i++) {
        const a = points[i - 1];
        const b = points[i];
        const len = Math.hypot(b[0] - a[0], b[1] - a[1], b[2] - a[2]);
        lengths.push(len);
        total += len;
      }
      let acc = 0;
      for (let i = 0; i < lengths.length; i++) {
        const next = acc + lengths[i] / total;
        if (t <= next) {
          const local = (t - acc) / (next - acc || 1);
          const a = points[i];
          const b = points[i + 1];
          return new THREE.Vector3(
            a[0] + (b[0] - a[0]) * local,
            a[1] + (b[1] - a[1]) * local,
            a[2] + (b[2] - a[2]) * local
          );
        }
        acc = next;
      }
      const last = points[points.length - 1];
      return new THREE.Vector3(last[0], last[1], last[2]);
    }

    function randomUnitVector() {
      const a = rng() * Math.PI * 2;
      const p = Math.acos(2 * rng() - 1);
      const s = Math.sin(p);
      return new THREE.Vector3(s * Math.cos(a), s * Math.sin(a), Math.cos(p));
    }

    function pick(values) {
      return values[Math.floor(rng() * values.length)];
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function lerpArray(a, b, t) {
      return a.map((value, index) => lerp(value, b[index], t));
    }

    function lerpColor(from, to, t) {
      return `#${new THREE.Color(from).lerp(new THREE.Color(to), t).getHexString()}`;
    }

    function clamp(value) {
      return Math.max(0, Math.min(1, value));
    }

    function easeInOutCubic(t) {
      return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function mulberry32(seed) {
      return function random() {
        let t = seed += 0x6D2B79F5;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }
  </script>
